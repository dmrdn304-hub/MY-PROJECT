function showDORTable(rows,from,to){
  const el=document.getElementById('dor_result');
  if(!el) return;

  // Grand totals
  let gTrips=0,gYes=0,gNo=0,gBd=0,gSanKm=0,gOptKm=0,gCanKm=0,gDiesel=0,gCash=0,gPass=0,gStud=0,gDhaba=0,gUria=0,gDead=0;
  rows.forEach(r=>{
    gTrips+=parseInt(r.totalTrips||0); gYes+=parseInt(r.yesTrips||0);
    gNo+=parseInt(r.noTrips||0); gBd+=parseInt(r.bdTrips||0);
    gSanKm+=parseFloat(r.sanKm||0); gOptKm+=parseFloat(r.optKm||0);
    gCanKm+=parseFloat(r.cancelKm||0); gDiesel+=parseFloat(r.diesel||0);
    gCash+=parseFloat(r.cash||0); gPass+=parseInt(r.pass||0);
    gStud+=parseInt(r.students||0); gDhaba+=parseFloat(r.dhaba||0);
    gUria+=parseFloat(r.uria||0); gDead+=parseFloat(r.deadKm||0);
  });
  const gKmpl=gDiesel>0?(gOptKm/gDiesel).toFixed(2):'—';
  const gEpkm=gOptKm>0?(gCash/gOptKm).toFixed(2):'—';
  const gComp=gTrips>0?((gYes/gTrips)*100).toFixed(1):'0';

  window._dorRows=rows; window._dorGrand={gTrips,gYes,gNo,gBd,gSanKm,gOptKm,gCanKm,gDiesel,gCash,gPass,gStud,gDhaba,gUria,gDead};
  window._dorFrom=from; window._dorTo=to;

  const fkm=v=>parseFloat(v||0).toFixed(1);
  const frs=v=>parseFloat(v||0).toLocaleString('en-IN',{maximumFractionDigits:0});

  const buildRow=(r,isTot)=>{
    const optKm=parseFloat(r.optKm||0);
    const diesel=parseFloat(r.diesel||0);
    const cash=parseFloat(r.cash||0);
    const kmpl=r.avgKmpl||'—';
    const epkm=r.avgEpkm&&r.avgEpkm!=='—'?r.avgEpkm:(optKm>0?(cash/optKm).toFixed(2):'—');
    const cr=r.compRate||'—';
    const trStyle=isTot?'background:var(--surf2);font-weight:800;border-top:3px solid var(--bdr)':'';
    return `<tr style="${trStyle}">
      <td class="mono" style="font-weight:800;white-space:nowrap">${isTot?'TOTAL':r.date}</td>
      <td class="mono" style="text-align:center">${r.schCount||'—'}</td>
      <td class="mono" style="text-align:center">${r.totalTrips||0}</td>
      <td class="mono" style="text-align:center;color:var(--green)">${r.yesTrips||0}</td>
      <td class="mono" style="text-align:center;color:var(--red)">${r.noTrips||0}</td>
      <td class="mono" style="text-align:center;color:var(--amber)">${r.bdTrips||0}</td>
      <td class="mono" style="text-align:center;color:${parseFloat(cr)>=90?'var(--green)':parseFloat(cr)>=75?'var(--amber)':'var(--red)'}">${isTot?gComp+'%':cr+'%'}</td>
      <td class="mono" style="text-align:right">${fkm(r.sanKm)}</td>
      <td class="mono" style="text-align:right;color:var(--green)">${fkm(r.optKm)}</td>
      <td class="mono" style="text-align:right;color:var(--red)">${fkm(r.cancelKm)}</td>
      <td class="mono" style="text-align:right">${fkm(r.diesel)}</td>
      <td class="mono" style="text-align:right">${fkm(r.uria)}</td>
      <td class="mono" style="text-align:right;font-weight:800;color:${parseFloat(kmpl)>=3.5?'var(--green)':parseFloat(kmpl)>=2.5?'var(--amber)':'var(--red)'}">${kmpl}</td>
      <td class="mono" style="text-align:right">${fkm(r.deadKm)}</td>
      <td class="mono" style="text-align:right;color:var(--teal);font-weight:700">₹${frs(cash)}</td>
      <td class="mono" style="text-align:right">${frs(r.pass)}</td>
      <td class="mono" style="text-align:right">${frs(r.students)}</td>
      <td class="mono" style="text-align:right;color:var(--teal)">₹${frs(r.dhaba)}</td>
      <td class="mono" style="text-align:right;color:${parseFloat(epkm)>=20?'var(--green)':parseFloat(epkm)>=10?'var(--amber)':'var(--red)'}">${epkm}</td>
    </tr>`;
  };

  const totRow=buildRow({
    date:'TOTAL',schCount:rows.reduce((s,r)=>s+(parseInt(r.schCount)||0),0),
    totalTrips:gTrips,yesTrips:gYes,noTrips:gNo,bdTrips:gBd,
    compRate:gComp,sanKm:gSanKm,optKm:gOptKm,cancelKm:gCanKm,
    diesel:gDiesel,uria:gUria,avgKmpl:gKmpl,deadKm:gDead,
    cash:gCash,pass:gPass,students:gStud,dhaba:gDhaba,avgEpkm:gEpkm
  },true);

  const cols=['Date','Sch','Trips','YES','NO','BD','Comp%','San KM','Opt KM','Can KM','Diesel','Uria','KMPL','Dead KM','Cash (₹)','Pass','Students','Dhaba (₹)','EPKM'];
  const thead=cols.map(c=>`<th style="white-space:nowrap">${c}</th>`).join('');
  const tbody=rows.map(r=>buildRow(r,false)).join('')+totRow;

  el.innerHTML=`
    <div class="dash-grid fu" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr));margin-bottom:0">
      <div class="dc"><div class="dc-lbl">SAN TRIPS</div><div class="dc-val b">${gTrips}</div></div>
      <div class="dc"><div class="dc-lbl">OPT TRIPS</div><div class="dc-val g">${gYes}</div></div>
      <div class="dc"><div class="dc-lbl">COMP %</div><div class="dc-val ${parseFloat(gComp)>=90?'g':parseFloat(gComp)>=75?'y':'r'}">${gComp}%</div></div>
      <div class="dc"><div class="dc-lbl">OPT KM</div><div class="dc-val">${parseFloat(gOptKm).toFixed(1)}</div></div>
      <div class="dc"><div class="dc-lbl">DIESEL (L)</div><div class="dc-val">${parseFloat(gDiesel).toFixed(1)}</div></div>
      <div class="dc"><div class="dc-lbl">KMPL</div><div class="dc-val ${parseFloat(gKmpl)>=3.5?'g':parseFloat(gKmpl)>=2.5?'y':'r'}">${gKmpl}</div></div>
      <div class="dc"><div class="dc-lbl">CASH (₹)</div><div class="dc-val g">₹${Math.round(gCash).toLocaleString('en-IN')}</div></div>
      <div class="dc"><div class="dc-lbl">EPKM</div><div class="dc-val ${parseFloat(gEpkm)>=20?'g':parseFloat(gEpkm)>=10?'y':'r'}">${gEpkm}</div></div>
      <div class="dc"><div class="dc-lbl">PASSENGERS</div><div class="dc-val">${gPass.toLocaleString('en-IN')}</div></div>
    </div>
    <div class="rviewer fu">
      <div class="rtbar">
        <span class="rtbar-title">${rows.length} day${rows.length!==1?'s':''} &nbsp;·&nbsp; ${from} → ${to}</span>
        <span class="sp"></span>
        <button class="btn btn-ghost btn-sm" onclick="exportDOR()">📥 Excel</button>
        <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨 Print</button>
      </div>
      <div class="rtwrap">
        <table class="rtbl" id="dor_table">
          <thead><tr>${thead}</tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
    </div>`;
}

function exportDOR(){
  const rows=window._dorRows||[];
  const g=window._dorGrand||{};
  if(!rows.length){toast('warn','No data to export');return;}
  const cols=['Date','Sch','Trips','YES','NO','BD','Comp%','San KM','Opt KM','Can KM','Diesel','Uria','KMPL','Dead KM','Cash','Pass','Students','Dhaba','EPKM'];
  const toRow=r=>{
    const optKm=parseFloat(r.optKm||0);
    const diesel=parseFloat(r.diesel||0);
    const cash=parseFloat(r.cash||0);
    const kmpl=r.avgKmpl||(diesel>0&&optKm>0?(optKm/diesel).toFixed(2):'');
    const epkm=r.avgEpkm||(optKm>0?(cash/optKm).toFixed(2):'');
    return [r.date,r.schCount||0,r.totalTrips||0,r.yesTrips||0,r.noTrips||0,r.bdTrips||0,
      r.compRate||0,r.sanKm||0,r.optKm||0,r.cancelKm||0,
      r.diesel||0,r.uria||0,kmpl,r.deadKm||0,
      cash,r.pass||0,r.students||0,r.dhaba||0,epkm];
  };
  const gKmpl=g.gDiesel>0?(g.gOptKm/g.gDiesel).toFixed(2):'';
  const gEpkm=g.gOptKm>0?(g.gCash/g.gOptKm).toFixed(2):'';
  const grandRow=['TOTAL',rows.reduce((s,r)=>s+(parseInt(r.schCount)||0),0),
    g.gTrips,g.gYes,g.gNo,g.gBd,g.gOptKm>0?((g.gYes/g.gTrips)*100).toFixed(1):'',
    g.gSanKm,g.gOptKm,g.gCanKm,g.gDiesel,g.gUria,gKmpl,g.gDead,
    g.gCash,g.gPass,g.gStud,g.gDhaba,gEpkm];
  const aoa=[cols,...rows.map(toRow),grandRow];
  _loadXlsx(()=>{
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[8,5,5,5,5,5,6,8,8,8,7,6,6,7,10,8,8,10,6].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,'DOR');
    XLSX.writeFile(wb,`DOR_${window._dorFrom}_to_${window._dorTo}.xlsx`);
    toast('success','Excel exported!');
  });
}

      const drows=res.drivers.map(d=>`<tr><td>${d.rank}</td><td class="mono">${d.badge}</td><td>${d.name}</td><td>${d.days}</td><td class="mono">${d.trips}</td><td class="mono">${d.optKm}</td><td class="mono">${d.diesel}</td><td class="mono" style="color:var(--cyan)">${d.avgKmpl}</td></tr>`).join('');

        <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>#</th><th>Badge</th><th>Name</th><th>Days</th><th>Trips</th><th>Opt KM</th><th>Diesel</th><th>Avg KMPL</th></tr></thead><tbody>${drows}</tbody></table></div></div>`;
    }
    if(res.conductors&&res.conductors.length){
      const crows=res.conductors.map(c=>`<tr><td>${c.rank}</td><td class="mono">${c.badge}</td><td>${c.name}</td><td>${c.days}</td><td class="mono">${c.trips}</td><td class="mono">₹${(c.cash||0).toLocaleString()}</td><td class="mono">${c.allPass}</td><td class="mono" style="color:var(--cyan)">${c.avgEpkm}</td></tr>`).join('');
      html+=`<div class="card fu"><div class="card-hdr"><span class="card-title">Conductors — ${res.conductors.length} results</span></div>
        <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>#</th><th>Badge</th><th>Name</th><th>Days</th><th>Trips</th><th>Cash</th><th>Pass</th><th>Avg EPKM</th></tr></thead><tbody>${crows}</tbody></table></div></div>`;

function populateModal(type){
  const data=type==='veh'?S.vehicles:type==='drv'?S.drivers:S.conductors;
  const listId='list'+type.charAt(0).toUpperCase()+type.slice(1);
  const el=document.getElementById(listId);
  if(!el)return;
  el.innerHTML=data.map(d=>{
    const main=type==='veh'?`${d.vehicle}`:`${d.name}`;
    const sub=type==='veh'?`${d.type||''} ${d.model||''}`.trim():`Badge: ${d.badge} · ${d.offDay||''} off`;
    return `<div class="mitem" onclick="pickM('${type}','${encodeURIComponent(JSON.stringify(d))}',this)">
      <div><div class="mitem-main">${main}</div><div class="mitem-sub">${sub}</div></div>
    </div>`;
  }).join('');
}

function filterM(type){
  const q=(document.getElementById('srch'+type.charAt(0).toUpperCase()+type.slice(1))?.value||'').toLowerCase();
  document.querySelectorAll(`#list${type.charAt(0).toUpperCase()+type.slice(1)} .mitem`).forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';
  });
}

function pickM(type,encoded,el){
  document.querySelectorAll(`#list${type.charAt(0).toUpperCase()+type.slice(1)} .mitem`).forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  try{
    const d=JSON.parse(decodeURIComponent(encoded));
    if(type==='veh') S.selVeh=d;
    else if(type==='drv') S.selDrv=d;
    else S.selCon=d;
  }catch(e){}
}

  const tf=document.getElementById('f_vtype')||document.getElementById('avt_'+S.mCtx);
  if(tf&&S.selVeh.type) tf.value=S.selVeh.type;

function toast(type,msg,dur=3500){
  const icons={success:'✓',error:'✕',warn:'⚠',info:'ℹ'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]||'•'}</span><span style="flex:1">${msg}</span><span class="toast-x" onclick="this.parentElement.remove()">✕</span>`;
  document.getElementById('toasts').prepend(el);
  setTimeout(()=>el.remove&&el.remove(),dur);
}

//  GOOGLE APPS SCRIPT RUNNER (gsr)
//  Wraps google.script.run — falls back to demo in browser
// ═══════════════════════════════════════════════════════════
function gsr(fn,args,cb){
  if(typeof google!=='undefined'&&google.script&&google.script.run){
    var runner=google.script.run.withSuccessHandler(cb).withFailureHandler(function(err){
      hideLoad();
      toast('error','Error: '+(err.message||fn));
      console.error(fn,err);
      if(cb) cb(null);
    });
    // Call with spread args
    runner[fn].apply(runner, args||[]);
  } else {
    // Browser preview — return demo data
    setTimeout(()=>cb(demoData(fn,args)),300);
  }
}

// Unified saveSingleAllot — OWN vehicle + EXTERNAL vehicle
function saveSingleAllot(){
  const isExt=window._allotIsExt||false;
  if(isExt){
    // ── External vehicle path ──────────────────────────────
    const veh=((document.getElementById('av_single_ext')||{}).value||'').trim();
    const vtype=(document.getElementById('avt_single')||{}).value||'';
    const depot=((document.getElementById('av_ext_depot')||{}).value||'').trim();
    const auth=((document.getElementById('av_ext_auth')||{}).value||'').trim();
    const remark=((document.getElementById('av_ext_remark')||{}).value||'').trim();
    if(!veh){toast('warn','Enter external vehicle number');return;}
    const dup=Object.keys(window._allotVehMap||{}).find(s=>s!==S.selSch&&window._allotVehMap[s]===veh);
    if(dup){toast('error',veh+' already allotted to '+dup);return;}
    showLoad('Saving external allotment...');
    gsr('saveAllotment',[S.date,S.selSch,S.selSch,veh,vtype,'EXTERNAL',depot,auth,remark],function(res){
      hideLoad();
      if(res&&res.ok){
        toast('success','External vehicle '+veh+' allotted to '+S.selSch);
        if(!window._allotVehMap) window._allotVehMap={};
        window._allotVehMap[S.selSch]=veh;
        autoNextSch();
      } else toast('error',(res||{}).error||'Save failed');
    });
  } else {
    // ── Own vehicle path ───────────────────────────────────
    const veh=((document.getElementById('av_single')||{}).value||'').trim();
    const vtype=(document.getElementById('avt_single')||{}).value||'';
    if(!veh){toast('warn','Select a vehicle first');return;}
    const dup=Object.keys(window._allotVehMap||{}).find(s=>s!==S.selSch&&window._allotVehMap[s]===veh);
    if(dup){toast('error',veh+' already allotted to '+dup);return;}
    showLoad('Saving allotment...');
    gsr('saveAllotment',[S.date,S.selSch,S.selSch,veh,vtype],function(res){
      hideLoad();
      if(res&&res.ok){
        toast('success',veh+' allotted to '+S.selSch);
        if(!window._allotVehMap) window._allotVehMap={};
        window._allotVehMap[S.selSch]=veh;
        autoNextSch();
      } else toast('error',(res||{}).error||'Save failed');
    });
  }
}

function addNonRevRow(){

function removeNonRevRow(i){

function getNonRevRows(){
  const rows=document.querySelectorAll('.nonrev-row');
  const result=[];
  rows.forEach(row=>{
    const id=row.id.replace('nonrev_','');
    const type=(document.getElementById('nr_type_'+id)||{}).value||'';
    const km=parseFloat((document.getElementById('nr_km_'+id)||{}).value)||0;
    const note=(document.getElementById('nr_note_'+id)||{}).value||'';
    if(km>0||type) result.push({type,km,note});

  return result;

// ── Master KMPL calc — Vehicle Day Summary ────────────────
function calcVDayKmpl(){
  const diesel=parseFloat((document.getElementById('f_diesel')||{}).value)||0;
  const schOpt=parseFloat((document.getElementById('f_optkm')||{}).value)||0;
  const dead=parseFloat((document.getElementById('f_deadkm')||{}).value)||0;
  const accDead=parseFloat((document.getElementById('f_accdeadkm')||{}).value)||0;
  const div=parseFloat((document.getElementById('f_divkm')||{}).value)||0;

  // Sum all non-revenue KM rows
  const nonRevRows=getNonRevRows();
  const nonRevTotal=nonRevRows.reduce((s,r)=>s+(r.km||0),0);

  const totalKm=schOpt+dead+accDead+div+nonRevTotal;
  const kmpl=diesel>0&&totalKm>0?(totalKm/diesel):0;

  // Update big display
  const td=document.getElementById('f_totalkm_disp');
  const kd=document.getElementById('f_kmpl_disp');
  const kh=document.getElementById('f_kmpl');  // hidden input for save
  const hint=document.getElementById('f_kmpl_hint');
  if(td) td.textContent=totalKm>0?totalKm.toFixed(2):'—';
  if(kd) kd.textContent=kmpl>0?kmpl.toFixed(2):'—';
  if(kh) kh.value=kmpl>0?kmpl.toFixed(2):'';

  if(hint){
    const base = _smart.baselines[S.selSch] && _smart.baselines[S.selSch].kmpl;
    if(kmpl > 0) {
      if(base && base.n >= 3 && base.std > 0.05) {
        const z = Math.abs(kmpl - base.avg) / base.std;
        const lo = parseFloat((base.avg - 2.5*base.std).toFixed(2));
        const hi = parseFloat((base.avg + 2.5*base.std).toFixed(2));
        if(z > 2.5 && kmpl < base.avg) {
          hint.textContent = `⚠ Low — ${kmpl.toFixed(2)} vs avg ${base.avg} (norm: ${lo}–${hi})`;
          hint.className = 'fhint err';
        } else if(z > 2.5 && kmpl > base.avg) {
          hint.textContent = `⚠ High — ${kmpl.toFixed(2)} vs avg ${base.avg} (norm: ${lo}–${hi})`;
          hint.className = 'fhint warn';
        } else {
          hint.textContent = `✓ Normal range — avg ${base.avg} KMPL (${base.n} entries)`;
          hint.className = 'fhint ok';
        }
      } else if(kmpl < 2.0) {
        hint.textContent = '⚠ Very low — recheck diesel or KM';
        hint.className = 'fhint err';
      } else if(kmpl < 2.5) {
        hint.textContent = '⚠ Below typical range — verify entry';
        hint.className = 'fhint warn';
      } else if(kmpl > 8) {
        hint.textContent = '⚠ Unusually high — recheck entry';
        hint.className = 'fhint warn';
      } else {
        hint.textContent = base && base.n >= 3
          ? `✓ Looks normal — building baseline (${base.n} entries)`
          : '✓ KMPL in normal range';
        hint.className = 'fhint ok';
      }
    } else {
      hint.textContent = '';
      hint.className = 'fhint';
    }
  }

  // Also sync header display
  const hd=document.getElementById('fuel-optkm-display');
  if(hd) hd.textContent=totalKm.toFixed(2)+' km';

  // Build KM breakdown pills
  const pills=document.getElementById('f_km_pills');
  if(pills){
    const defs=[
      {label:'SCH OPT',km:schOpt,col:'var(--green)',bg:'var(--green-lt)'},
      {label:'DEAD',km:dead,col:'var(--txt2)','bg':'var(--surf2)'},
      {label:'ACC DEAD',km:accDead,col:'var(--red)',bg:'var(--red-lt)'},
      {label:'DIVERSION',km:div,col:'var(--blue)',bg:'var(--blue-lt)'},
      ...nonRevRows.map(r=>({label:r.type||'NON-REV',km:r.km,col:'var(--amber)',bg:'var(--amber-lt)'})),
    ].filter(d=>d.km>0);
    pills.innerHTML=defs.map(d=>`
      <span style="display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:800;font-family:var(--mono);background:${d.bg};color:${d.col};border:1.5px solid ${d.col}22">
        ${d.label}: ${d.km.toFixed(1)}
      </span>`).join('');
  }
}

    EXTERNAL:['var(--purple-lt)','var(--purple)','🔀 <strong>Relief / External Run</strong> — External vehicle fuel entry (no schedule linked). Source depot required.'],
    OTHER:['var(--surf2)','var(--txt2)','📌 <strong>Other Movement</strong> — Miscellaneous non-schedule diesel issue.'],
  };
  const [bg,col,msg]=infoMap[type]||infoMap.OTHER;
  const box=document.getElementById('misc_infobox');
  if(box){box.style.background=bg;box.style.color=col;box.innerHTML=msg;}

    const bgMap={WORKSHOP:'var(--teal-lt)',FERRY:'var(--blue-lt)',TRAINING:'var(--amber-lt)',EXTERNAL:'var(--purple-lt)',OTHER:'var(--surf2)'};
    btn.style.background=isAct?bgMap[t]:'#fff';
    btn.style.color=isAct?colMap[t]:'var(--txt2)';
    btn.style.borderColor=isAct?colMap[t]:'var(--bdr)';

function onMiscVehChange(sel){
  const no=sel.value;
  const v=(S.vehicles||[]).find(x=>(x.vehicle||x.vehicleNo||'')===no);

    const t=document.getElementById('m_vtype');
    if(t&&(v.type||v.vehicleType)) t.value=v.type||v.vehicleType;

function onMiscDrvInput(inp){
  const badge=inp.value.trim();
  const d=(S.drivers||[]).find(x=>(x.badge||x.badgeNo||'')===badge);
  // auto-fill not available in misc — just a text field; no-op is fine
}

function calcMiscKmpl(){
  const km=parseFloat((document.getElementById('m_km')||{}).value)||0;
  const d=parseFloat((document.getElementById('m_diesel')||{}).value)||0;
  const kmpl=km>0&&d>0?(km/d):0;
  const el=document.getElementById('m_kmpl');
  const hint=document.getElementById('m_kmpl_hint');
  if(el) el.value=kmpl>0?kmpl.toFixed(2):'';
  // Update summary strip
  const sk=document.getElementById('ms_km');
  const sd=document.getElementById('ms_diesel');
  const skmpl=document.getElementById('ms_kmpl');
  if(sk) sk.textContent=km>0?km.toFixed(2):'—';
  if(sd) sd.textContent=d>0?d.toFixed(2):'—';
  if(skmpl) skmpl.textContent=kmpl>0?kmpl.toFixed(2):'—';
  if(hint){
    if(kmpl>0&&kmpl<2.5){hint.textContent='⚠ Low KMPL';hint.className='fhint warn';}
    else if(kmpl>12){hint.textContent='⚠ High KMPL — recheck';hint.className='fhint warn';}
    else if(kmpl>0){hint.textContent='✓ KMPL looks normal';hint.className='fhint ok';}
    else{hint.textContent='';hint.className='fhint';}
  }
}

function saveMiscFuel(markAway){
  const veh=(document.getElementById('m_veh')||{}).value||'';
  const km=parseFloat((document.getElementById('m_km')||{}).value)||0;
  const diesel=parseFloat((document.getElementById('m_diesel')||{}).value)||0;
  const reason=(document.getElementById('m_reason')||{}).value.trim()||'';
  const errs=[];
  if(!veh) errs.push('Select vehicle');
  if(!km||km<=0) errs.push('Enter distance KM');
  if(!diesel||diesel<=0) errs.push('Enter diesel issued');
  if(!reason) errs.push('Enter reason / remarks');
  if(errs.length){errs.forEach(e=>toast('warn',e));return;}

  const data={
    date:(document.getElementById('m_date')||{}).value||S.date,
    vehicleNo:veh,
    vehicleType:(document.getElementById('m_vtype')||{}).value||'',
    driverBadge:(document.getElementById('m_drv')||{}).value.trim()||'',
    fromLocation:(document.getElementById('m_from')||{}).value.trim()||'',
    toLocation:(document.getElementById('m_to')||{}).value.trim()||'',
    distanceKm:km,
    diesel,
    uria:parseFloat((document.getElementById('m_uria')||{}).value)||0,
    kmpl:parseFloat((document.getElementById('m_kmpl')||{}).value)||0,
    movementType:window._miscFuelType||'WORKSHOP',
    workOrder:(document.getElementById('m_wo')||{}).value.trim()||'',
    reason,
    expectedReturn:(document.getElementById('m_return')||{}).value||'',
    entryType:'MISC',
  };

  showLoad('Saving misc fuel…');
  gsr('saveMiscFuel',[data],res=>{
    hideLoad();
    if(typeof res==='string'&&res.startsWith('ERROR')){toast('error',res);return;}
    toast('success',`🔧 ${data.movementType} fuel saved — ${data.kmpl.toFixed?data.kmpl.toFixed(2):data.kmpl} KMPL`);
    if(markAway && data.movementType==='WORKSHOP'){
      const returnDate=(document.getElementById('m_return')||{}).value||'';
      gsr('markVehicleAway',[veh,'WORKSHOP',data.date,returnDate,reason],r=>{
        if(r&&r.ok) toast('info',`🔧 Vehicle ${veh} marked away until ${returnDate||'return'}`);
      });
    }
    // Reset form
    renderMiscFuel();
  });
}

function loadRptData() {
  var from = (document.getElementById('rpt-from')||{}).value || S.date;
  var to   = (document.getElementById('rpt-to')||{}).value   || S.date;
  var dot  = document.getElementById('rpt-hdr-dot');
  var sum  = document.getElementById('rpt-hdr-summary');
  var main = document.getElementById('rpt-main');
  if (dot) { dot.className = 'rpt-hdr-dot loading'; }
  if (sum) sum.textContent = 'Loading…';
  if (main) main.innerHTML = '<div class="empty"><div class="empty-ico">&#x23F3;</div><div class="empty-txt">Loading data…</div></div>';
  gsr('getCombineRawRows', [from, to], function(res) {
    if (!res || res.error) {
      if (dot) dot.className = 'rpt-hdr-dot';
      if (sum) sum.textContent = 'Error loading data';
      if (main) main.innerHTML = '<div class="empty"><div class="empty-ico">&#x26A0;</div><div class="empty-txt">Error: ' + (res && res.error ? res.error : 'Unknown') + '</div></div>';
      return;
    }
    window._rptCD  = res.combineData || [];
    window._rptSCH = res.schedules   || [];
    var tc     = window._rptCD.filter(function(r){ return r.module === 'TC'; });
    var scheds = new Set(tc.map(function(r){ return r.sch_id; })).size;
    var yes    = tc.filter(function(r){ return r.status === 'YES'; }).length;
    var dates  = [...new Set(window._rptCD.map(function(r){ return r.date; }))].sort();
    if (dot) { dot.className = 'rpt-hdr-dot'; }
    if (sum) sum.textContent = scheds + ' SCHs · ' + yes + '/' + tc.length + ' trips';
    // Update date display
    var fromEl = document.getElementById('rpt-from');
    var dateEl = document.querySelector('.rpt-hdr-date');
    rptShow(_rptCurrentPage || 'svcwise');
  });
}

function rptShow(page) {
  _rptCurrentPage = page;
  var items = document.querySelectorAll('#rpt-overlay .nav-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('act');
  var navEl = document.getElementById('rpt-nav-' + page);
  if (navEl) navEl.classList.add('act');
  var main = document.getElementById('rpt-main');
  if (!main) return;
  if (!window._rptCD || !window._rptCD.length) {
    main.innerHTML = '<div class="empty"><div class="empty-ico">&#x1F4CB;</div><div class="empty-txt">Load data first — select dates and click &#x26A1; Load</div></div>';
    return;
  }
  switch(page) {
    case 'svcwise':  main.innerHTML = renderSvcWise();       break;
    case 'schwise':  main.innerHTML = renderSchWise();       break;
    case 'tripwise': main.innerHTML = renderTripWise();      break;
    case 'cashwise': main.innerHTML = renderCashWise();      break;
    case 'onlycash': main.innerHTML = renderRptOnlyCash();   break;
    case 'fuelwise': main.innerHTML = renderFuelWise();      break;
    case 'vehwise':  main.innerHTML = renderVehWise();       break;
    case 'daily':    main.innerHTML = renderDailySummary();  break;
    default: main.innerHTML = '<div class="empty"><div class="empty-ico">&#x1F6A7;</div><div class="empty-txt">Coming Soon</div></div>';
  }
  main.scrollTop = 0;
}


function rptSetRange(preset) {
  var now = new Date();
  var fmt = function(dt){ return dt.toISOString().slice(0,10); };
  var f, t;
  if (preset === 'today') {
    f = t = fmt(now);
  } else if (preset === 'yest') {
    var y = new Date(now); y.setDate(y.getDate()-1);
    f = t = fmt(y);
  } else if (preset === '7d') {
    var p = new Date(now); p.setDate(p.getDate()-6);
    f = fmt(p); t = fmt(now);
  } else if (preset === 'month') {
    f = fmt(new Date(now.getFullYear(), now.getMonth(), 1));
    t = fmt(now);
  }
  var fromEl = document.getElementById('rpt-from');
  var toEl   = document.getElementById('rpt-to');
  if (fromEl) fromEl.value = f;
  if (toEl)   toEl.value   = t;
}

const fmt0 = v => Math.round(v||0).toLocaleString('en-IN');
const fmt2 = v => (+(v||0)).toFixed(2);
const fmtR = v => '₹' + fmt0(v);
const fmtKm = v => (+(v||0)).toFixed(2);

function typBadge(t) {
  return `<span class="typ typ-${t}">${t}</span>`;
}

function stBadge(s) {
  if(s==='YES') return '<span class="st-yes">YES</span>';
  if(s==='NO')  return '<span class="st-no">NO</span>';
  return '<span class="st-bd">' + s + '</span>';
}

function kmplCls(v) {
  if(!v || isNaN(v)) return '';
  if(v >= 5) return 'kmpl-good';
  if(v >= 3.5) return 'kmpl-avg';
  return 'kmpl-bad';
}


const TYPE_COLORS = {LOC:'blue',EXP:'green',SLP:'purple',MINI:'teal','2X2':'amber',GNR:'orange','CC-01':'indigo','EXT-01':'teal'};
function rptTypeColor(t){ return TYPE_COLORS[t]||''; }

// Build schedule master map: schId → {id, name, sch_type, trips:[]}
function buildSchMaster() {
  const map = {};
  for (const r of (window._rptSCH||[])) {
    if (!map[r.id]) map[r.id] = {id:r.id, name:r.name, sch_type:r.sch_type, sch_no:r.sch_no, trips:[], types:new Set()};
    map[r.id].trips.push(r);
    map[r.id].types.add(r.type);
  }
  return map;
}

// Get TC data grouped by schId, with per-type sub-grouping
function getTCBySchId() {
  const map = {};
  for (const r of (window._rptCD||[])) {
    if (r.module !== 'TC') continue;
    if (!map[r.sch_id]) map[r.sch_id] = [];
    map[r.sch_id].push(r);
  }
  return map;
}

// Get DIESEL data by schId
function getDieselBySchId() {
  var map = {};
  for (var i = 0; i < (window._rptCD||[]).length; i++) {
    var r = window._rptCD[i];
    if (r.module !== 'DIESEL') continue;
    if (!map[r.sch_id]) map[r.sch_id] = {diesel_l:0, uria_l:0, dead_km:0, diversion_km:0, kmpl:0, kmpl_cnt:0, vehicle_no:'', vehicle_type:'', driver_badge:'', driver_name:'', driver_mobile:''};
    var d = map[r.sch_id];
    d.diesel_l     += r.diesel_l;
    d.uria_l       += r.uria_l;
    d.dead_km      += r.dead_km;
    d.diversion_km += r.diversion_km;
    if (r.kmpl) { d.kmpl += r.kmpl; d.kmpl_cnt++; }
    if (r.vehicle_no)    d.vehicle_no    = r.vehicle_no;
    if (r.vehicle_type)  d.vehicle_type  = r.vehicle_type;
    if (r.driver_badge)  d.driver_badge  = r.driver_badge;
    if (r.driver_name)   d.driver_name   = r.driver_name;
    if (r.driver_mobile) d.driver_mobile = r.driver_mobile;
  }
  for (var k in map) {
    map[k].kmpl = map[k].kmpl_cnt ? parseFloat((map[k].kmpl / map[k].kmpl_cnt).toFixed(2)) : 0;
  }
  return map;
}

// Get SERVICE (cash) data by schId — aggregated across all dates in range
function getServiceBySchId() {
  var map = {};
  for (var i = 0; i < (window._rptCD||[]).length; i++) {
    var r = window._rptCD[i];
    if (r.module !== 'SERVICE') continue;
    if (!map[r.sch_id]) map[r.sch_id] = {cash_total:0, all_pass:0, student_pass:0, dhaba:0, epkm:0, epkm_cnt:0, conductor_badge:'', conductor_name:'', conductor_mobile:'', bag_no:'', opt_km:0, trip_type:''};
    var s = map[r.sch_id];
    s.cash_total   += r.cash_total;
    s.all_pass     += r.all_pass;
    s.student_pass += r.student_pass;
    s.dhaba        += r.dhaba;
    s.opt_km       += r.opt_km;
    if (r.epkm) { s.epkm += r.epkm; s.epkm_cnt++; }
    if (r.conductor_badge)  s.conductor_badge  = r.conductor_badge;
    if (r.conductor_name)   s.conductor_name   = r.conductor_name;
    if (r.conductor_mobile) s.conductor_mobile = r.conductor_mobile;
    if (r.bag_no)   s.bag_no   = r.bag_no;
    if (r.trip_type) s.trip_type = r.trip_type;
  }
  for (var k in map) {
    map[k].epkm = map[k].epkm_cnt ? parseFloat((map[k].epkm / map[k].epkm_cnt).toFixed(2)) : 0;
  }
  return map;
}

// Aggregate TC rows into a stats object
function aggTC(rows) {
  const s = {trips:0, yes:0, no:0, bd:0, san_km:0, opt_km:0, cancel_km:0, cash:0, all_pass:0, student_pass:0, dhaba:0};
  for (const r of rows) {
    s.trips++;
    if (r.status==='YES') s.yes++;
    else if (r.status==='NO') s.no++;
    else s.bd++;
    s.san_km += r.san_km;
    s.opt_km += r.opt_km;
    s.cancel_km += r.cancel_km;
    s.cash += r.cash_total;
    s.all_pass += r.all_pass;
    s.student_pass += r.student_pass;
    s.dhaba += r.dhaba;
  }
  return s;
}

let _current = 'svcwise';

function renderSvcWise() {
  const tcRows = (window._rptCD||[]).filter(r => r.module === 'TC');
  const svcRows = (window._rptCD||[]).filter(r => r.module === 'SERVICE');
  const dieselRows = (window._rptCD||[]).filter(r => r.module === 'DIESEL');

  // Build per-type aggregation
  // For mixed SCHs: group trips by (sch_id, trip_type)
  const typeMap = {}; // type → {scheds:Set, trips, yes, no, san_km, opt_km, cancel_km, cash, pass, student, dhaba, diesel, kmpl_sum, kmpl_cnt, epkm_sum, epkm_cnt}
  const schTypeSet = {}; // sch_id → Set of types (to count mixed SCHs correctly)

  for (const r of tcRows) {
    const t = r.trip_type;
    if (!typeMap[t]) typeMap[t] = {scheds:new Set(), trips:0, yes:0, no:0, san_km:0, opt_km:0, cancel_km:0, cash:0, pass:0, student:0, dhaba:0, diesel:0, kmpl_sum:0, kmpl_cnt:0, epkm_sum:0, epkm_cnt:0};
    typeMap[t].scheds.add(r.sch_id + '_' + t); // count sch per type
    typeMap[t].trips++;
    if (r.status==='YES') typeMap[t].yes++;
    else if (r.status==='NO') typeMap[t].no++;
    typeMap[t].san_km += r.san_km;
    typeMap[t].opt_km += r.opt_km;
    typeMap[t].cancel_km += r.cancel_km;
  }

  // Add cash/EPKM from SERVICE module per type
  for (const r of svcRows) {
    const t = r.trip_type;
    if (!typeMap[t]) continue;
    typeMap[t].cash += r.cash_total;
    typeMap[t].pass += r.all_pass;
    typeMap[t].student += r.student_pass;
    typeMap[t].dhaba += r.dhaba;
    if (r.epkm) { typeMap[t].epkm_sum += r.epkm; typeMap[t].epkm_cnt++; }
  }

  // Add fuel from DIESEL module per type
  for (const r of dieselRows) {
    const t = r.trip_type;
    if (!typeMap[t]) continue;
    typeMap[t].diesel += r.diesel_l;
    if (r.kmpl) { typeMap[t].kmpl_sum += r.kmpl; typeMap[t].kmpl_cnt++; }
  }

  const types = Object.keys(typeMap).sort();

  // Totals
  let tot = {scheds:new Set(), trips:0, yes:0, no:0, san_km:0, opt_km:0, cancel_km:0, cash:0, pass:0, student:0, dhaba:0, diesel:0};
  for (const r of tcRows) { tot.scheds.add(r.sch_id); tot.trips++; if(r.status==='YES')tot.yes++;else if(r.status==='NO')tot.no++; tot.san_km+=r.san_km; tot.opt_km+=r.opt_km; tot.cancel_km+=r.cancel_km; }
  for (const r of svcRows) { tot.cash+=r.cash_total; tot.pass+=r.all_pass; tot.student+=r.student_pass; tot.dhaba+=r.dhaba; }
  for (const r of dieselRows) { tot.diesel+=r.diesel_l; }

  // KPI cards
  const cards = `
  <div class="cards">
    <div class="card blue"><div class="card-ico">📋</div><div class="card-val">${tot.scheds.size}</div><div class="card-lbl">Total Schedules</div><div class="card-sub">${types.length} service types</div></div>
    <div class="card green"><div class="card-ico">✅</div><div class="card-val">${tot.yes}</div><div class="card-lbl">Trips Operated</div><div class="card-sub">of ${tot.trips} total</div></div>
    <div class="card red"><div class="card-ico">❌</div><div class="card-val">${tot.no}</div><div class="card-lbl">Trips Cancelled</div><div class="card-sub">${tot.trips?((tot.no/tot.trips)*100).toFixed(1):'0'}% cancel rate</div></div>
    <div class="card amber"><div class="card-ico">🛣️</div><div class="card-val">${fmt0(tot.opt_km)}</div><div class="card-lbl">Operated KM</div><div class="card-sub">San: ${fmt0(tot.san_km)} km</div></div>
    <div class="card teal"><div class="card-ico">💰</div><div class="card-val">${fmtR(tot.cash)}</div><div class="card-lbl">Total Cash</div><div class="card-sub">Pass: ${fmt0(tot.pass)}</div></div>
    <div class="card purple"><div class="card-ico">⛽</div><div class="card-val">${fmt0(tot.diesel)} L</div><div class="card-lbl">Total Diesel</div><div class="card-sub">${tot.opt_km&&tot.diesel?(tot.opt_km/tot.diesel).toFixed(2):'-'} KMPL avg</div></div>
  </div>`;

  // Table rows
  let rows = '';
  for (const t of types) {
    const d = typeMap[t];
    const avgKmpl = d.kmpl_cnt ? (d.kmpl_sum/d.kmpl_cnt).toFixed(2) : '—';
    const avgEpkm = d.epkm_cnt ? (d.epkm_sum/d.epkm_cnt).toFixed(2) : '—';
    const eff = d.san_km ? ((d.opt_km/d.san_km)*100).toFixed(1) : '—';
    rows += `
    <tr>
      <td>${typBadge(t)}</td>
      <td class="r">${d.scheds.size}</td>
      <td class="r">${d.trips}</td>
      <td class="r st-yes">${d.yes}</td>
      <td class="r st-no">${d.no}</td>
      <td class="r">${fmtKm(d.san_km)}</td>
      <td class="r">${fmtKm(d.opt_km)}</td>
      <td class="r" style="color:var(--red)">${fmtKm(d.cancel_km)}</td>
      <td class="r" style="color:var(--amber)">${eff}%</td>
      <td class="r">${fmtR(d.cash)}</td>
      <td class="r">${fmt0(d.pass)}</td>
      <td class="r">${fmt0(d.student)}</td>
      <td class="r">${fmt0(d.diesel)} L</td>
      <td class="r ${kmplCls(+avgKmpl)}">${avgKmpl}</td>
      <td class="r">${avgEpkm !== '—' ? '₹'+avgEpkm : '—'}</td>
    </tr>`;
  }

  // Total row
  const totEff = tot.san_km ? ((tot.opt_km/tot.san_km)*100).toFixed(1) : '—';
  rows += `
  <tr class="svc-total-row">
    <td>TOTAL</td>
    <td class="r">${tot.scheds.size}</td>
    <td class="r">${tot.trips}</td>
    <td class="r">${tot.yes}</td>
    <td class="r">${tot.no}</td>
    <td class="r">${fmtKm(tot.san_km)}</td>
    <td class="r">${fmtKm(tot.opt_km)}</td>
    <td class="r">${fmtKm(tot.cancel_km)}</td>
    <td class="r">${totEff}%</td>
    <td class="r">${fmtR(tot.cash)}</td>
    <td class="r">${fmt0(tot.pass)}</td>
    <td class="r">${fmt0(tot.student)}</td>
    <td class="r">${fmt0(tot.diesel)} L</td>
    <td class="r">—</td>
    <td class="r">—</td>
  </tr>`;

  return `
  <div class="ph">
    <div><div class="ph-title">📊 Service Wise Report</div><div class="ph-sub">Trip type breakdown — all schedules grouped by service type</div></div>
    <span class="sp"></span>
    <button class="print-btn" onclick="window.print()">🖨 Print</button>
  </div>
  ${cards}
  <div class="tbl-wrap">
    <div class="tbl-hdr"><span class="tbl-title">Service Type Summary</span><span class="tbl-sub">&nbsp;•&nbsp; Mixed-type SCHs counted per type</span></div>
    <table>
      <thead><tr>
        <th>TYPE</th><th class="r">SCHEDS</th><th class="r">TRIPS</th>
        <th class="r">OPERATED</th><th class="r">CANCELLED</th>
        <th class="r">SAN KM</th><th class="r">OPT KM</th><th class="r">CANCEL KM</th>
        <th class="r">EFF%</th>
        <th class="r">CASH</th><th class="r">ALL PASS</th><th class="r">STU PASS</th>
        <th class="r">DIESEL</th><th class="r">KMPL</th><th class="r">EPKM</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// 2. SCHEDULE WISE REPORT (with mixed-type sub-grouping)
// ══════════════════════════════════════════════════════════
function renderSchWise() {
  const schMaster = buildSchMaster();
  const tcBySch = getTCBySchId();
  const dieselBySch = getDieselBySchId();
  const svcBySch = getServiceBySchId();

  // Collect all SCH IDs from TC data
  const allSchIds = Object.keys(tcBySch).sort((a,b) => a.localeCompare(b));

  // Filter state
  const filterType = window._swFilter || 'ALL';
  const filterStatus = window._swStatus || 'ALL';

  let rows = '';
  let tot = {scheds:0, trips:0, yes:0, no:0, san_km:0, opt_km:0, cancel_km:0, cash:0, pass:0, diesel:0};

  for (const schId of allSchIds) {
    const tcTrips = tcBySch[schId] || [];
    const diesel = dieselBySch[schId];
    const service = svcBySch[schId];
    const master = schMaster[schId] || {};

    // Group trips by type for this SCH
    const byType = {};
    for (const r of tcTrips) {
      if (!byType[r.trip_type]) byType[r.trip_type] = [];
      byType[r.trip_type].push(r);
    }
    const typeKeys = Object.keys(byType).sort();
    const isMixed = typeKeys.length > 1;

    // Apply type filter
    if (filterType !== 'ALL' && !typeKeys.includes(filterType)) continue;

    const schAgg = aggTC(tcTrips);
    const schCash = service ? service.cash_total : 0;
    const schDiesel = diesel ? diesel.diesel_l : 0;
    const schKmpl = diesel ? diesel.kmpl : 0;
    const schVeh = (tcTrips[0]||{}).vehicle_no || '';
    const schDriver = (tcTrips[0]||{}).driver_name || '';

    // Apply status filter
    if (filterStatus === 'DONE' && (schAgg.yes < schAgg.trips)) continue;
    if (filterStatus === 'PENDING' && (schAgg.yes >= schAgg.trips)) continue;

    tot.scheds++;
    tot.trips += schAgg.trips;
    tot.yes += schAgg.yes;
    tot.no += schAgg.no;
    tot.san_km += schAgg.san_km;
    tot.opt_km += schAgg.opt_km;
    tot.cancel_km += schAgg.cancel_km;
    tot.cash += schCash;
    tot.pass += schAgg.all_pass;
    tot.diesel += schDiesel;

    if (isMixed) {
      // ── MIXED TYPE: show SCH header + type sub-groups ──
      const completePct = schAgg.trips ? Math.round(schAgg.yes/schAgg.trips*100) : 0;
      rows += `
      <tr class="grp-hdr">
        <td colspan="2"><span style="font-size:13px">⚡ ${schId}</span>&nbsp;<span style="color:var(--txt2);font-weight:400;font-size:11px">${master.name||''}</span>&nbsp;&nbsp;${typeKeys.map(t=>typBadge(t)).join(' ')}&nbsp;<span style="color:var(--txt3);font-size:10px;font-family:var(--mono)">[MIXED]</span></td>
        <td class="r">${schAgg.trips}</td>
        <td class="r st-yes">${schAgg.yes}</td>
        <td class="r st-no">${schAgg.no}</td>
        <td class="r">${fmtKm(schAgg.san_km)}</td>
        <td class="r">${fmtKm(schAgg.opt_km)}</td>
        <td class="r" style="color:var(--red)">${fmtKm(schAgg.cancel_km)}</td>
        <td class="r">${completePct}%</td>
        <td class="r">${fmtR(schCash)}</td>
        <td class="r">${fmt0(schAgg.all_pass)}</td>
        <td class="r">${schDiesel||'—'} ${schDiesel?'L':''}</td>
        <td class="r ${kmplCls(schKmpl)}">${schKmpl||'—'}</td>
        <td>${schVeh}</td>
      </tr>`;

      // Per-type sub-rows
      for (const t of typeKeys) {
        const tAgg = aggTC(byType[t]);
        const clsName = 'type-divider ' + (t.toLowerCase());
        rows += `<tr class="${clsName}"><td colspan="14" style="padding-left:28px">▸ ${typBadge(t)} &nbsp; ${byType[t].length} trips within SCH ${schId}</td></tr>`;

        for (const trip of byType[t]) {
          rows += `
          <tr class="sub-row">
            <td style="padding-left:36px;color:var(--txt2);font-size:11px">&nbsp;↳ Trip</td>
            <td style="font-size:12px;color:var(--txt2)">${trip.route}</td>
            <td class="r">1</td>
            <td class="r">${stBadge(trip.status)}</td>
            <td class="r">${trip.status==='NO'?'<span class="st-no">1</span>':'—'}</td>
            <td class="r">${fmtKm(trip.san_km)}</td>
            <td class="r">${fmtKm(trip.opt_km)}</td>
            <td class="r" style="color:var(--red)">${fmtKm(trip.cancel_km)}</td>
            <td class="r">—</td>
            <td class="r">—</td>
            <td class="r">${trip.all_pass||'—'}</td>
            <td class="r">—</td>
            <td class="r">—</td>
            <td style="font-size:11px;color:var(--txt2)">${trip.vehicle_no}</td>
          </tr>`;
        }

        // Type sub-total
        const tEff = tAgg.san_km ? (tAgg.opt_km/tAgg.san_km*100).toFixed(1)+'%' : '—';
        rows += `
        <tr class="type-subtotal">
          <td colspan="2" style="padding-left:36px;font-size:11px">Subtotal — ${typBadge(t)}</td>
          <td class="r">${tAgg.trips}</td>
          <td class="r st-yes">${tAgg.yes}</td>
          <td class="r st-no">${tAgg.no}</td>
          <td class="r">${fmtKm(tAgg.san_km)}</td>
          <td class="r">${fmtKm(tAgg.opt_km)}</td>
          <td class="r" style="color:var(--red)">${fmtKm(tAgg.cancel_km)}</td>
          <td class="r">${tEff}</td>
          <td colspan="5"></td>
        </tr>`;
      }

    } else {
      // ── SINGLE TYPE: simple row ──
      const t = typeKeys[0] || '';
      const completePct = schAgg.trips ? Math.round(schAgg.yes/schAgg.trips*100) : 0;
      const pctColor = completePct===100?'var(--green)':completePct>50?'var(--amber)':'var(--red)';
      rows += `
      <tr>
        <td><span style="font-family:var(--mono);font-size:12px">${schId}</span></td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;font-size:12px">${master.name||''}</td>
        <td class="r">${schAgg.trips}</td>
        <td class="r st-yes">${schAgg.yes}</td>
        <td class="r st-no">${schAgg.no}</td>
        <td class="r">${fmtKm(schAgg.san_km)}</td>
        <td class="r">${fmtKm(schAgg.opt_km)}</td>
        <td class="r" style="color:var(--red)">${fmtKm(schAgg.cancel_km)}</td>
        <td class="r" style="color:${pctColor};font-weight:700">${completePct}%</td>
        <td class="r">${fmtR(schCash)}</td>
        <td class="r">${fmt0(schAgg.all_pass)}</td>
        <td class="r">${schDiesel||'—'} ${schDiesel?'L':''}</td>
        <td class="r ${kmplCls(schKmpl)}">${schKmpl||'—'}</td>
        <td>${typBadge(t)} ${schVeh}</td>
      </tr>`;
    }
  }

  // Total row
  const totEff = tot.san_km ? (tot.opt_km/tot.san_km*100).toFixed(1) : '—';
  rows += `
  <tr class="tfoot-row">
    <td colspan="2"><strong>GRAND TOTAL</strong></td>
    <td class="r">${tot.trips}</td>
    <td class="r st-yes">${tot.yes}</td>
    <td class="r st-no">${tot.no}</td>
    <td class="r">${fmtKm(tot.san_km)}</td>
    <td class="r">${fmtKm(tot.opt_km)}</td>
    <td class="r" style="color:var(--red)">${fmtKm(tot.cancel_km)}</td>
    <td class="r">${totEff}%</td>
    <td class="r">${fmtR(tot.cash)}</td>
    <td class="r">${fmt0(tot.pass)}</td>
    <td class="r">${fmt0(tot.diesel)} L</td>
    <td class="r">—</td>
    <td>${tot.scheds} schedules</td>
  </tr>`;

  const typeList = [...new Set((window._rptCD||[]).filter(r=>r.module==='TC').map(r=>r.trip_type))].sort();
  const filterBtns = ['ALL',...typeList].map(t => `<button class="filter-btn ${t===filterType?'act':''}" onclick="window._swFilter='${t}';rptShow('schwise')">${t}</button>`).join('');
  const statusBtns = [['ALL','ALL'],['DONE','✅ Completed'],['PENDING','⏳ Pending']].map(([v,l]) =>
    `<button class="filter-btn ${v===filterStatus?'act':''}${v==='DONE'?' green':v==='PENDING'?' amber':''}" onclick="window._swStatus='${v}';rptShow('schwise')">${l}</button>`).join('');

  return `
  <div class="ph">
    <div><div class="ph-title">📋 Schedule Wise Report</div><div class="ph-sub">⚡ Mixed-type SCHs show type sub-groups with trip-level detail</div></div>
    <span class="sp"></span>
    <button class="print-btn" onclick="window.print()">🖨 Print</button>
  </div>
  <div class="filters">
    <strong style="font-size:12px;color:var(--txt2)">TYPE:</strong>${filterBtns}
    &nbsp;&nbsp;<strong style="font-size:12px;color:var(--txt2)">STATUS:</strong>${statusBtns}
  </div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><span class="tbl-title">All Schedules</span><span class="tbl-sub">&nbsp;•&nbsp;${tot.scheds} shown</span></div>
    <table>
      <thead><tr>
        <th>SCH ID</th><th>NAME</th>
        <th class="r">TRIPS</th><th class="r">OPR</th><th class="r">CAN</th>
        <th class="r">SAN KM</th><th class="r">OPT KM</th><th class="r">CAN KM</th>
        <th class="r">COMP%</th>
        <th class="r">CASH</th><th class="r">PASS</th>
        <th class="r">DIESEL</th><th class="r">KMPL</th>
        <th>TYPE / VEH</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// 3. TRIP WISE (TC) REPORT
// ══════════════════════════════════════════════════════════
function renderTripWise() {
  const tcRows = (window._rptCD||[]).filter(r => r.module === 'TC').sort((a,b) => {
    if(a.sch_id < b.sch_id) return -1;
    if(a.sch_id > b.sch_id) return 1;
    return 0;
  });

  const filterType = window._twFilter || 'ALL';
  const filtered = filterType === 'ALL' ? tcRows : tcRows.filter(r => r.trip_type === filterType);

  let tot = {trips:0, yes:0, no:0, san:0, opt:0, can:0, pass:0};
  let rows = '';
  let prevSch = null;
  let schTot = null;

  for (const r of filtered) {
    if (r.sch_id !== prevSch) {
      // Flush previous SCH total
      if (schTot && schTot.trips > 1) {
        rows += `<tr style="background:rgba(56,139,253,.04);font-size:11px">
          <td colspan="3" style="padding-left:20px;color:var(--txt2)">Subtotal ${prevSch}</td>
          <td class="r" style="color:var(--blue)">${schTot.trips}</td>
          <td class="r st-yes">${schTot.yes}</td><td class="r st-no">${schTot.no}</td>
          <td class="r">${fmtKm(schTot.san)}</td><td class="r">${fmtKm(schTot.opt)}</td>
          <td class="r" style="color:var(--red)">${fmtKm(schTot.can)}</td>
          <td class="r">${fmt0(schTot.pass)}</td><td colspan="3"></td>
        </tr>`;
      }
      prevSch = r.sch_id;
      schTot = {trips:0, yes:0, no:0, san:0, opt:0, can:0, pass:0};
    }
    schTot.trips++; schTot.yes+=(r.status==='YES'?1:0); schTot.no+=(r.status==='NO'?1:0);
    schTot.san+=r.san_km; schTot.opt+=r.opt_km; schTot.can+=r.cancel_km; schTot.pass+=r.all_pass;
    tot.trips++; tot.yes+=(r.status==='YES'?1:0); tot.no+=(r.status==='NO'?1:0);
    tot.san+=r.san_km; tot.opt+=r.opt_km; tot.can+=r.cancel_km; tot.pass+=r.all_pass;

    rows += `<tr>
      <td><span style="font-family:var(--mono);font-size:12px">${r.sch_id}</span></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;font-size:12px">${r.route}</td>
      <td>${typBadge(r.trip_type)}</td>
      <td class="r">${stBadge(r.status)}</td>
      <td class="r st-yes">${r.status==='YES'?'1':'—'}</td>
      <td class="r st-no">${r.status==='NO'?'1':'—'}</td>
      <td class="r">${fmtKm(r.san_km)}</td>
      <td class="r">${fmtKm(r.opt_km)}</td>
      <td class="r" style="color:var(--red)">${fmtKm(r.cancel_km)}</td>
      <td class="r">${r.all_pass||'—'}</td>
      <td style="font-size:11px;color:var(--txt2)">${r.vehicle_no}</td>
      <td style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${r.driver_name}</td>
      <td style="font-size:10px;color:var(--txt3)">${r.entry_time}</td>
    </tr>`;
  }

  // Flush last
  if (schTot && schTot.trips > 1 && prevSch) {
    rows += `<tr style="background:rgba(56,139,253,.04);font-size:11px">
      <td colspan="3" style="padding-left:20px;color:var(--txt2)">Subtotal ${prevSch}</td>
      <td class="r" style="color:var(--blue)">${schTot.trips}</td>
      <td class="r st-yes">${schTot.yes}</td><td class="r st-no">${schTot.no}</td>
      <td class="r">${fmtKm(schTot.san)}</td><td class="r">${fmtKm(schTot.opt)}</td>
      <td class="r" style="color:var(--red)">${fmtKm(schTot.can)}</td>
      <td class="r">${fmt0(schTot.pass)}</td><td colspan="3"></td>
    </tr>`;
  }

  rows += `<tr class="tfoot-row">
    <td colspan="3"><strong>TOTAL</strong></td>
    <td class="r">${tot.trips}</td><td class="r st-yes">${tot.yes}</td><td class="r st-no">${tot.no}</td>
    <td class="r">${fmtKm(tot.san)}</td><td class="r">${fmtKm(tot.opt)}</td>
    <td class="r" style="color:var(--red)">${fmtKm(tot.can)}</td>
    <td class="r">${fmt0(tot.pass)}</td><td colspan="3"></td>
  </tr>`;

  const typeList = [...new Set((window._rptCD||[]).filter(r=>r.module==='TC').map(r=>r.trip_type))].sort();
  const filterBtns = ['ALL',...typeList].map(t=>`<button class="filter-btn ${t===filterType?'act':''}" onclick="window._twFilter='${t}';rptShow('tripwise')">${t}</button>`).join('');

  return `
  <div class="ph">
    <div><div class="ph-title">🔁 Trip Wise Report (TC)</div><div class="ph-sub">Every trip record with status, KM and passenger data</div></div>
    <span class="sp"></span>
    <button class="print-btn" onclick="window.print()">🖨 Print</button>
  </div>
  <div class="filters">${filterBtns}</div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><span class="tbl-title">All TC Entries</span><span class="tbl-sub">&nbsp;•&nbsp;${filtered.length} trips</span></div>
    <table>
      <thead><tr>
        <th>SCH ID</th><th>ROUTE</th><th>TYPE</th>
        <th class="r">STATUS</th><th class="r">OPR</th><th class="r">CAN</th>
        <th class="r">SAN KM</th><th class="r">OPT KM</th><th class="r">CAN KM</th>
        <th class="r">PASS</th><th>VEHICLE</th><th>DRIVER</th><th>TIME</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// 4. CASH WISE REPORT
// ══════════════════════════════════════════════════════════
function renderCashWise() {
  const svcRows = (window._rptCD||[]).filter(r => r.module === 'SERVICE').sort((a,b)=>a.sch_id.localeCompare(b.sch_id));
  const tcBySch = getTCBySchId();
  const schMaster = buildSchMaster();

  let tot = {cash:0, pass:0, student:0, dhaba:0, epkm_sum:0, epkm_cnt:0};
  let rows = '';

  for (const r of svcRows) {
    const master = schMaster[r.sch_id] || {};
    const tcTrips = tcBySch[r.sch_id] || [];
    const optKm = tcTrips.reduce((s,t)=>s+t.opt_km, 0);
    const epkm = optKm && r.cash_total ? (r.cash_total/optKm).toFixed(2) : r.epkm || '—';

    tot.cash += r.cash_total;
    tot.pass += r.all_pass;
    tot.student += r.student_pass;
    tot.dhaba += r.dhaba;
    if (r.epkm) { tot.epkm_sum += r.epkm; tot.epkm_cnt++; }

    rows += `<tr>
      <td><span style="font-family:var(--mono);font-size:12px">${r.sch_id}</span></td>
      <td style="font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis">${master.name||''}</td>
      <td>${typBadge(r.trip_type)}</td>
      <td class="r">${fmtKm(r.opt_km)} km</td>
      <td class="r oc-amount">${fmtR(r.cash_total)}</td>
      <td class="r">${fmt0(r.all_pass)}</td>
      <td class="r">${fmt0(r.student_pass)}</td>
      <td class="r">${fmtR(r.dhaba)}</td>
      <td class="r" style="color:var(--teal)">${epkm !== '—' ? '₹'+epkm : '—'}</td>
      <td style="font-size:11px;color:var(--txt2)">${r.conductor_badge}</td>
      <td style="font-size:10px;color:var(--txt3)">${r.entry_time}</td>
    </tr>`;
  }

  const avgEpkm = tot.epkm_cnt ? (tot.epkm_sum/tot.epkm_cnt).toFixed(2) : '—';
  rows += `<tr class="tfoot-row">
    <td colspan="3"><strong>TOTAL</strong></td>
    <td class="r">${fmtKm(svcRows.reduce((s,r)=>s+r.opt_km,0))} km</td>
    <td class="r oc-amount">${fmtR(tot.cash)}</td>
    <td class="r">${fmt0(tot.pass)}</td>
    <td class="r">${fmt0(tot.student)}</td>
    <td class="r">${fmtR(tot.dhaba)}</td>
    <td class="r" style="color:var(--teal)">${avgEpkm!=='—'?'₹'+avgEpkm:'—'}</td>
    <td colspan="2">${svcRows.length} entries</td>
  </tr>`;

  return `
  <div class="ph">
    <div><div class="ph-title">💰 Cash Wise Report</div><div class="ph-sub">Cash collection by schedule — from SERVICE module</div></div>
    <span class="sp"></span>
    <button class="print-btn" onclick="window.print()">🖨 Print</button>
  </div>
  <div class="cards">
    <div class="card amber"><div class="card-ico">💰</div><div class="card-val">${fmtR(tot.cash)}</div><div class="card-lbl">Total Cash</div></div>
    <div class="card teal"><div class="card-ico">👤</div><div class="card-val">${fmt0(tot.pass)}</div><div class="card-lbl">All Pass</div></div>
    <div class="card blue"><div class="card-ico">🎓</div><div class="card-val">${fmt0(tot.student)}</div><div class="card-lbl">Student Pass</div></div>
    <div class="card purple"><div class="card-ico">🍽️</div><div class="card-val">${fmtR(tot.dhaba)}</div><div class="card-lbl">Dhaba Income</div></div>
    <div class="card green"><div class="card-ico">📈</div><div class="card-val">₹${avgEpkm}</div><div class="card-lbl">Avg EPKM</div></div>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><span class="tbl-title">Cash Entries — SERVICE Module</span></div>
    <table>
      <thead><tr>
        <th>SCH ID</th><th>NAME</th><th>TYPE</th>
        <th class="r">OPT KM</th><th class="r">CASH</th>
        <th class="r">ALL PASS</th><th class="r">STU PASS</th>
        <th class="r">DHABA</th><th class="r">EPKM</th>
        <th>CONDUCTOR</th><th>TIME</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ══════════════════════════════════════════════════════════

      <td class="r">${r.diversion_km||'—'}</td>

    <td class="r">${fmtKm(tot.opt_km)}</td>
    <td class="r" style="color:var(--amber)">${fmt0(tot.diesel)} L</td>
    <td class="r">${fmt0(tot.uria)} L</td>
    <td class="r ${kmplCls(+totKmpl)}">${totKmpl}</td>
    <td class="r">${fmt0(tot.dead)}</td>
    <td class="r">${fmt0(tot.div)}</td>
    <td colspan="3">${dslRows.length} entries</td>
  </tr>`;

  return `
  <div class="ph">
    <div><div class="ph-title">⛽ Fuel Wise Report</div><div class="ph-sub">Diesel / Urea consumption and KMPL per schedule</div></div>
    <span class="sp"></span>
    <button class="print-btn" onclick="window.print()">🖨 Print</button>
  </div>
  <div class="cards">
    <div class="card amber"><div class="card-ico">⛽</div><div class="card-val">${fmt0(tot.diesel)} L</div><div class="card-lbl">Total Diesel</div></div>
    <div class="card blue"><div class="card-ico">🛣️</div><div class="card-val">${fmt0(tot.opt_km)}</div><div class="card-lbl">Operated KM</div></div>
    <div class="card green"><div class="card-ico">📊</div><div class="card-val">${totKmpl}</div><div class="card-lbl">Fleet KMPL</div></div>
    <div class="card teal"><div class="card-ico">🔵</div><div class="card-val">${fmt0(tot.uria)} L</div><div class="card-lbl">Urea Used</div></div>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><span class="tbl-title">Fuel Entries — DIESEL Module</span></div>
    <table>
      <thead><tr>
        <th>SCH ID</th><th>NAME</th><th>TYPE</th>
        <th class="r">OPT KM</th><th class="r">DIESEL</th><th class="r">UREA</th>
        <th class="r">KMPL</th><th class="r">DEAD KM</th><th class="r">DIV KM</th>
        <th>VEHICLE</th><th>DRIVER</th><th>TIME</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// 7. VEHICLE WISE REPORT
// ══════════════════════════════════════════════════════════
function renderVehWise() {
  // From TC data, group by vehicle
  const tcRows = (window._rptCD||[]).filter(r => r.module === 'TC' && r.vehicle_no);
  const dslRows = (window._rptCD||[]).filter(r => r.module === 'DIESEL' && r.vehicle_no);

  const vehMap = {};
  for (const r of tcRows) {
    const v = r.vehicle_no;
    if (!vehMap[v]) vehMap[v] = {vehicle_no:v, vtype:r.vehicle_type, scheds:new Set(), trips:0, yes:0, no:0, san_km:0, opt_km:0, diesel:0, kmpl:0, kmpl_cnt:0, driver:'', driver_badge:''};
    vehMap[v].scheds.add(r.sch_id);
    vehMap[v].trips++;
    if (r.status==='YES') vehMap[v].yes++;
    else if (r.status==='NO') vehMap[v].no++;
    vehMap[v].san_km += r.san_km;
    vehMap[v].opt_km += r.opt_km;
    if (r.driver_name) vehMap[v].driver = r.driver_name;
    if (r.driver_badge) vehMap[v].driver_badge = r.driver_badge;
  }
  for (const r of dslRows) {
    const v = r.vehicle_no;
    if (!vehMap[v]) continue;
    vehMap[v].diesel += r.diesel_l;
    if (r.kmpl) { vehMap[v].kmpl += r.kmpl; vehMap[v].kmpl_cnt++; }
  }

  const vehs = Object.values(vehMap).sort((a,b) => b.opt_km - a.opt_km);
  let tot = {scheds:new Set(), trips:0, yes:0, no:0, san_km:0, opt_km:0, diesel:0};
  let rows = '';

  for (const v of vehs) {
    const avgKmpl = v.kmpl_cnt ? (v.kmpl/v.kmpl_cnt).toFixed(2) : '—';
    tot.scheds = new Set([...tot.scheds, ...v.scheds]);
    tot.trips += v.trips; tot.yes += v.yes; tot.no += v.no;
    tot.san_km += v.san_km; tot.opt_km += v.opt_km; tot.diesel += v.diesel;

    rows += `<tr>
      <td><span style="font-family:var(--mono);font-weight:600">${v.vehicle_no}</span></td>
      <td><span class="badge-tag" style="background:var(--surf2);color:var(--txt2);font-size:10px">${v.vtype}</span></td>
      <td class="r">${v.scheds.size}</td>
      <td class="r">${v.trips}</td>
      <td class="r st-yes">${v.yes}</td>
      <td class="r st-no">${v.no}</td>
      <td class="r">${fmtKm(v.san_km)}</td>
      <td class="r">${fmtKm(v.opt_km)}</td>
      <td class="r" style="color:var(--amber)">${v.diesel||'—'} ${v.diesel?'L':''}</td>
      <td class="r ${kmplCls(+avgKmpl)}">${avgKmpl}</td>
      <td style="font-size:11px">${v.driver}</td>
    </tr>`;
  }

  const totKmpl = tot.diesel ? (tot.opt_km/tot.diesel).toFixed(2) : '—';
  rows += `<tr class="tfoot-row">
    <td colspan="2"><strong>TOTAL</strong></td>
    <td class="r">${tot.scheds.size}</td>
    <td class="r">${tot.trips}</td>
    <td class="r st-yes">${tot.yes}</td>
    <td class="r st-no">${tot.no}</td>
    <td class="r">${fmtKm(tot.san_km)}</td>
    <td class="r">${fmtKm(tot.opt_km)}</td>
    <td class="r" style="color:var(--amber)">${fmt0(tot.diesel)} L</td>
    <td class="r ${kmplCls(+totKmpl)}">${totKmpl}</td>
    <td>${vehs.length} vehicles</td>
  </tr>`;

  return `
  <div class="ph">
    <div><div class="ph-title">🚌 Vehicle Wise Report</div><div class="ph-sub">Performance by vehicle — KM, trips, diesel and KMPL</div></div>
    <span class="sp"></span>
    <button class="print-btn" onclick="window.print()">🖨 Print</button>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><span class="tbl-title">Vehicle Performance</span><span class="tbl-sub">&nbsp;•&nbsp;${vehs.length} vehicles active</span></div>
    <table>
      <thead><tr>
        <th>VEH NO</th><th>TYPE</th><th class="r">SCHEDS</th>
        <th class="r">TRIPS</th><th class="r">OPR</th><th class="r">CAN</th>
        <th class="r">SAN KM</th><th class="r">OPT KM</th>
        <th class="r">DIESEL</th><th class="r">KMPL</th><th>DRIVER</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// 8. DAILY SUMMARY REPORT
// ══════════════════════════════════════════════════════════
function renderDailySummary() {
  const tc = (window._rptCD||[]).filter(r => r.module === 'TC');
  const svc = (window._rptCD||[]).filter(r => r.module === 'SERVICE');
  const dsl = (window._rptCD||[]).filter(r => r.module === 'DIESEL');
  const oc = (window._rptCD||[]).filter(r => r.module === 'ONLY_CASH');

  const scheds = new Set(tc.map(r=>r.sch_id)).size;
  const trips = tc.length;
  const yes = tc.filter(r=>r.status==='YES').length;
  const no = tc.filter(r=>r.status==='NO').length;
  const sanKm = tc.reduce((s,r)=>s+r.san_km,0);
  const optKm = tc.reduce((s,r)=>s+r.opt_km,0);
  const canKm = tc.reduce((s,r)=>s+r.cancel_km,0);
  const cash = svc.reduce((s,r)=>s+r.cash_total,0);
  const ocCash = oc.reduce((s,r)=>s+r.cash_total,0);
  const allPass = svc.reduce((s,r)=>s+r.all_pass,0);
  const stuPass = svc.reduce((s,r)=>s+r.student_pass,0);
  const dhaba = svc.reduce((s,r)=>s+r.dhaba,0);
  const diesel = dsl.reduce((s,r)=>s+r.diesel_l,0);
  const urea = dsl.reduce((s,r)=>s+r.uria_l,0);
  const fleetKmpl = diesel ? (optKm/diesel).toFixed(2) : '—';
  const date = ((window._rptCD||[])[0]||{}).date || '—';

  // Type-wise summary
  const typeMap = {};
  for (const r of tc) {
    if (!typeMap[r.trip_type]) typeMap[r.trip_type] = {scheds:new Set(),trips:0,yes:0,no:0,san:0,opt:0,can:0};
    typeMap[r.trip_type].scheds.add(r.sch_id+'_'+r.trip_type);
    typeMap[r.trip_type].trips++;
    if(r.status==='YES')typeMap[r.trip_type].yes++;
    else if(r.status==='NO')typeMap[r.trip_type].no++;
    typeMap[r.trip_type].san += r.san_km;
    typeMap[r.trip_type].opt += r.opt_km;
    typeMap[r.trip_type].can += r.cancel_km;
  }

  // Add cash from SERVICE to type map
  for (const r of svc) {
    if (typeMap[r.trip_type]) {
      if (!typeMap[r.trip_type].cash) typeMap[r.trip_type].cash = 0;
      typeMap[r.trip_type].cash += r.cash_total;
    }
  }

  const typeRows = Object.entries(typeMap).sort().map(([t,d]) => `
    <tr>
      <td>${typBadge(t)}</td>
      <td class="r">${d.scheds.size}</td>
      <td class="r">${d.trips}</td>
      <td class="r st-yes">${d.yes}</td>
      <td class="r st-no">${d.no}</td>
      <td class="r">${fmtKm(d.san)}</td>
      <td class="r">${fmtKm(d.opt)}</td>
      <td class="r" style="color:var(--red)">${fmtKm(d.can)}</td>
      <td class="r">${fmtR(d.cash||0)}</td>
    </tr>`).join('');

  return `
  <div class="ph">
    <div><div class="ph-title">📅 Daily Summary</div><div class="ph-sub">${date} — Complete operational overview</div></div>
    <span class="sp"></span>
    <button class="print-btn" onclick="window.print()">🖨 Print</button>
  </div>
  <div class="cards">
    <div class="card blue"><div class="card-ico">📋</div><div class="card-val">${scheds}</div><div class="card-lbl">Schedules</div><div class="card-sub">${trips} total trips</div></div>
    <div class="card green"><div class="card-ico">✅</div><div class="card-val">${yes}</div><div class="card-lbl">Operated Trips</div><div class="card-sub">${trips?((yes/trips)*100).toFixed(1):0}% efficiency</div></div>
    <div class="card red"><div class="card-ico">❌</div><div class="card-val">${no}</div><div class="card-lbl">Cancelled Trips</div><div class="card-sub">${fmtKm(canKm)} cancel km</div></div>
    <div class="card amber"><div class="card-ico">🛣️</div><div class="card-val">${fmt0(optKm)}</div><div class="card-lbl">Operated KM</div><div class="card-sub">San: ${fmt0(sanKm)} km</div></div>
    <div class="card teal"><div class="card-ico">💰</div><div class="card-val">${fmtR(cash+ocCash)}</div><div class="card-lbl">Total Revenue</div><div class="card-sub">SC:${fmtR(cash)} + OC:${fmtR(ocCash)}</div></div>
    <div class="card purple"><div class="card-ico">👤</div><div class="card-val">${fmt0(allPass)}</div><div class="card-lbl">Total Passengers</div><div class="card-sub">Students: ${fmt0(stuPass)}</div></div>
    <div class="card orange"><div class="card-ico">⛽</div><div class="card-val">${fmt0(diesel)} L</div><div class="card-lbl">Diesel Consumed</div><div class="card-sub">KMPL: ${fleetKmpl}</div></div>
    <div class="card green"><div class="card-ico">🍽️</div><div class="card-val">${fmtR(dhaba)}</div><div class="card-lbl">Dhaba Income</div></div>
  </div>
  <div class="tbl-wrap">
    <div class="tbl-hdr"><span class="tbl-title">Service Type Breakdown</span><span class="tbl-sub">&nbsp;•&nbsp;Mixed SCHs counted per type</span></div>
    <table>
      <thead><tr>
        <th>TYPE</th><th class="r">SCHEDS</th><th class="r">TRIPS</th>
        <th class="r">OPR</th><th class="r">CAN</th>
        <th class="r">SAN KM</th><th class="r">OPT KM</th><th class="r">CAN KM</th>
        <th class="r">CASH</th>
      </tr></thead>
      <tbody>${typeRows}</tbody>
    </table>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:0">
    <div class="tbl-wrap" style="margin-bottom:0">
      <div class="tbl-hdr"><span class="tbl-title">Fuel Summary</span></div>
      <table>
        <tbody>
          <tr><td>Total Diesel</td><td class="r" style="color:var(--amber)">${fmt0(diesel)} L</td></tr>
          <tr><td>Total Urea</td><td class="r">${fmt0(urea)} L</td></tr>
          <tr><td>Operated KM</td><td class="r">${fmt0(optKm)} km</td></tr>
          <tr><td style="font-weight:700">Fleet KMPL</td><td class="r ${kmplCls(+fleetKmpl)}" style="font-weight:700">${fleetKmpl}</td></tr>
        </tbody>
      </table>
    </div>
    <div class="tbl-wrap" style="margin-bottom:0">
      <div class="tbl-hdr"><span class="tbl-title">Revenue Summary</span></div>
      <table>
        <tbody>
          <tr><td>Schedule Cash</td><td class="r" style="color:var(--amber)">${fmtR(cash)}</td></tr>
          <tr><td>Only Cash</td><td class="r" style="color:var(--teal)">${fmtR(ocCash)}</td></tr>
          <tr><td>Dhaba</td><td class="r">${fmtR(dhaba)}</td></tr>
          <tr><td style="font-weight:700">Grand Total</td><td class="r" style="color:var(--green);font-weight:700">${fmtR(cash+ocCash+dhaba)}</td></tr>
        </tbody>
      </table>
    </div>
  </div>`;
}


</script>
