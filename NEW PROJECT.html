// Schedule selector specifically for allotment page
function schSelHTML_allot(sel){
  const cards=S.schIds.map(id=>{
    const a=window._aMap&&window._aMap[id]||{};
    const hasV=!!a.vehicleNo;
    const selCls=id===sel?' sel':'';
    const stCls=hasV?'st-done':'st-none';
    return `<div class="sch-card ${stCls}${selCls}" onclick="selAllotSch('${id}')" title="${id}">
      <div class="sch-card-id">${id}</div>
      <div class="sch-card-status">
        ${hasV?`<span class="sch-status-pip pip-done">🚌✓</span>`:`<span class="sch-status-pip pip-pend">Pending</span>`}
      </div>
      <div class="sch-card-bar"><div class="sch-card-bar-fill" style="width:${hasV?100:0}%"></div></div>
    </div>`;
  }).join('');
  const total=S.schIds.length;
  const done=S.schIds.filter(id=>window._aMap&&(window._aMap[id]||{}).vehicleNo).length;
  return `<div class="sch-sel">
    <div class="sch-sel-top">
      <span class="sch-sel-lbl">Select Schedule</span>
      <div class="sch-legend">
        <span class="sch-leg-item"><span class="sch-leg-dot" style="background:var(--green)"></span>${done} Allotted</span>
        <span class="sch-leg-item"><span class="sch-leg-dot" style="background:var(--txt3)"></span>${total-done} Pending</span>
      </div>
      <input class="sch-filter" placeholder="🔍 Filter…" oninput="filterAllotCards(this.value)">
    </div>
    <div class="sch-grid" id="allotGrid">${cards}</div>
  </div>`;
}

function buildVehLookupRows(){
  const allVehs=S.vehicles||[];
  return allVehs.map(v=>{
    const no=v.vehicle||v.vehicleNo||'';
    const type=v.type||v.vehicleType||'';
    const usedBy=window._vehUsed&&window._vehUsed[no];
    const isCurrent=usedBy===S.selSch;
    return `<tr class="vsearch-row">
      <td class="mono" style="font-weight:700">${no}</td>
      <td><span class="pill pill-x">${type}</span></td>
      <td>${usedBy
        ?isCurrent
          ?`<span class="pill pill-b">This schedule</span>`
          :`<span style="color:var(--red);font-weight:700">🔒 In Use</span>`
        :`<span style="color:var(--green);font-weight:700">✓ Free</span>`}</td>
      <td>${usedBy?`<span class="mono" style="font-size:12px;font-weight:700">${usedBy}</span>`:'—'}</td>
    </tr>`;
  }).join('');
}

function selAllotSch(id){
  S.selSch=id;
  renderAllot();
}
// Called when user clicks + CC or + EXT "add new" tile
// Fetches next schId from backend, then opens allotment form
function selAllotNewCE(type, tentativeId){
  showLoad('Preparing '+type+' allotment…');
  gsr('getNextCCExtId',[type, S.date], nextId=>{
    hideLoad();
    S.selSch = nextId || tentativeId;
    renderAllot();
  });
}
function filterAllotCards(v){
  const q=(v||'').toUpperCase();
  document.querySelectorAll('#allotGrid .sch-card, .sch-card').forEach(el=>{
    el.style.display=!q||(function(){var _e=el.querySelector('.sch-card-id');return _e&&_e.textContent.toUpperCase().includes(q);})()?'':'none';
  });
}
function filterVehLookup(q){
  const ql=(q||'').toUpperCase();
  document.querySelectorAll('.vsearch-row').forEach(tr=>{
    tr.style.display=!ql||tr.textContent.toUpperCase().includes(ql)?'':'none';
  });
}

function setAllotMode(mode){
  document.querySelectorAll('.aib-tab').forEach(b=>b.classList.remove('act'));
  (document.getElementById('modeBtn-'+mode)||{}).classList.add('act');
  document.getElementById('allot-single-panel').style.display=mode==='single'?'':'none';
  const mp=document.getElementById('allot-multi-panel');
  if(mp) mp.style.display=mode==='multi'?'':'none';
}

function onSingleVehChange(sel){
  const no=sel.value;
  const v=(S.vehicles||[]).find(x=>(x.vehicle||x.vehicleNo||'')===no);
  const typeEl=document.getElementById('avt_single');
  if(typeEl){
    const typ=v?(v.type||v.vehicleType||''):'';
    // Ensure the type exists as option — add it if missing
    if(typ && !typeEl.querySelector(`option[value="${typ}"]`)){
      const opt=document.createElement('option');
      opt.value=typ; opt.textContent=typ;
      typeEl.appendChild(opt);
    }
    typeEl.value=typ;
    // Visual feedback — highlight if auto-filled
    typeEl.style.borderColor=typ?'var(--green)':'var(--bdr)';
    typeEl.style.background=typ?'var(--green-lt)':'#fff';
    typeEl.style.color=typ?'var(--green)':'var(--txt)';
    typeEl.title=typ?`Auto-filled from vehicle master: ${typ}`:'';
  }
  const hint=document.getElementById('type-auto-hint');
  if(hint) hint.innerHTML=no&&((v||{}).type||(v||{}).vehicleType)?`<span style='color:var(--green);font-weight:800'>⚡ Auto</span>`:'';
}
function onTripVehChange(idx,sel){
  const no=sel.value;
  const v=(S.vehicles||[]).find(x=>(x.vehicle||x.vehicleNo||'')===no);
  const typeEl=document.getElementById('att_'+idx);
  if(typeEl){
    const typ=v?(v.type||v.vehicleType||''):'';
    if(typ && !typeEl.querySelector(`option[value="${typ}"]`)){
      const opt=document.createElement('option');
      opt.value=typ; opt.textContent=typ;
      typeEl.appendChild(opt);
    }
    typeEl.value=typ;
    typeEl.style.borderColor=typ?'var(--green)':'var(--bdr)';
    typeEl.style.background=typ?'var(--green-lt)':'#fff';
    typeEl.style.color=typ?'var(--green)':'var(--txt)';
  }
  const badge=document.getElementById('atbadge_'+idx);
  if(badge){ badge.className=no?'pill pill-g':'pill pill-x'; badge.textContent=no?'✓ Set':'Pending'; }
}
function copyFirstVehToAll(){
  const v0=(document.getElementById('atv_0')||{}).value;
  const t0=(document.getElementById('att_0')||{}).value;
  if(!v0){toast('warn','Select vehicle for Trip 1 first');return;}
  let i=1;
  while(document.getElementById('atv_'+i)){
    const vSel=document.getElementById('atv_'+i);
    if(vSel){ vSel.value=v0; onTripVehChange(i,vSel); }
    i++;
  }
  toast('info',`Vehicle ${v0}${t0?' ('+t0+')':''} copied to all trips`);
}

function saveMultiAllot(){
  let i=0, saved=0, total=0, errs=[];
  while(document.getElementById('atv_'+i)){
    const veh=((document.getElementById('atv_'+i)||{}).value||'').trim();
    const vtype=(document.getElementById('att_'+i)||{}).value||'';
    if(veh){
      total++;
      const dup=Object.keys(window._allotVehMap||{}).find(s=>s!==S.selSch&&window._allotVehMap[s]===veh);
      if(dup){errs.push(`Trip ${i+1}: ${veh} already in ${dup}`);i++;continue;}
      gsr('saveAllotment',[S.date,S.selSch,S.selSch,veh,vtype],res=>{
        saved++;
        if((res||{}).ok) toast('success',`✓ Trip ${i+1}: ${veh} saved`);
        if(saved===total) renderAllot();
      });
    }
    i++;
  }
  if(errs.length) errs.forEach(e=>toast('error',e));
  if(!total){toast('warn','No vehicles selected for any trip');return;}
}

function clearAllot(schId){
  if(!confirm(`Clear vehicle allotment for ${schId}?`)) return;
  showLoad('Clearing…');
  gsr('saveAllotment',[S.date,schId,schId,'',''],res=>{
    hideLoad();
    toast('info',`Allotment cleared for ${schId}`);
    if(window._allotVehMap) delete window._allotVehMap[schId];
    if(window._aMap) delete window._aMap[schId];
    renderAllot();
  });
}

function onAllotVehChange(schId,sel){
  const no=sel.value;
  const v=(S.vehicles||[]).find(x=>(x.vehicle||x.vehicleNo||'')===no);
  if(v){ const t=document.getElementById('avt_'+schId); if(t&&v.type) t.value=v.type; }
}
function saveAllot(schId){
  const veh=((document.getElementById('av_'+schId)||{}).value||'').trim();
  const vtype=(document.getElementById('avt_'+schId)||{}).value||'';
  if(!veh){toast('warn','Select a vehicle for '+schId);return;}
  const dup=Object.keys(window._allotVehMap||{}).find(s=>s!==schId&&window._allotVehMap[s]===veh);
  if(dup){toast('error',`${veh} already allotted to ${dup}`);return;}
  showLoad('Saving…');
  gsr('saveAllotment',[S.date,schId,schId,veh,vtype],res=>{
    hideLoad();
    if((res||{}).ok){
      toast('success',`✓ ${veh} → ${schId} saved`);
      if(!window._allotVehMap) window._allotVehMap={};
      window._allotVehMap[schId]=veh;
      renderAllot();
    } else toast('error',(res||{}).error||'Save failed');
  });
}
function saveAllAllot(){
  let i=0;
  S.schIds.forEach(id=>{ const v=((document.getElementById('av_'+id)||{}).value||'').trim(); if(v) saveAllot(id); });
}
function openVehPick(schId,targetId){
  S.mCtx=schId; S.mCtxField=targetId;
  populateModal('veh');
  openOv('ovVeh');
}


// ═══════════════════════════════════════════════════════════
//  TRIP COMPLETION
// ═══════════════════════════════════════════════════════════
function renderTC(){
  const main=document.getElementById('main');
  main.innerHTML='';

  const header=`<div class="ph fu"><div class="ph-title">✅ Trip Completion</div><div class="ph-sub">Record trip outcome for each schedule — ${dispDate(S.date)}</div></div>`;

  if(!S.selSch){
    // CC/EXT alert: allotted vehicle but CC/EXT Entry not yet started (not in ccExtDailyIds)
    const ceStarted = new Set((S.ccExtDailyIds||[]).map(c=>c.schId.toUpperCase().substring(0,6))); // e.g. 'CC-' or 'EXT-'
    const cePendTC = (S.ccExtDailyIds||[]).filter(c=>c.vehicle && !c.tc);
    const ceBanner = cePendTC.length ? `
      <div class="wbox fu" style="background:#fffbeb;border:2px solid #f59e0b;color:#92400e;display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r)">
        <span style="font-size:20px">🔀</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:800">${cePendTC.length} CC/EXT schedule${cePendTC.length>1?'s':''} allotted but TC not done — click tile below to complete</div>
          <div style="font-size:11px;font-weight:600;margin-top:3px;opacity:.85">
            ${cePendTC.map(c=>`<span style="background:#fde68a;padding:1px 7px;border-radius:4px;margin-right:4px;font-family:var(--mono)">${c.schId} 🚌 ${c.vehicle}</span>`).join('')}
          </div>
        </div>
      </div>` : '';
    main.innerHTML=header+ceBanner+schSelHTML(S.selSch)+`<div class="card fu" style="text-align:center;padding:36px 20px;color:var(--txt3)"><span style="font-size:32px;display:block;margin-bottom:10px;opacity:.3">☝️</span><span style="font-size:15px;font-weight:700;color:var(--txt2);display:block;margin-bottom:4px">Select a Schedule</span><span style="font-size:12px">Click any card above to begin Trip Completion · CC/EXT tiles open CC/EXT Entry directly</span></div>`;
    return;
  }

  showLoad('Loading schedule…');

  // ── CC / EXT schId — use dynamic multi-row table ──────────
  const _isCE = /^(CC|EXT)-/i.test(S.selSch);
  if(_isCE){
    gsr('getExistingEntry',[S.date,S.selSch],existing=>{
      gsr('getEntryStatus',[S.date,S.selSch],status=>{
        hideLoad();
        S.statusCache[S.selSch]=status;
        const tcEx=(existing&&existing.tc)||[];
        const isEdit=tcEx.length>0;
        const isCC=S.selSch.toUpperCase().startsWith('CC-');
        const typeColor=isCC?'#1a56e8':'#b45309';
        const typeBg=isCC?'#e8f0fe':'#fef3e2';
        const typeLabel=isCC?'CC':'EXT';

        // Allotted vehicle from ccExtDailyIds
        const ceInfo=(S.ccExtDailyIds||[]).find(c=>c.schId===S.selSch)||{};
        const allotVeh=ceInfo.vehicle||'';

        // Build initial rows from existing or one blank
        // _ceRows: [{time,from,to,km,status}]
        window._ceRows = isEdit
          ? tcEx.map(r=>({time:'',from:(r.route||'').split(' → ')[0]||'',to:(r.route||'').split(' → ')[1]||'',km:r.sanKm||0,status:r.status||'YES'}))
          : [{time:'',from:'',to:'',km:'',status:'YES'}];

        function buildCETable(){
          const rows = window._ceRows;
          const statusOpts = v => ['YES','NO','BD','OTHER'].map(s=>`<option value="${s}" ${v===s?'selected':''}>${s}</option>`).join('');
          const tbody = rows.map((r,i)=>`
            <tr id="ce_row_${i}">
              <td style="text-align:center;font-size:12px;font-weight:800;color:var(--txt3);padding:6px 4px">${i+1}</td>
              <td><input type="time" class="ce-inp" id="ce_time_${i}" value="${r.time||''}" style="width:90px;padding:5px 8px;font-size:13px;font-weight:700;border:2px solid var(--bdr);border-radius:var(--r2);outline:none"></td>
              <td><input type="text" class="ce-inp" id="ce_from_${i}" value="${r.from||''}" placeholder="From" style="width:110px;padding:5px 8px;font-size:13px;font-weight:700;border:2px solid var(--bdr);border-radius:var(--r2);outline:none"></td>
              <td><input type="text" class="ce-inp" id="ce_to_${i}" value="${r.to||''}" placeholder="To" style="width:110px;padding:5px 8px;font-size:13px;font-weight:700;border:2px solid var(--bdr);border-radius:var(--r2);outline:none"></td>
              <td><input type="number" class="ce-inp" id="ce_km_${i}" value="${r.km||''}" placeholder="KM" step="0.01" min="0" style="width:75px;padding:5px 8px;font-size:13px;font-weight:700;border:2px solid var(--bdr);border-radius:var(--r2);outline:none"></td>
              <td>
                <select class="ce-inp" id="ce_st_${i}" style="padding:5px 6px;font-size:13px;font-weight:700;border:2px solid var(--bdr);border-radius:var(--r2);outline:none">
                  ${statusOpts(r.status||'YES')}
                </select>
              </td>
              <td>
                <button onclick="ceRemoveRow(${i})" style="background:var(--red-lt);color:var(--red);border:2px solid rgba(217,26,26,.25);border-radius:var(--r2);padding:4px 10px;font-size:13px;font-weight:800;cursor:pointer" ${rows.length===1?'disabled':''}>✕</button>
              </td>
            </tr>`).join('');
          return `<table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:var(--surf2)">
              <th style="padding:8px 4px;font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;text-align:center;width:30px">#</th>
              <th style="padding:8px 6px;font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;text-align:left">TIME</th>
              <th style="padding:8px 6px;font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;text-align:left">FROM</th>
              <th style="padding:8px 6px;font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;text-align:left">TO</th>
              <th style="padding:8px 6px;font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;text-align:left">KM</th>
              <th style="padding:8px 6px;font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;text-align:left">STATUS</th>
              <th style="width:40px"></th>
            </tr></thead>
            <tbody>${tbody}</tbody>
          </table>`;
        }

        window.ceRemoveRow = function(i){
          if(window._ceRows.length===1) return;
          window._ceRows.splice(i,1);
          document.getElementById('ce-tbody-wrap').innerHTML=buildCETable();
        };
        window.ceAddRow = function(){
          window._ceRows.push({time:'',from:'',to:'',km:'',status:'YES'});
          document.getElementById('ce-tbody-wrap').innerHTML=buildCETable();
        };
        window.saveCETC = function(advance){
          // Read current values from DOM into _ceRows
          window._ceRows.forEach((r,i)=>{
            r.time  = (document.getElementById(`ce_time_${i}`)||{}).value||'';
            r.from  = (document.getElementById(`ce_from_${i}`)||{}).value||'';
            r.to    = (document.getElementById(`ce_to_${i}`)||{}).value||'';
            r.km    = parseFloat((document.getElementById(`ce_km_${i}`)||{}).value)||0;
            r.status= (document.getElementById(`ce_st_${i}`)||{}).value||'YES';
          });
          const errs=[];
          window._ceRows.forEach((r,i)=>{
            if(!r.km) errs.push(`Row ${i+1}: KM required`);
            if(!r.status) errs.push(`Row ${i+1}: Status required`);
          });
          if(errs.length){showVal('tc',errs);return;}
          hideVal('tc');
          // Build saveEntry data — one row per trip, schNo = schId/1, /2 etc.
          const data = window._ceRows.map((r,i)=>({
            masterId : S.selSch,
            schNo    : S.selSch+'/'+(i+1),
            route    : (r.from||'')+(r.to?' → '+r.to:''),
            km       : r.km,
            tripTime : r.time||'',
            tripType : typeLabel,
            optKm    : r.status==='NO'||r.status==='BD'?0:r.km,
            cancelKm : r.status==='NO'||r.status==='BD'?r.km:0,
            status   : r.status,
            fallbackType: typeLabel,
            date     : S.date
          }));
          showLoad('Saving TC…');
          gsr('saveEntry',[data,'TC'],res=>{
            hideLoad();
            if(typeof res==='string'&&res.startsWith('ERROR')){toast('error',res);return;}
            if(!S.statusCache[S.selSch]) S.statusCache[S.selSch]={};
            S.statusCache[S.selSch].tc={done:true};
            // Update ccExtDailyIds flag
            const ce=(S.ccExtDailyIds||[]).find(c=>c.schId===S.selSch);
            if(ce) ce.tc=true;
            toast('success',`✓ TC saved for ${S.selSch}`);
            updateBadges();
            if(advance) goto('fuel');
            else { S.selSch=''; renderTC(); }
          });
        };

        const totalKm = window._ceRows.reduce((s,r)=>s+(parseFloat(r.km)||0),0);

        main.innerHTML=`
          ${header}
          ${schSelHTML(S.selSch)}
          ${pipeHTML('tc')}
          ${isEdit?`<div class="wbox info fu">✏ Editing existing entry — previous data pre-filled.</div>`:''}
          <div class="card fu" style="padding:0;overflow:hidden">
            <div style="padding:10px 16px;background:${typeBg};border-bottom:2px solid ${typeColor}33;display:flex;align-items:center;gap:10px">
              <span style="font-size:13px;font-weight:900;color:${typeColor}">🔀 ${S.selSch}</span>
              <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:${typeColor};color:#fff">${typeLabel} Schedule</span>
              ${allotVeh?`<span style="font-size:11px;font-weight:700;color:${typeColor}">🚌 ${allotVeh}</span>`:''}
              <span class="sp"></span>
              <span style="font-size:11px;color:var(--txt3);font-weight:600">${window._ceRows.length} trip${window._ceRows.length>1?'s':''}</span>
            </div>
            <div style="padding:14px 16px">
              <div id="ce-tbody-wrap">${buildCETable()}</div>
              <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
                <button onclick="ceAddRow()" style="background:var(--surf2);color:var(--blue);border:2px solid var(--bdr);border-radius:var(--r2);padding:6px 16px;font-size:13px;font-weight:800;cursor:pointer">＋ Add Trip Row</button>
                <span style="font-size:11px;color:var(--txt3);font-weight:600">Total KM: <strong id="ce-total-km">${totalKm.toFixed(2)}</strong></span>
              </div>
            </div>
          </div>
          <div id="tc-val-box"></div>
          <div class="card fu act-bar">
            <button class="btn btn-ghost" onclick="S.selSch='';renderTC()">← Back</button>
            <span class="sp"></span>
            <button class="tc-save-btn" onclick="saveCETC(false)">💾 Save TC</button>
            <button class="tc-save-btn" style="background:var(--green)" onclick="saveCETC(true)">💾 Save &amp; → Fuel</button>
          </div>`;
      });
    });
    return;
  }
  // ── Regular schedule ─────────────────────────────────────
  gsr('getFullSchedule',[S.selSch],trips=>{
    gsr('getExistingEntry',[S.date,S.selSch],existing=>{
      gsr('getEntryStatus',[S.date,S.selSch],status=>{
        hideLoad();
        S.statusCache[S.selSch]=status;

        const tcEx=(existing&&existing.tc)||[];
        const isEdit=tcEx.length>0;
        const hasTrips=(trips||[]).length>0;
        const tripList=trips||[];

        // Pre-fill status from existing save
        if(isEdit) tcEx.forEach((ex,i)=>{ if(ex.status) S.tcStatus[`${S.selSch}_${i}`]=ex.status; });

        // ── MAIN DATA values — immutable from sheet ──────────
        // schNo, route, km (sanKm), time, type — ALL come from
        // getFullSchedule() which reads MAIN DATA sheet. NEVER editable.
        const schName=(tripList[0]||{}).schName||(tripList[0]||{}).route||S.selSch;
        const schType=(tripList[0]||{}).type||'—';
        const tripCount=tripList.length;

        // Sanction KM = fixed from MAIN DATA — sum of all trip km
        const masterSanKm=tripList.reduce((s,t)=>s+(+(t.km||0)),0);
        const masterTripCount=tripList.length;

        // Build vehicle datalist options
        const vehDatalist=`<datalist id="tc_veh_dl_${S.selSch}">${(S.vehicles||[]).map(v=>`<option value="${v.vehicle||v.vehicleNo||''}">`).join('')}</datalist>`;

        // Build table rows — SAN KM is readonly display only (from MAIN DATA)
        function buildRows(){
          return tripList.map((t,i)=>{
            const ex=tcEx[i]||{};
            const st=S.tcStatus[`${S.selSch}_${i}`]||ex.status||'';
            const sanVal=+(t.km||0);
            const optVal=ex.optKm!=null?+(ex.optKm):sanVal;
            const canVal=ex.cancelKm!=null?+(ex.cancelKm):0;
            const selCls=st==='YES'?'yes':st==='NO'?'no':st==='BD'?'bd':st==='OTHER'?'other':'';
            // Vehicle: saved vehicle per trip > allotted vehicle for whole sch
            const tripVeh=ex.vehicle||tcAllotVeh||'';
            return `<tr id="tcrow_${i}">
              <td><div class="tc-sch-num" title="SCH No. from MAIN DATA — fixed">${t.schNo||i+1}</div></td>
              <td><div class="tc-route-cell" title="Route from MAIN DATA — fixed">${t.route||'—'}</div></td>
              <td><div class="tc-time-cell" title="Time from MAIN DATA — fixed">${t.time||'—'}</div></td>
              <td>
                <div class="tc-km-cell" title="Sanctioned KM from MAIN DATA — cannot be changed"
                  style="font-family:var(--mono);font-weight:800;color:var(--txt2);font-size:13px;
                    display:inline-flex;align-items:center;gap:4px">
                  ${sanVal.toFixed(2)}
                  <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);
                    padding:1px 4px;border-radius:3px;border:1px solid var(--bdr);letter-spacing:.3px">MD</span>
                </div>
                <input type="hidden" id="tc_sankm_${S.selSch}_${i}" value="${sanVal}">
              </td>
              <td>
                <div style="display:flex;align-items:center;gap:4px">
                <input class="tc-km-inp green" type="number" step="0.01"
                  id="tc_optkm_${S.selSch}_${i}" value="${optVal.toFixed(2)}"
                  oninput="calcCanKm(${i})" max="${sanVal}"
                  title="Operated KM — enter actual KM run (max = SAN KM ${sanVal})"
                  ${st==='OTHER'?'readonly style="background:var(--surf2);color:var(--txt3);font-style:italic"':''}>
                <button type="button" onclick="fillSanKm(${i})"
                  title="Fill with Sanctioned KM (${sanVal})"
                  style="padding:3px 7px;font-size:10px;font-weight:800;border:1.5px solid rgba(14,158,82,.4);
                    border-radius:4px;background:var(--green-lt);color:var(--green);cursor:pointer;
                    white-space:nowrap;flex-shrink:0">=SAN</button>
              </div>
              </td>
              <td>
                <input class="tc-km-inp red${st==='OTHER'?' other-can':' auto-val'}" type="number" step="0.01"
                  id="tc_cankm_${S.selSch}_${i}" value="${canVal.toFixed(2)}"
                  title="Cancel KM = SAN KM − OPT KM (auto-calculated)"
                  ${st==='OTHER'?`oninput="calcOptKmFromCan(${i})"`:''}>
              </td>
              <td>
                <div style="display:flex;flex-direction:column;gap:0">
                <input type="text" id="tc_veh_${S.selSch}_${i}"
                  value="${tripVeh}" placeholder="Vehicle No."
                  list="tc_veh_dl_${S.selSch}"
                  title="Vehicle operating this trip — change if different from allotted"
                  style="width:115px;padding:5px 8px;font-family:var(--mono);font-size:12px;font-weight:800;
                    border:2px solid ${tripVeh?'var(--blue)':'var(--bdr)'};border-radius:var(--r2);
                    color:var(--blue);background:${tripVeh?'var(--blue-lt)':'#fff'};outline:none"
                  oninput="onTCVehChange('${S.selSch}',${i},this)">
                <div id="tc_veh_hint_${S.selSch}_${i}" style="display:none;font-size:10px;font-weight:700;margin-top:2px;color:var(--txt3)"></div>
              </div>
              </td>
              <td>
                <select class="tc-status-sel ${selCls}" id="tc_st_${S.selSch}_${i}"
                  onchange="onTCStatusChange('${S.selSch}',${i},this)">
                  <option value="">— Select —</option>
                  <option value="YES"   ${st==='YES'?'selected':''}>YES</option>
                  <option value="NO"    ${st==='NO'?'selected':''}>NO</option>
                  <option value="BD"    ${st==='BD'?'selected':''}>BD</option>
                  <option value="OTHER" ${st==='OTHER'?'selected':''}>OTHER</option>
                </select>
              </td>
            </tr>`;
          }).join('')+vehDatalist;
        }

        // Totals calc — SAN KM always from MAIN DATA (tripList), never from DOM input
        function calcTotals(){
          let sanT=0,optT=0,canT=0;
          tripList.forEach((t,i)=>{
            sanT+=+(t.km||0); // MAIN DATA — immutable
            optT+=parseFloat((document.getElementById(`tc_optkm_${S.selSch}_${i}`)||{}).value||0);
            canT+=parseFloat((document.getElementById(`tc_cankm_${S.selSch}_${i}`)||{}).value||0);
          });
          return {sanT,optT,canT};
        }

        // ── Manual fallback ──────────────────────────────
        const manualBlock=!hasTrips?`
          <div class="wbox info">ℹ No MAIN DATA found for <strong>${S.selSch}</strong>. Enter manually.</div>
          <div class="card" style="padding:18px">
            <div class="fgrid">
              <div class="fg s3"><label class="fl">Trip Status <span class="req">*</span></label>
                <div class="tc-wrap">
                  <div class="tc-btn ${S.tcStatus[S.selSch+'_m']==='YES'?'sel-yes':''}" onclick="setTCBtn('${S.selSch}','m','YES')">✓ YES</div>
                  <div class="tc-btn ${S.tcStatus[S.selSch+'_m']==='NO'?'sel-no':''}"  onclick="setTCBtn('${S.selSch}','m','NO')">✗ NO</div>
                  <div class="tc-btn ${S.tcStatus[S.selSch+'_m']==='BD'?'sel-bd':''}"  onclick="setTCBtn('${S.selSch}','m','BD')">⚡ BD</div>
                </div>
              </div>
              <div class="fg"><label class="fl">Route</label><input type="text" id="tc_route_m" placeholder="From → To"></div>
              <div class="fg"><label class="fl">San. KM <span class="req">*</span></label><input type="number" id="tc_sankm_${S.selSch}_m" placeholder="0"></div>
              <div class="fg"><label class="fl">Opt. KM <span class="req">*</span></label><input type="number" id="tc_optkm_${S.selSch}_m" placeholder="0" oninput="calcCanKm('m')"></div>
              <div class="fg"><label class="fl">Cancel KM</label><input type="number" id="tc_cankm_${S.selSch}_m" placeholder="Auto"></div>
              <div class="fg"><label class="fl">Trip Type</label>
                <select id="tc_type_m"><option value="">Regular</option><option value="CC">CC</option><option value="EXT">EXT</option><option value="SLP">SLP</option></select>
              </div>
            </div>
          </div>`:'';

        // ── Allotted vehicle for this schedule ──
        const tcAllotVeh=(window._allotVehMap||{})[S.selSch]||'';

        // ── Compute initial totals — SAN always from MAIN DATA ──
        let initSan=0,initOpt=0,initCan=0;
        tripList.forEach((t,i)=>{
          const ex=tcEx[i]||{};
          initSan+=+(t.km||0);
          initOpt+=+(ex.optKm!=null?ex.optKm:t.km||0);
          initCan+=+(ex.cancelKm||0);
        });

        main.innerHTML=`
          ${header}
          ${schSelHTML(S.selSch)}
          ${pipeHTML('tc')}
          ${isEdit?`<div class="wbox info fu">✏ Editing existing entry — previous data pre-filled.</div>`:''}

          ${hasTrips?`
          <!-- INFO CARDS -->
          <div class="tc-info-strip fu">
            <div class="tc-info-card" style="border-left:3px solid var(--txt3)" title="Sanctioned KM — fixed from MAIN DATA sheet, cannot be changed">
              <div class="ic-lbl" style="display:flex;align-items:center;gap:5px">
                San KM
                <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr);letter-spacing:.3px">MAIN DATA 🔒</span>
              </div>
              <div class="ic-val" id="tc-tot-san">${initSan.toFixed(2)}</div>
            </div>
            <div class="tc-info-card" style="border-left:3px solid var(--green)">
              <div class="ic-lbl">Opt KM</div>
              <div class="ic-val green" id="tc-tot-opt">${initOpt.toFixed(2)}</div>
            </div>
            <div class="tc-info-card" style="border-left:3px solid var(--red)">
              <div class="ic-lbl">Cancel KM</div>
              <div class="ic-val red" id="tc-tot-can">${initCan.toFixed(2)}</div>
            </div>
            <div class="tc-info-card" style="border-left:3px solid var(--txt3)">
              <div class="ic-lbl" style="display:flex;align-items:center;gap:5px">
                Trips
                <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr);letter-spacing:.3px">MAIN DATA 🔒</span>
              </div>
              <div class="ic-val blue">${tripCount}</div>
            </div>
          </div>
          <!-- SCHEDULE META -->
          <div class="tc-sch-meta fu">
            <div class="tc-meta-item">
              <div class="tm-lbl">Schedule Name</div>
              <div class="tm-val">${schName}</div>
            </div>
            ${tcAllotVeh?`<div class="tc-meta-item" style="border-left:3px solid var(--blue);padding-left:10px">
              <div class="tm-lbl" style="color:var(--blue)">Allotted Vehicle 🚌</div>
              <div class="tm-val mono" style="color:var(--blue);font-size:16px;font-weight:900">${tcAllotVeh}</div>
            </div>`:''}
            <div class="tc-meta-item">
              <div class="tm-lbl">Schedule ID <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr);vertical-align:middle;letter-spacing:.3px">MAIN DATA 🔒</span></div>
              <div class="tm-val mono">${S.selSch}</div>
            </div>
            <div class="tc-meta-item">
              <div class="tm-lbl">Type <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr);vertical-align:middle;letter-spacing:.3px">MAIN DATA 🔒</span></div>
              <div class="tm-val">${schType}</div>
            </div>
            <div class="tc-meta-item">
              <div class="tm-lbl">San Trips <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr);vertical-align:middle;letter-spacing:.3px">MAIN DATA 🔒</span></div>
              <div class="tm-val blue">${tripCount}</div>
            </div>
            <div class="tc-meta-item">
              <div class="tm-lbl">San KM Total <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr);vertical-align:middle;letter-spacing:.3px">MAIN DATA 🔒</span></div>
              <div class="tm-val" style="font-family:var(--mono)">${initSan.toFixed(2)}</div>
            </div>
            <span class="sp"></span>
            <button class="btn btn-ghost btn-sm" onclick="autoNextSch()">Next Schedule →</button>
          </div>

          <!-- BULK BUTTONS -->
          <div class="tc-action-bar fu">
            <button class="tc-allyes" onclick="setAllTC('YES')">✓ All YES</button>
            <button class="tc-allno"  onclick="setAllTC('NO')">✗ All NO</button>
            <button class="tc-allbd"  onclick="setAllTC('BD')">⚡ All BD</button>
            <span class="sp"></span>
            <span id="tc-bulk-status" style="font-size:12px;font-weight:700;color:var(--txt3)"></span>
          </div>

          <!-- MAIN TABLE -->
          <table class="tc-main-table fu">
            <thead>
              <tr>
                <th style="width:50px" title="Trip number — from MAIN DATA">SCH NO<br><span style="font-size:8px;opacity:.6;font-weight:700">MAIN DATA</span></th>
                <th title="Route — from MAIN DATA">ROUTE<br><span style="font-size:8px;opacity:.6;font-weight:700">MAIN DATA</span></th>
                <th title="Departure time — from MAIN DATA">TIME<br><span style="font-size:8px;opacity:.6;font-weight:700">MAIN DATA</span></th>
                <th title="Sanctioned KM — from MAIN DATA, never changes" style="color:var(--txt3)">SAN KM 🔒<br><span style="font-size:8px;opacity:.6;font-weight:700">MAIN DATA</span></th>
                <th title="Operated KM — user enters actual KM run" style="color:var(--green)">OPT KM ✏</th>
                <th title="Cancel KM = SAN − OPT, auto-calculated" style="color:var(--red)">CANCEL KM<br><span style="font-size:8px;opacity:.6;font-weight:700">AUTO</span></th>
                <th title="Vehicle operating this trip — editable" style="color:var(--blue)">VEHICLE 🚌<br><span style="font-size:8px;opacity:.6;font-weight:700">EDITABLE</span></th>
                <th>STATUS</th>
              </tr>
            </thead>
            <tbody id="tc-tbody">${buildRows()}</tbody>
            <tfoot>
              <tr>
                <td colspan="3" class="tot-lbl">TOTAL</td>
                <td id="tf-san" style="color:var(--txt3);font-style:italic">${initSan.toFixed(2)}</td>
                <td id="tf-opt" class="tot-green">${initOpt.toFixed(2)}</td>
                <td id="tf-can" class="tot-red">${initCan.toFixed(2)}</td>
                <td></td>
                <td></td>
              </tr>
            </tfoot>
          </table>
          `:''}

          ${manualBlock}

          <div class="vbox" id="tcVBox"><div class="vbox-t">⚠ Fix these errors</div><ul id="tcVList"></ul></div>

          <!-- SAVE BAR -->
          <div style="display:flex;align-items:center;gap:12px;justify-content:space-between;flex-wrap:wrap">
            <button class="btn btn-ghost" onclick="S.selSch='';render()">← Change Schedule</button>
            <div style="display:flex;gap:10px;align-items:center">
              <button class="btn btn-s" onclick="saveTC(false)">💾 Save TC Data</button>
              <button class="tc-save-btn" onclick="saveTC(true)">Save TC Data →</button>
            </div>
          </div>`;

        updateTCTotals();
        updateTCBulkStatus();
      });
    });
  });
}

// Status dropdown change handler
function onTCStatusChange(schId, idx, sel){
  const val=sel.value;
  sel.className='tc-status-sel '+(val==='YES'?'yes':val==='NO'?'no':val==='BD'?'bd':val==='OTHER'?'other':'');
  S.tcStatus[`${schId}_${idx}`]=val;
  const sanEl=document.getElementById(`tc_sankm_${schId}_${idx}`);
  const optEl=document.getElementById(`tc_optkm_${schId}_${idx}`);
  const canEl=document.getElementById(`tc_cankm_${schId}_${idx}`);
  const san=parseFloat((sanEl||{}).value)||0;

  if(val==='YES'){
    // OPT = SAN, CAN = 0, both editable normally
    if(optEl){ optEl.value=san.toFixed(2); optEl.removeAttribute('readonly'); optEl.style.cssText=''; optEl.classList.add('green'); optEl.oninput=()=>calcCanKm(idx); }
    if(canEl){ canEl.value='0.00'; canEl.className='tc-km-inp red auto-val'; canEl.removeAttribute('oninput'); }
  } else if(val==='NO'||val==='BD'){
    // OPT = 0, CAN = SAN
    if(optEl){ optEl.value='0.00'; optEl.removeAttribute('readonly'); optEl.style.cssText=''; optEl.classList.add('green'); optEl.oninput=()=>calcCanKm(idx); }
    if(canEl){ canEl.value=san.toFixed(2); canEl.className='tc-km-inp red auto-val'; canEl.removeAttribute('oninput'); }
  } else if(val==='OTHER'){
    // CAN KM = manual entry, OPT KM = SAN - CAN (auto-calculated, readonly)
    if(canEl){ canEl.value='0.00'; canEl.className='tc-km-inp red other-can'; canEl.setAttribute('oninput',`calcOptKmFromCan(${idx})`); canEl.focus(); }
    if(optEl){ optEl.value=san.toFixed(2); optEl.setAttribute('readonly',''); optEl.style.background='var(--surf2)'; optEl.style.color='var(--txt3)'; optEl.style.fontStyle='italic'; }
  }
  updateTCTotals();
  updateTCBulkStatus();
}

// Update live totals in header cards + tfoot
function updateTCTotals(){
  if(!S.selSch) return;
  let sanT=0,optT=0,canT=0;
  let i=0;
  while(document.getElementById(`tc_optkm_${S.selSch}_${i}`)!==null){
    sanT+=parseFloat((document.getElementById(`tc_sankm_${S.selSch}_${i}`)||{}).value||0);
    optT+=parseFloat((document.getElementById(`tc_optkm_${S.selSch}_${i}`)||{}).value||0);
    canT+=parseFloat((document.getElementById(`tc_cankm_${S.selSch}_${i}`)||{}).value||0);
    i++;
  }
  const fmt=v=>v.toFixed(2);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=fmt(v);}
  set('tc-tot-san',sanT); set('tc-tot-opt',optT); set('tc-tot-can',canT);
  set('tf-san',sanT); set('tf-opt',optT); set('tf-can',canT);
}

// Set ALL trips via bulk button
function fillSanKm(idx){
  const san=parseFloat((document.getElementById(`tc_sankm_${S.selSch}_${idx}`)||{}).value)||0;
  const optEl=document.getElementById(`tc_optkm_${S.selSch}_${idx}`);
  const canEl=document.getElementById(`tc_cankm_${S.selSch}_${idx}`);
  if(optEl){ optEl.value=san.toFixed(2); }
  if(canEl){ canEl.value='0.00'; }
  updateTCTotals();
}

function setAllTC(val){
  let i=0;
  while(document.getElementById(`tc_optkm_${S.selSch}_${i}`)!==null){
    const sel=document.getElementById(`tc_st_${S.selSch}_${i}`);
    if(sel){
      sel.value=val;
      onTCStatusChange(S.selSch,i,sel);
    }
    // For YES: auto-fill OPT KM = SAN KM
    if(val==='YES'){
      const san=parseFloat((document.getElementById(`tc_sankm_${S.selSch}_${i}`)||{}).value)||0;
      const optEl=document.getElementById(`tc_optkm_${S.selSch}_${i}`);
      const canEl=document.getElementById(`tc_cankm_${S.selSch}_${i}`);
      if(optEl && san>0) optEl.value=san.toFixed(2);
      if(canEl) canEl.value='0.00';
    }
    i++;
  }
  if(val==='YES') updateTCTotals();
  updateTCBulkStatus();
  if(val==='YES') toast('info',`✓ All trips set to YES — OPT KM filled from SAN KM`);
}

function updateTCBulkStatus(){
  const el=document.getElementById('tc-bulk-status');
  if(!el) return;
  let total=0,done=0,i=0;
  while(document.getElementById(`tc_optkm_${S.selSch}_${i}`)!==null){
    total++;
    if(S.tcStatus[`${S.selSch}_${i}`]) done++;
    i++;
  }
  if(total===0){el.textContent='';return;}
  el.textContent=done===total?`✓ All ${total} set`:`${done} / ${total} set`;
  el.style.color=done===total?'var(--green)':done>0?'var(--amber)':'var(--txt3)';
}

function onTCVehChange(schId,idx,inp){
  const v=(inp.value||'').trim();
  const hintId='tc_veh_hint_'+schId+'_'+idx;
  const hint=document.getElementById(hintId);

  if(!v){
    inp.style.borderColor='var(--bdr)'; inp.style.background='#fff'; inp.style.color='var(--txt)';
    if(hint){hint.textContent='';hint.style.display='none';}
    return;
  }

  // 1. Check vehicle master
  const inMaster=!!(S.vehicles||[]).find(vx=>(vx.vehicle||vx.vehicleNo||'')===v);

  // 2. Check duplicate across other schedules TODAY
  // Sources: _allotVehMap, _tcVehMap, current form inputs
  let dupSch='';
  const amap=window._allotVehMap||{};
  const tmap=window._tcVehMap||{};
  // check allotment map
  Object.keys(amap).forEach(id=>{ if(amap[id]===v && id!==schId) dupSch=dupSch||id; });
  // check TC vehicle map (already saved rows)
  if(!dupSch) Object.keys(tmap).forEach(id=>{ if(tmap[id]===v && id!==schId) dupSch=dupSch||id; });
  // check other open form inputs on current page (same schId different trip → OK)
  if(!dupSch){
    document.querySelectorAll('[id^="tc_veh_"]').forEach(el=>{
      if(!el.id.includes('_hint_')){
        const parts=el.id.split('_'); // tc_veh_SCHID_IDX
        const elSch=parts.slice(2,parts.length-1).join('_');
        if(elSch!==schId && (el.value||'').trim()===v) dupSch=dupSch||elSch;
      }
    });
  }

  // Set input style
  if(dupSch){
    inp.style.borderColor='var(--red)'; inp.style.background='var(--red-lt)'; inp.style.color='var(--red)';
  } else if(!inMaster){
    inp.style.borderColor='var(--amber)'; inp.style.background='var(--amber-lt)'; inp.style.color='var(--amber)';
  } else {
    inp.style.borderColor='var(--blue)'; inp.style.background='var(--blue-lt)'; inp.style.color='var(--blue)';
  }

  // Show hint
  if(hint){
    if(dupSch){
      hint.textContent='⛔ '+v+' already used in '+dupSch+' today';
      hint.style.cssText='display:block;font-size:10px;font-weight:800;color:var(--red);margin-top:2px;padding:2px 6px;background:var(--red-lt);border-radius:4px;border:1px solid rgba(217,26,26,.3)';
    } else if(!inMaster){
      hint.textContent='⚠ '+v+' not found in vehicle master — verify';
      hint.style.cssText='display:block;font-size:10px;font-weight:700;color:var(--amber);margin-top:2px;padding:2px 6px;background:var(--amber-lt);border-radius:4px;border:1px solid rgba(196,113,0,.25)';
    } else {
      hint.textContent='✓ '+v;
      hint.style.cssText='display:block;font-size:10px;font-weight:700;color:var(--green);margin-top:2px';
    }
  }
}

function setTCBtn(schId, idx, val){
  S.tcStatus[`${schId}_${idx}`]=val;
  ['YES','NO','BD','OTHER'].forEach(v=>{
    const el=document.getElementById(`tcb_${v.toLowerCase()}_${schId}_${idx}`);
    if(el) el.className='tc-btn'+(v===val?` sel-${v.toLowerCase()}`:'');
  });
  updateTCBulkStatus();
}

// For OTHER status: CAN KM is manual → OPT KM = SAN - CAN (auto)
function calcOptKmFromCan(idx){
  const san=parseFloat((document.getElementById(`tc_sankm_${S.selSch}_${idx}`)||{}).value)||0;
  const can=parseFloat((document.getElementById(`tc_cankm_${S.selSch}_${idx}`)||{}).value)||0;
  const optEl=document.getElementById(`tc_optkm_${S.selSch}_${idx}`);
  if(optEl) optEl.value=Math.max(0,san-can).toFixed(2);
  updateTCTotals();
}

function calcCanKm(idx){
  // Skip if this row is OTHER status (CAN is manual there, OPT auto)
  const st=S.tcStatus[`${S.selSch}_${idx}`]||(document.getElementById(`tc_st_${S.selSch}_${idx}`)||{}).value||'';
  if(st==='OTHER') return;
  const san=parseFloat((document.getElementById(`tc_sankm_${S.selSch}_${idx}`)||{}).value)||0;
  const opt=parseFloat((document.getElementById(`tc_optkm_${S.selSch}_${idx}`)||{}).value)||0;
  const cEl=document.getElementById(`tc_cankm_${S.selSch}_${idx}`);
  if(cEl) cEl.value=Math.max(0,san-opt).toFixed(2);
  updateTCTotals();
}

function saveTC(advance){
  gsr('getFullSchedule',[S.selSch],trips=>{
    const hasMD=(trips||[]).length>0;
    const data=[];
    const errs=[];

    if(hasMD){
      trips.forEach((t,i)=>{
        const selEl=document.getElementById(`tc_st_${S.selSch}_${i}`);
        const st=(selEl?selEl.value:'')||S.tcStatus[`${S.selSch}_${i}`]||'';
        if(!st){errs.push(`Trip ${t.schNo||i+1}: select a status (YES / NO / BD / OTHER)`);return;}
        const sankm=+(t.km||0);  // always from MAIN DATA
        const optkm=parseFloat((document.getElementById(`tc_optkm_${S.selSch}_${i}`)||{}).value)||0;
        const cankm=parseFloat((document.getElementById(`tc_cankm_${S.selSch}_${i}`)||{}).value)||Math.max(0,sankm-optkm);
        const tripVehSave=((document.getElementById(`tc_veh_${S.selSch}_${i}`)||{}).value||'').trim()||(window._allotVehMap||{})[S.selSch]||'';
        data.push({
          masterId:S.selSch, schNo:String(t.schNo||S.selSch),
          route:t.route||'', km:sankm, tripTime:t.time||'', tripType:t.type||'',
          optKm:optkm, cancelKm:cankm,
          status:st, fallbackType:t.type||'', date:S.date,
          vehicle:tripVehSave
        });
      });
    } else {
      const st=S.tcStatus[`${S.selSch}_m`]||'';
      if(!st){errs.push('Select trip status');}
      const sankm=parseFloat((document.getElementById(`tc_sankm_${S.selSch}_m`)||{}).value)||0;
      const optkm=parseFloat((document.getElementById(`tc_optkm_${S.selSch}_m`)||{}).value)||0;
      if(!sankm||!optkm){errs.push('Enter sanctioned and operated KM');}
      const cankm=parseFloat((document.getElementById(`tc_cankm_${S.selSch}_m`)||{}).value)||Math.max(0,sankm-optkm);
      const route=(document.getElementById('tc_route_m')||{}).value||'';
      const ftype=(document.getElementById('tc_type_m')||{}).value||'';
      const manVeh=((document.getElementById(`tc_veh_${S.selSch}_m`)||{}).value||'').trim()||(window._allotVehMap||{})[S.selSch]||'';
      data.push({masterId:S.selSch,schNo:S.selSch,route,km:sankm,optKm:optkm,cancelKm:cankm,status:st,fallbackType:ftype,date:S.date,vehicle:manVeh});
    }

    // Hard block: duplicate vehicle across schedules
    const seenVehs={};
    data.forEach(row=>{
      if(!row.vehicle) return;
      // Check if another schId already has this vehicle in allotMap or tcVehMap
      const amap=window._allotVehMap||{};
      const tmap=window._tcVehMap||{};
      Object.keys(amap).forEach(id=>{ if(amap[id]===row.vehicle && id!==S.selSch) seenVehs[row.vehicle]=id; });
      Object.keys(tmap).forEach(id=>{ if(tmap[id]===row.vehicle && id!==S.selSch) seenVehs[row.vehicle]=seenVehs[row.vehicle]||id; });
    });
    Object.keys(seenVehs).forEach(v=>errs.push(`⛔ Vehicle ${v} already used in ${seenVehs[v]} today — remove duplicate`));

    if(errs.length){showVal('tc',errs);return;}
    hideVal('tc');

    showLoad('Saving TC…');
    gsr('saveEntry',[data,'TC'],res=>{
      hideLoad();
      if(typeof res==='string'&&res.startsWith('ERROR')){toast('error',res);return;}
      if(!S.statusCache[S.selSch]) S.statusCache[S.selSch]={};
      S.statusCache[S.selSch].tc={done:true};
      // Audit trail
      if(!S.auditTrail[S.selSch]) S.auditTrail[S.selSch]={};
      S.auditTrail[S.selSch].tc=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      // Update tc vehicle map
      if(data[0]&&data[0].vehicle){ window._tcVehMap=window._tcVehMap||{}; window._tcVehMap[S.selSch]=data[0].vehicle; }
      toast('success',`✓ TC saved for ${S.selSch}`);
      updateBadges();
      if(advance) goto('fuel');
      else autoNextSch();
    });
  });
}

// ═══════════════════════════════════════════════════════════
//  CC / EXT ENTRY
//  Separate page — user picks CC or EXT type, then fills a
//  dynamic table. Sch No auto-assigned (CC-001, EXT-001…).

// ═══════════════════════════════════════════════════════════
//  FUEL ENTRY
// ═══════════════════════════════════════════════════════════
// ── Build vehicle tile selector for Fuel Entry ──────────────
function fuelVehSelHTML(selVeh){
  // Build vehicleNo → [schIds] map — 3 sources:
  // 1. Allotment map (if allotment was done via Allotment page)
  // 2. Status cache diesel.vehicle (if fuel was already entered)
  // 3. Status cache tc (from TC vehicle column — new feature)
  const vehToSchs={};

  function addVeh(veh, schId, tcDone, fuelDone){
    if(!veh||veh==='—') return;
    if(!vehToSchs[veh]) vehToSchs[veh]={schIds:[],tc:false,fuel:false};
    if(!vehToSchs[veh].schIds.includes(schId)) vehToSchs[veh].schIds.push(schId);
    if(tcDone)   vehToSchs[veh].tc=true;
    if(fuelDone) vehToSchs[veh].fuel=true;
  }

  // Source 1: allotment map
  S.schIds.forEach(id=>{
    const veh=(window._allotVehMap||{})[id];
    if(veh){
      const st=schSt(id);
      addVeh(veh,id,(st.tc||{}).done,(st.diesel||{}).done);
    }
  });

  // Source 2+3: statusCache — diesel.vehicle (fuel done) + tc vehicle from allotMap fallback
  S.schIds.forEach(id=>{
    const st=schSt(id);
    // From diesel entry already saved
    const fuelVeh=(st.diesel||{}).vehicle;
    if(fuelVeh) addVeh(fuelVeh,id,(st.tc||{}).done,true);
    // If TC done but no vehicle assigned yet — skip (vehicle must be assigned via Allotment or TC Entry)
  });

  // Source 4: CC/EXT schedules
  (S.ccExtDailyIds||[]).forEach(c=>{
    if(c.vehicle) addVeh(c.vehicle,c.schId,c.tc,c.diesel);
  });

  const totalVehs=Object.keys(vehToSchs).length;
  const doneVehs=Object.values(vehToSchs).filter(v=>v.fuel).length;

  // If still empty (no statusCache loaded yet), show fallback SCH tile selector
  if(totalVehs===0){
    return `<div class="sch-sel">
      <div class="sch-sel-top">
        <span class="sch-sel-lbl">🚌 Select Vehicle for Fuel Entry</span>
      </div>
      <div style="text-align:center;padding:36px 24px;background:var(--surf);border:2px dashed var(--bdr2);border-radius:var(--r);margin:4px 0">
        <div style="font-size:32px;margin-bottom:12px">🚌</div>
        <div style="font-size:15px;font-weight:800;color:var(--txt2);margin-bottom:6px">No Vehicles Assigned Yet</div>
        <div style="font-size:12px;color:var(--txt3);font-weight:600;line-height:1.7">
          Assign vehicles in the <strong>Allotment</strong> page,<br>
          or enter vehicle numbers in the <strong>Vehicle</strong> column during TC Entry.<br>
          Vehicle tiles will appear here automatically.
        </div>
      </div>
    </div>`;
  }

  const tiles=Object.entries(vehToSchs).map(([veh,info])=>{
    const isSel=veh===selVeh;
    const cls=info.fuel?'st-done':info.tc?'st-part':'st-none';
    const prog=info.fuel?100:info.tc?55:0;
    const tcPip=info.tc?`<span class="sch-status-pip pip-done">TC✓</span>`:`<span class="sch-status-pip pip-pend">TC</span>`;
    const flPip=info.fuel?`<span class="sch-status-pip pip-done">⛽✓</span>`:info.tc?`<span class="sch-status-pip pip-warn">⛽</span>`:`<span class="sch-status-pip pip-pend">⛽</span>`;
    const schLabel=info.schIds.slice(0,2).join(', ')+(info.schIds.length>2?'…':'');
    const subLbl=`<div style="font-size:10px;color:var(--txt3);font-weight:700;margin-top:2px;font-family:var(--mono)">${schLabel}</div>`;
    return `<div class="sch-card ${cls}${isSel?' sel':''}"
      onclick="selFuelVeh('${veh}')"
      style="border-top:3px solid var(--blue)"
      title="Vehicle: ${veh}\nSchedules: ${info.schIds.join(', ')}">
      <div class="sch-card-id" style="font-size:12px;color:var(--blue);font-family:var(--mono);font-weight:900">${veh}</div>
      ${subLbl}
      <div class="sch-card-status">${tcPip}${flPip}</div>
      <div class="sch-card-bar"><div class="sch-card-bar-fill" style="width:${prog}%;background:var(--blue)"></div></div>
    </div>`;
  }).join('');

  return `<div class="sch-sel">
    <div class="sch-sel-top">
      <span class="sch-sel-lbl">🚌 SELECT VEHICLE — Fuel Entry</span>
      <div class="sch-legend">
        <span class="sch-leg-item"><span class="sch-leg-dot" style="background:var(--green)"></span>${doneVehs} Complete</span>
        <span class="sch-leg-item"><span class="sch-leg-dot" style="background:var(--amber)"></span>${totalVehs-doneVehs} Pending</span>
      </div>
      <input class="sch-filter" placeholder="🔍 Filter vehicle…" oninput="filterFuelVehTiles(this.value)">
    </div>
    <div class="sch-grid" id="fuelVehGrid">${tiles}</div>
  </div>`;
}

function filterFuelVehTiles(q){
  const sq=(q||'').toUpperCase();
  document.querySelectorAll('#fuelVehGrid .sch-card').forEach(el=>{
    const id=(el.querySelector('.sch-card-id')||{}).textContent||'';
    el.style.display=!sq||id.includes(sq)?'':'none';
  });
}

// Called when vehicle tile clicked — find its primary schId and enter fuel entry
function selFuelVeh(veh){
  S.selFuelVeh=veh;
  S.selSch='__VEH__';
  renderFuel();
}

// ═══════════════════════════════════════════════════════════
//  VEHICLE-CENTRIC FUEL ENTRY
//  Called when user clicks a vehicle tile in fuel entry.
//  Logic:
//   1. Load all TC trips saved for this vehicle on this date
//      (may span multiple schedules — e.g. GJ-001 ran RDN-001 & RDN-003)
//   2. Show combined trip table grouped by schedule
//   3. User enters diesel/KMPL once for the vehicle
//   4. On save → calls saveMultiSchFuel with all schIds
// ═══════════════════════════════════════════════════════════
function renderFuelForVehicle(vehicleNo){
  const main=document.getElementById('main');
  const header=`<div class="ph fu"><div class="ph-title">⛽ Fuel Entry</div><div class="ph-sub">Record diesel for vehicle <strong>${vehicleNo}</strong> — ${dispDate(S.date)}</div></div>`;

  if(!vehicleNo){
    S.selSch=''; S.selFuelVeh=''; renderFuel(); return;
  }

  showLoad('Loading vehicle trips…');
  gsr('getVehicleTCData',[S.date,vehicleNo],vdata=>{
    hideLoad();
    if(!vdata||vdata.error){
      toast('error','Could not load vehicle data: '+(vdata&&vdata.error||'Unknown error'));
      S.selSch=''; renderFuel(); return;
    }

    const schIds=vdata.schIds||[];
    window._fuelVehSchIds=schIds; // used by calcFuelVehKmpl for baseline lookup
    const tripsBySchId=vdata.tripsBySchId||{};
    const existing=vdata.existing||{};   // existing diesel entry if any
    const ex=existing.diesel||{};
    const isEdit=!!ex.diesel;
    const totalOptKm=vdata.totalOptKm||0;
    const totalTrips=vdata.totalTrips||0;
    const yesTrips=vdata.yesTrips||0;
    const allCancelled=totalTrips>0&&yesTrips===0;

    if(schIds.length===0){
      main.innerHTML=header+fuelVehSelHTML(S.selFuelVeh)+
        `<div class="wbox warn fu">⚠ No TC trips found for vehicle <strong>${vehicleNo}</strong> on ${dispDate(S.date)}. Complete TC first.</div>`;
      return;
    }
    if(allCancelled){
      main.innerHTML=header+fuelVehSelHTML(S.selFuelVeh)+
        `<div class="wbox info fu">ℹ All trips for <strong>${vehicleNo}</strong> are cancelled. No fuel entry needed.</div>`;
      return;
    }

    // Driver info from existing or TC data
    const drvBadge=ex.driverBadge||vdata.driverBadge||'';
    const drvName=ex.driverName||vdata.driverName||'';
    const drvMobile=ex.driverMobile||vdata.driverMobile||'';

    // Vehicle type from master
    const allVehs=S.vehicles||[];
    const vehMaster=allVehs.find(v=>(v.vehicle||v.vehicleNo||'')=== vehicleNo)||{};
    const vehType=ex.vehicleType||vehMaster.type||'';
    const allTypes=[...new Set(allVehs.map(v=>v.type||'').filter(Boolean))].sort();
    const vtypeOpts=['','BUS','MINI','AC','EV','SLEEPER',...allTypes.filter(t=>!['BUS','MINI','AC','EV','SLEEPER'].includes(t))]
      .map(t=>`<option value="${t}" ${vehType===t?'selected':''}>${t||'Select…'}</option>`).join('');

    // SCH options for multi-SCH panel (all schIds except those already in this vehicle's list)
    const schOpts=S.schIds.filter(id=>!schIds.includes(id)).map(id=>`<option value="${id}">${id}</option>`).join('');

    // Build trip table rows — grouped by schedule
    let tripRows='';
    schIds.forEach(schId=>{
      const trips=tripsBySchId[schId]||[];
      const schOptKm=trips.reduce((s,t)=>s+(t.optKm||0),0);
      const schYes=trips.filter(t=>t.status==='YES').length;
      // Schedule header row
      tripRows+=`<tr style="background:var(--surf2);border-top:2px solid var(--bdr)">
        <td colspan="4" style="padding:6px 10px;font-size:11px;font-weight:800;color:var(--blue);font-family:var(--mono)">
          📋 ${schId} — ${trips.length} trip${trips.length!==1?'s':''} &nbsp;
          <span style="color:var(--green);font-weight:700">${schYes} YES</span> &nbsp;
          <span style="color:var(--txt3);font-weight:600">${schOptKm.toFixed(2)} km</span>
        </td>
      </tr>`;
      // Trip rows
      trips.forEach(t=>{
        const stBadge=t.status?`<span style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;background:${t.status==='YES'?'var(--green-lt)':t.status==='NO'?'var(--red-lt)':'var(--amber-lt)'};color:${t.status==='YES'?'var(--green)':t.status==='NO'?'var(--red)':'var(--amber)'}">${t.status}</span>`:'';
        tripRows+=`<tr>
          <td class="mono" style="font-weight:700;color:var(--txt2);white-space:nowrap;padding-left:16px">${t.schNo||schId}</td>
          <td style="font-weight:600;color:var(--txt);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.route||''}">${t.route||'—'}</td>
          <td>${stBadge}</td>
          <td class="mono" style="font-weight:800;text-align:right;color:var(--green)">${(t.optKm||0).toFixed(2)}</td>
        </tr>`;
      });
    });

    main.innerHTML=`
      ${header}
      ${fuelVehSelHTML(vehicleNo)}
      ${pipeHTML('fuel')}
      ${isEdit?`<div class="wbox info fu" style="margin:0">✏ Editing existing fuel entry for vehicle ${vehicleNo}</div>`:''}

      <div class="fuel-layout fu">
        <div class="fuel-primary">

          <!-- Status strip -->
          <div class="fuel-tc-strip">
            <div class="fuel-tc-item" style="border-left:3px solid var(--blue)">
              <div class="ftc-lbl" style="color:var(--blue)">Vehicle 🚌</div>
              <div class="ftc-val mono" style="color:var(--blue);font-size:17px;font-weight:900">${vehicleNo}</div>
              <div style="font-size:10px;font-weight:700;color:var(--txt3);margin-top:2px;font-family:var(--mono)">${schIds.length} Schedule${schIds.length!==1?'s':''}: ${schIds.slice(0,3).join(', ')}${schIds.length>3?'…':''}</div>
            </div>
            <div class="fuel-tc-item">
              <div class="ftc-lbl">Total Trips</div>
              <div class="ftc-val" style="color:var(--green)">YES: ${yesTrips} / ${totalTrips}</div>
            </div>
            <div class="fuel-tc-item">
              <div class="ftc-lbl">Total OPT KM</div>
              <div class="ftc-val mono" id="fuel-optkm-display">${totalOptKm.toFixed(2)} km</div>
            </div>
            <div class="fuel-tc-item">
              <div class="ftc-lbl">Schedules</div>
              <div class="ftc-val mono" style="font-size:11px">${schIds.join(', ')}</div>

                <th>STATUS</th>
                <th style="color:var(--green);text-align:right">OPT KM</th>
              </tr></thead>
              <tbody>${tripRows}</tbody>
              <tfoot><tr>
                <td colspan="3" style="font-weight:800;font-size:12px;color:var(--txt2);padding:7px 10px">TOTAL (${totalTrips} trips)</td>
                <td class="mono" style="font-weight:900;text-align:right;color:var(--green);padding:7px 10px" id="fveh_total_optkm">${totalOptKm.toFixed(2)}</td>
              </tr></tfoot>
            </table>
          </div>

          <!-- Vehicle / Driver / Fuel fields -->
          <div class="fuel-vd-grid">
            <!-- COL 1: Vehicle -->

                      placeholder="Badge No." oninput="onFuelVehDrvInput(this)" style="font-size:14px;font-weight:800">

                  <input type="text" id="fv_drvname" class="fuel-inp" value="${drvName}" placeholder="Auto from badge">

function calcFuelVehKmpl(baseOptKm){
  const diesel=parseFloat((document.getElementById('fv_diesel')||{}).value)||0;
  const dead=parseFloat((document.getElementById('fv_deadkm')||{}).value)||0;
  const div=parseFloat((document.getElementById('fv_divkm')||{}).value)||0;
  const totalKm=baseOptKm+dead+div;
  const kmpl=diesel>0?totalKm/diesel:0;
  const tDisp=document.getElementById('fv_totalkm_disp');
  const kDisp=document.getElementById('fv_kmpl_disp');
  const kInp=document.getElementById('fv_kmpl');
  const hint=document.getElementById('fv_kmpl_hint');
  if(tDisp) tDisp.textContent=totalKm.toFixed(2)+' km';
  if(kDisp) kDisp.textContent=kmpl>0?kmpl.toFixed(2):'—';
  if(kInp)  kInp.value=kmpl>0?kmpl.toFixed(2):'';
  // KMPL hint — compare against baseline (use first schId's baseline)
  if(hint && kmpl>0){
    const baseSchId=window._fuelVehSchIds&&window._fuelVehSchIds[0];
    const base=baseSchId&&_smart.baselines[baseSchId]&&_smart.baselines[baseSchId].kmpl;
    if(base && base.n>=3 && base.std>0.05){
      const z=Math.abs(kmpl-base.avg)/base.std;
      const lo=(base.avg-2.5*base.std).toFixed(2);
      const hi=(base.avg+2.5*base.std).toFixed(2);
      if(z>2.5&&kmpl<base.avg){
        hint.textContent=`⚠ Low KMPL — ${kmpl.toFixed(2)} vs avg ${base.avg} (normal: ${lo}–${hi}). Check diesel entry or odometer.`;
        hint.style.cssText='display:block;font-size:11px;font-weight:700;color:var(--red);padding:6px 10px;background:var(--red-lt);border:1.5px solid rgba(217,26,26,.3);border-radius:var(--r2);margin-top:6px';
      } else if(z>2.5&&kmpl>base.avg){
        hint.textContent=`⚠ High KMPL — ${kmpl.toFixed(2)} vs avg ${base.avg} (normal: ${lo}–${hi}). Verify OPT KM or diesel.`;
        hint.style.cssText='display:block;font-size:11px;font-weight:700;color:var(--amber);padding:6px 10px;background:var(--amber-lt);border:1.5px solid rgba(196,113,0,.25);border-radius:var(--r2);margin-top:6px';
      } else {
        hint.textContent=`✓ KMPL normal — avg ${base.avg} (${base.n} entries)`;
        hint.style.cssText='display:block;font-size:11px;font-weight:700;color:var(--green);padding:4px 10px;background:var(--green-lt);border:1.5px solid rgba(14,158,82,.25);border-radius:var(--r2);margin-top:6px';
      }
    } else if(kmpl<1.5){
      hint.textContent='⛔ KMPL below 1.5 — very unusual. Did you enter diesel in litres?';
      hint.style.cssText='display:block;font-size:11px;font-weight:800;color:var(--red);padding:6px 10px;background:var(--red-lt);border:1.5px solid rgba(217,26,26,.3);border-radius:var(--r2);margin-top:6px';
    } else if(kmpl<2.5){
      hint.textContent='⚠ Low KMPL ('+kmpl.toFixed(2)+') — below typical range. Verify entry.';
      hint.style.cssText='display:block;font-size:11px;font-weight:700;color:var(--amber);padding:4px 10px;background:var(--amber-lt);border:1.5px solid rgba(196,113,0,.25);border-radius:var(--r2);margin-top:6px';
    } else if(kmpl>12){
      hint.textContent='⚠ Unusually high KMPL ('+kmpl.toFixed(2)+') — verify OPT KM and diesel litres.';
      hint.style.cssText='display:block;font-size:11px;font-weight:700;color:var(--amber);padding:4px 10px;background:var(--amber-lt);border:1.5px solid rgba(196,113,0,.25);border-radius:var(--r2);margin-top:6px';
    } else {
      hint.textContent='✓ KMPL looks normal ('+kmpl.toFixed(2)+')';
      hint.style.cssText='display:block;font-size:11px;font-weight:600;color:var(--green);padding:4px 10px;background:var(--green-lt);border-radius:var(--r2);margin-top:6px';
    }
  } else if(hint){
    hint.textContent=''; hint.style.display='none';
  }
}
