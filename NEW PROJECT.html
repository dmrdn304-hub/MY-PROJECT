function saveFuelForVehicle(advance, vehicleNo, schIds){
  const veh=(document.getElementById('fv_veh')||{}).value||vehicleNo||'';
  const diesel=parseFloat((document.getElementById('fv_diesel')||{}).value)||0;
  const errs=[];
  if(!veh)           errs.push('Vehicle number missing');
  if(diesel<=0)      errs.push('Enter diesel issued (must be > 0)');
  if(!schIds||schIds.length===0) errs.push('No schedules linked to this vehicle');
  if(errs.length){showVal('fuel',errs);return;}
  hideVal('fuel');

  const kmpl=parseFloat((document.getElementById('fv_kmpl')||{}).value)||0;
  const dead=parseFloat((document.getElementById('fv_deadkm')||{}).value)||0;
  const div=parseFloat((document.getElementById('fv_divkm')||{}).value)||0;
  const vtype=(document.getElementById('fv_vtype')||{}).value||'';
  const drvBadge=(document.getElementById('fv_drvbadge')||{}).value.trim()||'';
  const drvName=(document.getElementById('fv_drvname')||{}).value.trim()||'';
  const drvMobile=(document.getElementById('fv_drvmob')||{}).value.trim()||'';
  const uria=parseFloat((document.getElementById('fv_uria')||{}).value)||0;

  // schDrivers: same driver for all schIds
  const schDrivers=schIds.map(id=>({schId:id,driverBadge:drvBadge,driverName:drvName,driverMobile:drvMobile}));

  showLoad('Saving fuel for vehicle '+veh+'…');
  gsr('saveMultiSchFuel',[S.date,veh,vtype,diesel,uria,dead,div,schIds,schDrivers],res=>{
    hideLoad();
    if(!res||!res.ok){toast('error',(res||{}).error||'Save failed');return;}
    // Update statusCache for all schIds
    schIds.forEach(id=>{
      if(!S.statusCache[id]) S.statusCache[id]={};
      S.statusCache[id].diesel={done:true,vehicle:veh};
    });
    window._tcVehMap=null; // force reload next time
    schIds.forEach(id=>{if(!S.auditTrail[id])S.auditTrail[id]={};S.auditTrail[id].fuel=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});});
    toast('success',`⛽ Fuel saved — ${kmpl.toFixed(2)} KMPL for ${veh}`);
    updateBadges();
    if(advance){ goto('cash'); }
    else{ S.selSch=''; S.selFuelVeh=''; window._tcVehMap=null; renderFuel(); }
  });
}

function renderFuel(){
  const main=document.getElementById('main');
  const header=`<div class="ph fu"><div class="ph-title">⛽ Fuel Entry</div><div class="ph-sub">Record diesel issued and KMPL for ${dispDate(S.date)}</div></div>`;

  if(!S.selSch){
    // Step 1: Load allotments if not yet loaded
    if(!window._allotVehMap){
      showLoad('Loading allotments…');
      gsr('getDailyAllotments',[S.date],allots=>{
        hideLoad();
        window._aMap={}; window._vehUsed={}; window._allotVehMap={};
        (allots||[]).forEach(a=>{
          if(a.schId) window._aMap[a.schId]=a;
          if(a.vehicleNo){ window._vehUsed[a.vehicleNo]=a.schId; window._allotVehMap[a.schId]=a.vehicleNo; }
        });
        renderFuel();
      });
      return;
    }
    // Step 2: Load TC vehicle map — reads vehicle from saved TC rows for today
    if(!window._tcVehMap){
      showLoad('Loading vehicle data…');
      gsr('getTCVehicleMap',[S.date],vmap=>{
        hideLoad();
        window._tcVehMap=vmap||{};
        // Merge into allotVehMap (allotment takes priority if both exist)
        Object.keys(window._tcVehMap).forEach(schId=>{
          if(window._tcVehMap[schId] && !(window._allotVehMap||{})[schId]){
            window._allotVehMap=window._allotVehMap||{};
            window._allotVehMap[schId]=window._tcVehMap[schId];
          }
        });
        renderFuel();
      });
      return;
    }
    // Step 3: Show vehicle selector (or SCH fallback if no allotments and no TC vehicles)
    main.innerHTML=header+fuelVehSelHTML(S.selFuelVeh);
    return;
  }

  // Vehicle-centric fuel entry — triggered when vehicle tile clicked
  if(S.selSch==='__VEH__'){
    renderFuelForVehicle(S.selFuelVeh);
    return;
  }

  // If somehow a raw schId is set (e.g. navigated from TC entry),
  // redirect to vehicle-centric path — fuel entry ONLY uses vehicle tiles
  if(S.selSch && S.selSch!=='__VEH__'){
    const _redirectVeh=(window._allotVehMap||{})[S.selSch]||'';
    if(_redirectVeh){
      S.selFuelVeh=_redirectVeh;
      S.selSch='__VEH__';
      renderFuel();
      return;
    }
    // No vehicle found for this schId — show vehicle selector with warning
    main.innerHTML=header+fuelVehSelHTML('')+pipeHTML('fuel')+
      `<div class="wbox warn fu">⚠ No vehicle assigned to <strong>${S.selSch}</strong>. Assign a vehicle in <strong>Allotment</strong> or enter in TC Entry vehicle column first.</div>`;
    S.selSch='';
    return;
  }

  showLoad('Loading fuel data…');
  smartLoadBaseline(S.selSch);
  gsr('getEntryStatus',[S.date,S.selSch],status=>{
    gsr('getExistingEntry',[S.date,S.selSch],existing=>{
      gsr('getFullSchedule',[S.selSch],trips=>{
        hideLoad();
        S.statusCache[S.selSch]=status;
        const tcDone=status&&status.tc&&status.tc.done;
        const tcCancelled=status&&status.tcAllCancelled;
        const ex=existing&&existing.diesel?existing.diesel:{};
        const isEdit=!!existing&&!!existing.diesel;
        const optKm=((status||{}).tc||{}).optKm||0;
        const tcYes=((status||{}).tc||{}).yes||0;
        const tcTrips=((status||{}).tc||{}).trips||0;

        if(!tcDone){
          main.innerHTML=header+fuelVehSelHTML(S.selFuelVeh)+pipeHTML('fuel')+
            `<div class="wbox warn fu">⚠ Complete Trip Completion first for <strong>${S.selSch}</strong>.</div>`;
          return;
        }
        if(tcCancelled){
          main.innerHTML=header+fuelVehSelHTML(S.selFuelVeh)+pipeHTML('fuel')+
            `<div class="wbox info fu">ℹ All trips cancelled for <strong>${S.selSch}</strong>. No fuel entry needed.</div>`;
          return;
        }

        // Auto-fill vehicle/driver from allotment/existing
        const allotVeh=S.selFuelVeh||((status||{}).diesel||{}).vehicle||ex.vehicle||(window._allotVehMap||{})[S.selSch]||'';
        const allotVehType=ex.vehicleType||'';
        const allotDriver=ex.driverBadge||'';
        const allotDriverName=ex.driverName||'';
        const allotMobile=ex.driverMobile||'';
        const allotCompany=ex.company||'';
        const allotService=ex.serviceType||'';

        // Vehicle type options from master
        const allVehs=S.vehicles||[];
        const allTypes=[...new Set(allVehs.map(v=>v.type||v.vehicleType||'').filter(Boolean))].sort();
        const vtypeOpts=['','BUS','MINI','AC','EV','SLEEPER',...allTypes.filter(t=>!['BUS','MINI','AC','EV','SLEEPER'].includes(t))]
          .map(t=>`<option value="${t}" ${allotVehType===t?'selected':''}>${t||'Select…'}</option>`).join('');

        // Schedules for multi-sch selector (exclude current)
        const schOpts=S.schIds.filter(id=>id!==S.selSch).map(id=>`<option value="${id}">${id}</option>`).join('');

        // PRIMARY trip table rows
        // For CC/EXT schIds, MAIN DATA has no trips — use saved TC rows from existing.tc instead
        const _isCEFuel = /^(CC|EXT)-/i.test(S.selSch);
        const tripList = _isCEFuel
          ? ((existing||{}).tc||[]).map((r,i)=>({
              schNo : r.schNo || (S.selSch+'/'+(i+1)),
              route : r.route || '—',
              km    : r.sanKm || r.optKm || 0,
              time  : '',
              type  : r.tripType||''
            }))
          : (trips||[]);
        const tcTripsData=(existing||{}).tc||[];

        // ─── MAIN DATA master values — read-only, never editable ──────
        // t.schNo  = RDN-000 type ID from MAIN DATA
        // t.km     = sanctioned KM per trip — from MAIN DATA, immutable
        // t.route  = route name — from MAIN DATA, immutable
        // t.time   = departure time — from MAIN DATA, immutable
        // tripList.length = sanctioned trip count — from MAIN DATA
        const masterSanKmFuel = tripList.reduce((s,t)=>s+(+(t.km||0)),0);
        const masterTripsFuel  = tripList.length;

        const primaryRows=tripList.length?tripList.map((t,i)=>{
          const tc=tcTripsData[i]||{};
          const sanKm=+(t.km||0); // ← ALWAYS from MAIN DATA, never from tc/ex
          const optKm=tc.optKm!=null?+(tc.optKm):sanKm;
          const st=tc.status||'';
          const stBadge=st?`<span style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;background:${st==='YES'?'var(--green-lt)':st==='NO'?'var(--red-lt)':'var(--amber-lt)'};color:${st==='YES'?'var(--green)':st==='NO'?'var(--red)':'var(--amber)'};border:1px solid ${st==='YES'?'rgba(14,158,82,.3)':st==='NO'?'rgba(217,26,26,.2)':'rgba(196,113,0,.25)'}">${st}</span>`:'';
          return `<tr>
            <!-- SCH NO = RDN-000 from MAIN DATA — locked -->
            <td class="mono" style="font-weight:800;color:var(--txt);white-space:nowrap">
              ${t.schNo||S.selSch}
            </td>
            <td style="font-weight:700;color:var(--txt);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                title="${t.route||''}">${t.route||'—'}</td>
            <!-- SAN KM — from MAIN DATA, never editable — shown as plain display -->
            <td class="mono" style="font-weight:800;text-align:right;color:var(--txt2);background:var(--surf2);border-left:2px solid var(--bdr)" title="Sanctioned KM from MAIN DATA — fixed">
              ${sanKm.toFixed(2)}
              <span style="font-size:8px;color:var(--txt3);font-weight:700;display:block;letter-spacing:.3px;margin-top:1px">SAN</span>
            </td>
            <td class="mono" style="font-weight:600;color:var(--txt3)">${t.time||'—'}</td>
            <td>${stBadge}</td>
            <td><input class="fuel-km-inp" type="number" step="0.01" id="fopt_${i}"
              value="${optKm.toFixed(2)}" max="${sanKm}"
              oninput="calcFuelOptKm()" placeholder="${sanKm}" style="width:90px"
              title="Operated KM — editable (max: SAN KM ${sanKm})"></td>
          </tr>`;
        }).join(''):`<tr><td colspan="6" style="text-align:center;padding:14px;color:var(--txt3);font-weight:600">No MAIN DATA found — enter OPT KM manually below</td></tr>`;

        // Secondary schedule rows — sanKm from MAIN DATA (set when trip was selected)
        const secRows=(window._fuelSecSch||[]).map((s,i)=>`
          <tr>
            <td class="mono" style="font-weight:800;color:var(--blue);white-space:nowrap">${s.schId}</td>
            <td style="font-weight:700;color:var(--txt);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.route||''}">${s.route||'—'}</td>
            <!-- sanKm from MAIN DATA — locked display -->
            <td class="mono" style="font-weight:800;text-align:right;color:var(--txt2);background:var(--surf2);border-left:2px solid var(--bdr)" title="Sanctioned KM from MAIN DATA — fixed">
              ${s.sanKm||0}
              <span style="font-size:8px;color:var(--txt3);font-weight:700;display:block;letter-spacing:.3px;margin-top:1px">SAN</span>
            </td>
            <td class="mono" style="font-weight:600;color:var(--txt3)">${s.time||'—'}</td>
            <td></td>
            <td><input class="fuel-km-inp" type="number" step="0.01" id="fsec_opt_${i}"
              value="${s.optKm||s.sanKm||''}" placeholder="${s.sanKm||0}" style="width:90px"
              oninput="onFuelSecOptKmChange(${i},this)"
              title="Operated KM for secondary trip"></td>
            <td><button class="btn btn-xs" style="color:var(--red);background:var(--red-lt);border:1.5px solid rgba(217,26,26,.3)" onclick="removeFuelSec(${i})">✕</button></td>
          </tr>`).join('');

        main.innerHTML=`
          ${header}
          ${fuelVehSelHTML(S.selFuelVeh)}
          ${pipeHTML('fuel')}
          ${isEdit?`<div class="wbox info fu" style="margin:0">✏ Editing existing fuel entry for ${S.selSch}</div>`:''}

          <!-- ══ FUEL MAIN GRID: LEFT + RIGHT ══════════════════ -->
          <div class="fuel-layout fu">

            <!-- ══ LEFT PANEL: PRIMARY SCHEDULE ══════════════ -->
            <div class="fuel-primary">

              <!-- TC Status strip — SAN values from MAIN DATA, locked -->
              <div class="fuel-tc-strip">
                <div class="fuel-tc-item" style="border-left:3px solid var(--blue)">
                  <div class="ftc-lbl" style="color:var(--blue)">Vehicle 🚌</div>
                  <div class="ftc-val mono" style="color:var(--blue);font-size:17px;font-weight:900">${S.selFuelVeh||allotVeh||S.selSch}</div>
                  <div style="font-size:10px;font-weight:700;color:var(--txt3);margin-top:3px;font-family:var(--mono)">SCH: ${S.selSch}</div>
                </div>
                <div class="fuel-tc-item" title="Sanctioned trips from MAIN DATA — fixed">
                  <div class="ftc-lbl">SAN Trips 🔒 <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr)">MD</span></div>
                  <div class="ftc-val">${masterTripsFuel}</div>
                </div>
                <div class="fuel-tc-item" title="Sanctioned KM from MAIN DATA — fixed">
                  <div class="ftc-lbl">SAN KM 🔒 <span style="font-size:8px;font-weight:800;background:var(--surf3);color:var(--txt3);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr)">MD</span></div>
                  <div class="ftc-val mono">${masterSanKmFuel.toFixed(2)}</div>
                </div>
                <div class="fuel-tc-item">
                  <div class="ftc-lbl">TC Done (YES / Total)</div>
                  <div class="ftc-val" style="color:var(--green)">YES: ${tcYes} / ${tcTrips}</div>
                </div>
                <div class="fuel-tc-item">
                  <div class="ftc-lbl">OPT KM (from TC)</div>
                  <div class="ftc-val" id="fuel-optkm-display">${optKm} km</div>
                </div>
              </div>

              <!-- PRIMARY trip table — all values from MAIN DATA except OPT KM -->
              <div style="overflow-x:auto;border:2px solid var(--bdr);border-radius:var(--r2);overflow:hidden">
                <table class="fuel-trip-tbl" id="fuel-primary-tbl">
                  <thead><tr>
                    <th title="Schedule trip ID from MAIN DATA — fixed">SCH NO<br><span style="font-size:8px;opacity:.55;letter-spacing:.3px;font-weight:700">MAIN DATA</span></th>
                    <th title="Route from MAIN DATA — fixed">TRIP NAME<br><span style="font-size:8px;opacity:.55;letter-spacing:.3px;font-weight:700">MAIN DATA</span></th>
                    <th style="text-align:right;background:var(--surf3);color:var(--txt2)" title="Sanctioned KM from MAIN DATA — never changes">SAN KM 🔒<br><span style="font-size:8px;opacity:.55;letter-spacing:.3px;font-weight:700">MAIN DATA</span></th>
                    <th title="Departure time from MAIN DATA — fixed">TIME<br><span style="font-size:8px;opacity:.55;letter-spacing:.3px;font-weight:700">MAIN DATA</span></th>
                    <th title="TC status from saved Trip Completion">STATUS</th>
                    <th style="color:var(--green)" title="Operated KM — enter actual KM run by vehicle">OPT KM ✏<br><span style="font-size:8px;opacity:.7;letter-spacing:.3px;font-weight:700">ENTER</span></th>
                  </tr></thead>
                  <tbody id="fuel-primary-body">${primaryRows}</tbody>
                  <tfoot><tr>
                    <td colspan="2" style="font-weight:800;font-size:12px;color:var(--txt2);padding:7px 10px">TOTAL (${masterTripsFuel} trip${masterTripsFuel!==1?'s':''})</td>
                    <td style="font-family:var(--mono);font-weight:800;text-align:right;background:var(--surf3);color:var(--txt2);padding:7px 10px" title="Total SAN KM from MAIN DATA">${masterSanKmFuel.toFixed(2)}</td>
                    <td colspan="3"></td>
                  </tr></tfoot>
                </table>
              </div>

              <!-- ══ VEHICLE & DRIVER GRID (3 columns) ══════ -->
              <div class="fuel-vd-grid">

                <!-- COL 1: Vehicle info (all AUTO from vehicle data) -->
                <div class="fuel-vd-col">
                  <div class="fuel-field-grp">
                    <div class="fuel-field-row">
                      <label class="fuel-lbl fuel-lbl-req">Vehicle No. <span class="req">*</span></label>
                      <div style="display:flex;gap:5px">
                        <input type="text" id="f_veh" class="fuel-inp mono" value="${allotVeh}"
                          placeholder="Vehicle No." oninput="onFuelVehInput(this)" style="font-size:14px;font-weight:800">
                        <button class="btn btn-ghost btn-ico btn-sm" onclick="openVehForFuel()" title="Browse">📋</button>
                      </div>
                    </div>
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Vehicle Type <span class="fuel-auto-tag">AUTO</span></label>
                      <select id="f_vtype" class="fuel-inp">${vtypeOpts}</select>
                    </div>
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Company <span class="fuel-auto-tag">AUTO</span></label>
                      <input type="text" id="f_company" class="fuel-inp" value="${allotCompany}" placeholder="Auto from master">
                    </div>
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Service Type <span class="fuel-auto-tag">AUTO</span></label>
                      <input type="text" id="f_svctype" class="fuel-inp" value="${allotService}" placeholder="Auto from master">
                    </div>
                  </div>
                </div>

                <!-- COL 2: Driver info (AUTO from driver master) -->
                <div class="fuel-vd-col">
                  <div class="fuel-field-grp">
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Driver Badge</label>
                      <div style="display:flex;gap:5px">
                        <input type="text" id="f_drvbadge" class="fuel-inp mono" value="${allotDriver}"
                          placeholder="Badge No." oninput="onFuelDrvInput(this)" style="font-size:14px;font-weight:800">
                        <button class="btn btn-ghost btn-ico btn-sm" onclick="openDrvForFuel()" title="Browse">📋</button>
                      </div>
                    </div>
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Driver Name <span class="fuel-auto-tag">AUTO</span></label>
                      <input type="text" id="f_drvname" class="fuel-inp" value="${allotDriverName}" placeholder="Auto from badge">
                    </div>
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Mobile No. <span class="fuel-auto-tag">AUTO</span></label>
                      <input type="text" id="f_drvmob" class="fuel-inp mono" value="${allotMobile}" placeholder="Auto from badge">
                    </div>
                  </div>
                </div>

                <!-- COL 3: Fuel measurements + Vehicle Day KM Breakdown -->
                <div class="fuel-vd-col">
                  <div class="fuel-field-grp">

                    <!-- ── Diesel & Uria ── -->
                    <div class="fuel-field-row">
                      <label class="fuel-lbl fuel-lbl-req">Diesel Issued (L) <span class="req">*</span></label>
                      <input type="number" id="f_diesel" class="fuel-inp mono" value="${ex.diesel||''}"
                        placeholder="0.00" step="0.01" min="0" oninput="calcVDayKmpl()"
                        style="font-size:16px;font-weight:900;color:var(--blue)">
                    </div>
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Uria (L)</label>
                      <input type="number" id="f_uria" class="fuel-inp mono" value="${ex.uria||''}" placeholder="0.00" step="0.01">
                    </div>

                    <!-- ── Vehicle Day KM Breakdown toggle ── -->
                    <div style="display:flex;align-items:center;gap:8px;margin:6px 0 4px">
                      <div style="flex:1;height:1.5px;background:var(--bdr)"></div>
                      <span style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);white-space:nowrap">KM BREAKDOWN</span>
                      <div style="flex:1;height:1.5px;background:var(--bdr)"></div>
                    </div>

                    <!-- ── Schedule OPT KM (auto from trips) ── -->
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Schedule OPT KM <span class="fuel-calc-tag">AUTO</span></label>
                      <input type="number" id="f_optkm" class="fuel-inp mono" value="${ex.optKm||optKm||''}"
                        placeholder="${optKm}" readonly
                        style="color:var(--green);font-weight:800;border-color:rgba(14,158,82,.35);background:var(--green-lt)">
                      <div class="fhint" style="color:var(--txt3);font-size:10px">Sum of all primary + secondary SCH trip OPT KM</div>
                    </div>

                    <!-- ── Dead KM ── -->
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Dead KM <span style="font-size:9px;font-weight:700;color:var(--txt3)">(depot run, relay etc.)</span></label>
                      <input type="number" id="f_deadkm" class="fuel-inp mono" value="${ex.deadKm||''}" placeholder="0" oninput="calcVDayKmpl()">
                    </div>

                    <!-- ── Accident Dead KM ── -->
                    <div class="fuel-field-row">
                      <label class="fuel-lbl" style="color:var(--red)">Accident Dead KM <span style="font-size:9px;font-weight:800;padding:1px 6px;background:var(--red-lt);border-radius:8px;color:var(--red)">ACC</span></label>
                      <input type="number" id="f_accdeadkm" class="fuel-inp mono" value="${ex.accidentDeadKm||''}" placeholder="0" oninput="calcVDayKmpl()"
                        style="border-color:rgba(217,26,26,.4);background:var(--red-lt);color:var(--red);font-weight:800">
                    </div>

                    <!-- ── Diversion KM ── -->
                    <div class="fuel-field-row">
                      <label class="fuel-lbl">Diversion KM</label>
                      <input type="number" id="f_divkm" class="fuel-inp mono" value="${ex.divKm||''}" placeholder="0" oninput="calcVDayKmpl()">
                    </div>

                    <!-- ── Non-Revenue KM rows (dynamic) ── -->
                    <div style="display:flex;align-items:center;gap:6px;margin:4px 0 2px">
                      <div style="flex:1;height:1.5px;background:var(--bdr)"></div>
                      <span style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--amber);white-space:nowrap">NON-REVENUE KM</span>
                      <div style="flex:1;height:1.5px;background:var(--bdr)"></div>
                    </div>
                    <div id="f_nonrev_rows">
                      ${(ex.nonRevKm||[]).map((r,i)=>buildNonRevRow(i,r.type||'',r.km||0,r.note||'')).join('')||'<div style="font-size:11px;color:var(--txt3);font-weight:600;padding:4px 0">No non-revenue KM added</div>'}
                    </div>
                    <button onclick="addNonRevRow()" style="margin-top:4px;padding:5px 10px;font-size:11px;font-weight:800;border:2px dashed var(--amber);border-radius:var(--r2);background:var(--amber-lt);color:var(--amber);cursor:pointer;width:100%;transition:var(--tr)" onmouseover="this.style.background='#ffe8b0'" onmouseout="this.style.background='var(--amber-lt)'">
                      + Add Non-Revenue KM (Training / Workshop / Ferry…)
                    </button>

                    <!-- ── Total & KMPL summary ── -->
                    <div style="display:flex;align-items:center;gap:6px;margin:6px 0 2px">
                      <div style="flex:1;height:1.5px;background:var(--bdr)"></div>
                      <span style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--blue);white-space:nowrap">TOTALS</span>
                      <div style="flex:1;height:1.5px;background:var(--bdr)"></div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px">
                      <div style="padding:8px 10px;background:var(--green-lt);border:2px solid rgba(14,158,82,.3);border-radius:var(--r2)">
                        <div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--green);letter-spacing:.7px">Total KM</div>
                        <div style="font-size:18px;font-weight:900;font-family:var(--mono);color:var(--green)" id="f_totalkm_disp">—</div>
                      </div>
                      <div style="padding:8px 10px;background:var(--blue-lt);border:2px solid rgba(26,86,232,.25);border-radius:var(--r2)">
                        <div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--blue);letter-spacing:.7px">KMPL</div>
                        <div style="font-size:18px;font-weight:900;font-family:var(--mono);color:var(--blue)" id="f_kmpl_disp">—</div>
                      </div>
                    </div>
                    <!-- Hidden KMPL input for save -->
                    <input type="hidden" id="f_kmpl" value="">
                    <div class="fhint" id="f_kmpl_hint" style="margin-top:4px"></div>

                    <!-- KM breakdown summary pill row -->
                    <div id="f_km_pills" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px"></div>

                  </div>
                </div>
              </div><!-- end fuel-vd-grid -->

              <div class="vbox" id="fuelVBox"><div class="vbox-t">⚠ Fix errors</div><ul id="fuelVList"></ul></div>
              <div class="fuel-footer">
                <button class="btn btn-ghost btn-sm" onclick="S.selSch='';S.selFuelVeh='';render()">← Vehicle</button>
                <span class="sp"></span>
                <button class="btn btn-s btn-sm" onclick="saveFuel(false)">💾 Save</button>
                <button class="tc-save-btn" onclick="saveFuel(true)" style="padding:9px 22px;font-size:14px">💾 Save → Cash ›</button>
              </div>
            </div><!-- end fuel-primary -->

            <!-- ══ RIGHT PANEL: MULTI-SCH / EXTRA TRIPS ══════ -->
            <div class="fuel-secondary">
              <div class="fuel-sec-hdr" style="display:flex;align-items:center;gap:8px">
                <span style="flex:1">FOR MULTI-SCH OR TRIP ENTRY</span>
                <button onclick="resetFuelSecPanel()" title="Clear all secondary trips and reset panel"
                  style="padding:4px 12px;border-radius:12px;font-size:11px;font-weight:800;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);color:#fff;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:5px"
                  onmouseover="this.style.background='rgba(255,255,255,.32)'" onmouseout="this.style.background='rgba(255,255,255,.18)'">
                  🔄 Refresh
                </button>
              </div>

              <!-- ── Selector row ──────────────────────────── -->
              <div class="fuel-sec-ctrl">
                <div class="fg" style="flex:1;min-width:90px">
                  <label class="fuel-lbl">SCH ID</label>
                  <select id="fsec_schid" class="fuel-inp" style="font-size:13px;padding:6px 28px 6px 10px" onchange="fsecLoadTimes()">
                    <option value="">Select…</option>${schOpts}
                  </select>
                </div>
                <div class="fg" style="flex:1;min-width:90px">
                  <label class="fuel-lbl">ALL TRIP TIME</label>
                  <select id="fsec_time" class="fuel-inp" style="font-size:13px;padding:6px 28px 6px 10px" onchange="filterFuelSecTrips((document.getElementById('fsec_search')||{}).value||'')">
                    <option value="">All Times</option>
                  </select>
                </div>
                <div class="fg" style="flex:1.5;min-width:110px">
                  <label class="fuel-lbl">SEARCH BY TRIP NAME</label>
                  <input type="text" id="fsec_search" class="fuel-inp"
                    placeholder="🔍 Trip name…" style="font-size:12px;padding:6px 10px"
                    oninput="filterFuelSecTrips(this.value)">
                </div>
                <div class="fg" style="align-self:flex-end">
                  <label class="fuel-lbl" style="opacity:0">ADD</label>
                  <button class="btn btn-p btn-sm" onclick="addFuelSecSch()" style="font-size:13px;padding:7px 18px;font-weight:800;white-space:nowrap">+ ADD</button>
                </div>
              </div>

              <!-- Trip search results dropdown -->
              <div id="fsec_results" style="display:none;max-height:130px;overflow-y:auto;background:#fff;border-left:2px solid var(--bdr);border-right:2px solid var(--bdr);border-bottom:2px solid var(--bdr);border-radius:0 0 var(--r2) var(--r2);margin:0 14px 4px"></div>

              <!-- ── Secondary trip table ────────────────── -->
              <div style="overflow-x:auto;border-top:2px solid var(--bdr)">
                <table class="fuel-trip-tbl" id="fuel-sec-tbl">
                  <thead>
                    <tr>
                      <th style="width:28px"><input type="checkbox" id="fsec_chk_all" onchange="toggleAllFuelSec(this)" title="Select all" style="width:14px;height:14px;cursor:pointer"></th>
                      <th title="Schedule ID from MAIN DATA">SCH NO<br><span style="font-size:8px;opacity:.55;font-weight:700">MAIN DATA</span></th>
                      <th title="Route from MAIN DATA">TRIP NAME<br><span style="font-size:8px;opacity:.55;font-weight:700">MAIN DATA</span></th>
                      <th style="text-align:right;background:var(--surf3)" title="Sanctioned KM from MAIN DATA — never changes">SAN KM 🔒<br><span style="font-size:8px;opacity:.55;font-weight:700">MAIN DATA</span></th>
                      <th title="Departure time from MAIN DATA">TIME<br><span style="font-size:8px;opacity:.55;font-weight:700">MAIN DATA</span></th>
                      <th style="color:var(--green)" title="Operated KM — enter actual KM run">OPT KM ✏</th>
                    </tr>
                  </thead>
                  <tbody id="fuel-sec-body">${(window._fuelSecSch||[]).length?rebuildSecRows():
                    `<tr id="fsec_empty"><td colspan="6" style="text-align:center;padding:20px;color:var(--txt3);font-size:12px;font-weight:600">No secondary schedules added yet<br><span style="font-size:11px;opacity:.6">Select SCH ID and click + ADD</span></td></tr>`}
                  </tbody>
                </table>
              </div>

              <!-- ── Delete selected bar ────────────────── -->
              <div class="fuel-sec-del-bar" id="fsec_del_bar" style="display:none">
                <span id="fsec_sel_count" style="font-size:12px;font-weight:700;color:var(--txt2)">0 selected</span>
                <span class="sp"></span>
                <button class="btn btn-xs" style="color:var(--red);background:var(--red-lt);border:2px solid rgba(217,26,26,.3);font-weight:800" onclick="deleteSelectedFuelSec()">🗑 Delete Selected</button>
              </div>

              <div class="fuel-sec-note">
                <strong style="color:var(--txt2)">NOTE:</strong> Add both primary and secondary SCH OPT KM as the total OPT KM. Each added trip is counted in OPT KM automatically.
              </div>
            </div><!-- end fuel-secondary -->

          </div>`;

        calcKmpl();
        onFuelVehInput(document.getElementById('f_veh'));
      });
    });
  });
}


// Auto-fill vehicle details from master when typing
function onFuelVehInput(inp){
  if(!inp) return;
  const no=inp.value.trim();
  const v=(S.vehicles||[]).find(x=>(x.vehicle||x.vehicleNo||'')===no);
  if(v){
    const t=document.getElementById('f_vtype');
    if(t&&(v.type||v.vehicleType)) t.value=v.type||v.vehicleType;
    const c=document.getElementById('f_company');
    if(c&&v.company) c.value=v.company;
    const s=document.getElementById('f_svctype');
    if(s&&v.serviceType) s.value=v.serviceType;
  }
}

// Auto-fill driver name/mobile from master when typing badge
function onFuelDrvInput(inp){
  if(!inp) return;
  const badge=inp.value.trim();
  const d=(S.drivers||[]).find(x=>(x.badge||x.badgeNo||'')===badge);
  if(d){
    const n=document.getElementById('f_drvname');
    if(n&&d.name) n.value=d.name;
    const m=document.getElementById('f_drvmob');
    if(m&&d.mobile) m.value=d.mobile;
  }
}

// Reset secondary panel — clear all added trips and reset selectors
function resetFuelSecPanel(){
  if((window._fuelSecSch||[]).length>0){
    if(!confirm('Clear all secondary trips and reset the panel?')) return;
  }
  window._fuelSecSch=[];
  window._fsecTrips=[];
  window._fsecSchId='';
  window._fsecPending=null;

  // Reset selectors
  const schid=document.getElementById('fsec_schid');
  const time=document.getElementById('fsec_time');
  const srch=document.getElementById('fsec_search');
  const res=document.getElementById('fsec_results');
  if(schid) schid.value='';
  if(time){ time.innerHTML='<option value="">All Times</option>'; }
  if(srch) srch.value='';
  if(res) res.style.display='none';

  // Rebuild empty table
  refreshSecBody();
  calcFuelOptKm();
  updateFuelSecDelBar();
  toast('info','🔄 Secondary panel cleared');
}

// Build secondary rows HTML — sanKm comes from MAIN DATA (set at trip selection time)
function rebuildSecRows(){
  const list=window._fuelSecSch||[];
  if(!list.length) return `<tr id="fsec_empty"><td colspan="6" style="text-align:center;padding:20px;color:var(--txt3);font-size:12px;font-weight:600">No secondary schedules added yet<br><span style="font-size:11px;opacity:.6">Select SCH ID and click + ADD</span></td></tr>`;
  return list.map((s,i)=>`
    <tr id="fsec_row_${i}" class="fsec-row ${s._sel?'fsec-sel':''}">
      <td style="text-align:center">
        <input type="checkbox" class="fsec-chk" onchange="onFuelSecChk(${i},this)" ${s._sel?'checked':''} style="width:14px;height:14px;cursor:pointer">
      </td>
      <!-- SCH NO = RDN-000 from MAIN DATA — display only -->
      <td class="mono" style="font-weight:800;color:var(--blue);white-space:nowrap">${s.schId}<br><span style="font-size:9px;font-weight:700;color:var(--txt3)">${s.tripNo||''}</span></td>
      <!-- Route from MAIN DATA — display only -->
      <td style="font-weight:700;color:var(--txt);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.route||''}">${s.route||'—'}</td>
      <!-- SAN KM from MAIN DATA — immutable, shown as plain text -->
      <td class="mono" style="font-weight:800;text-align:right;color:var(--txt2);background:var(--surf3)" title="Sanctioned KM from MAIN DATA — fixed">${+(s.sanKm||0)}</td>

// Calc total OPT KM: sum all primary trip rows + all secondary rows
function calcFuelOptKm(){
  let total=0;
  let i=0;
  while(document.getElementById('fopt_'+i)){
    total+=parseFloat(document.getElementById('fopt_'+i).value||0);
    i++;
  }
  // Also update _fuelSecSch from current input values (in case they changed)
  i=0;
  while(document.getElementById('fsec_opt_'+i)){
    const v=parseFloat(document.getElementById('fsec_opt_'+i).value||0);
    total+=v;
    if(window._fuelSecSch&&window._fuelSecSch[i]) window._fuelSecSch[i].optKm=v;
    i++;
  }
  const optEl=document.getElementById('f_optkm');
  if(optEl){ optEl.value=total.toFixed(2); optEl.style.color='var(--green)'; }
  const disp=document.getElementById('fuel-optkm-display');
  if(disp) disp.textContent=total.toFixed(2)+' km';
  calcKmpl();
}

// Filter trip list in search results
function filterFuelSecTrips(q){
  const trips=window._fsecTrips||[];
  const time=(document.getElementById('fsec_time')||{}).value||'';
  const ql=(q||'').toLowerCase();
  const res=document.getElementById('fsec_results');
  if(!res) return;
  // Show results whenever SCH is selected
  const schId=window._fsecSchId||(document.getElementById('fsec_schid')||{}).value||'';
  if(!schId||!trips.length){ res.style.display='none'; return; }
  const filtered=trips.filter(t=>{
    const matchQ=!ql||(t.route||'').toLowerCase().includes(ql)||(String(t.schNo||'')).toLowerCase().includes(ql);
    const matchT=!time||t.time===time;
    return matchQ&&matchT;
  });
  if(!filtered.length){ res.style.display='none'; return; }
  res.style.display='';
  res.innerHTML=filtered.map(t=>`
    <div class="fuel-sec-result" onclick="selectFuelSecTrip(${JSON.stringify(t).replace(/"/g,"'")})">
      <span class="mono" style="font-weight:800;font-size:12px;color:var(--blue)">${t.schNo||schId}</span>
      <span style="font-size:12px;font-weight:700;color:var(--txt);margin:0 8px;flex:1">${t.route||'—'}</span>
      <span class="mono" style="font-size:11px;color:var(--txt3);white-space:nowrap">${t.km||0} km</span>

}

// ADD button — add pending trip or all trips for selected schedule
function addFuelSecSch(){
  const schId=(document.getElementById('fsec_schid')||{}).value||'';
  const time=(document.getElementById('fsec_time')||{}).value||'';
  if(!schId){toast('warn','Select a Schedule ID first');return;}
  if(!window._fuelSecSch) window._fuelSecSch=[];

  const pending=window._fsecPending&&window._fsecPending.schId===schId?window._fsecPending:null;
  if(pending){
    // Add single selected trip
    window._fuelSecSch.push({...pending,_sel:false});
    window._fsecPending=null;
    const srch=document.getElementById('fsec_search');
    if(srch) srch.value='';
    toast('success',`Added trip: ${pending.route||pending.schId}`);
  } else {
    // Add all (or time-filtered) trips from schedule
    const trips=window._fsecTrips||[];
    const filtered=trips.filter(t=>!time||t.time===time);
    if(filtered.length){
      filtered.forEach(t=>window._fuelSecSch.push({
        schId,tripNo:String(t.schNo||schId),route:t.route||'',
        sanKm:parseFloat(t.km)||0,time:t.time||'',
        optKm:parseFloat(t.km)||0,_sel:false
      }));
      toast('success',`Added ${filtered.length} trip(s) from ${schId}`);
    } else if(!trips.length){
      // No master trips — add manual entry
      window._fuelSecSch.push({schId,tripNo:'1',route:schId,sanKm:0,time:time||'',optKm:0,_sel:false});
      toast('info',`Added ${schId} (no trip data — enter OPT KM manually)`);
    } else {
      toast('warn','No trips match the selected time filter');
      return;
    }
  }
  refreshSecBody();
  calcFuelOptKm();
  updateFuelSecDelBar();
}

// ── Smart baseline loader ────────────────────────────────────
function smartLoadBaseline(schId){
  if(!schId) return;
  if(_smart.baselines[schId]) return; // already cached
  gsr('getSmartBaseline',[{schId, days:30}], res=>{
    if(res && (res.kmpl || res.epkm)){
      _smart.baselines[schId] = res;
      // Refresh hints if fuel/cash form is still open for same schedule
      if(S.selSch === schId){
        const kmplHint = document.getElementById('v_kmpl_hint');
        const epkmHint = document.getElementById('c_epkm_hint');
        if(kmplHint) calcVDayKmpl();
        if(epkmHint) calcEpkm();
      }
    }
  });
}

function calcEpkm(){
  const cash=parseFloat((document.getElementById('c_cash')||{}).value)||0;
  const el=document.getElementById('c_epkm');
  const hint=document.getElementById('c_epkm_hint');
  if(!el)return;
  const optKm=parseFloat(el.dataset.optkm)||0;
  if(cash>0&&optKm>0){
    const epkm=cash/optKm;
    el.value=epkm.toFixed(2);
    if(hint){
      const base = _smart.baselines[S.selSch] && _smart.baselines[S.selSch].epkm;
      if(base && base.n >= 3 && base.std > 0.5) {
        const z = Math.abs(epkm - base.avg) / base.std;
        const lo = parseFloat((base.avg - 2.5*base.std).toFixed(2));
        const hi = parseFloat((base.avg + 2.5*base.std).toFixed(2));
        if(z > 2.5 && epkm < base.avg) {
          hint.textContent = `⚠ Below avg — ₹${epkm.toFixed(2)} vs avg ₹${base.avg} (norm: ₹${lo}–₹${hi})`;
          hint.className = 'fhint err';
        } else if(z > 2.5 && epkm > base.avg) {
          hint.textContent = `⚠ Above avg — ₹${epkm.toFixed(2)} vs avg ₹${base.avg} (norm: ₹${lo}–₹${hi})`;
          hint.className = 'fhint warn';
        } else {
          hint.textContent = `✓ Normal — avg ₹${base.avg}/km (${base.n} entries)`;
          hint.className = 'fhint ok';
        }
      } else if(epkm<5){
        hint.textContent='⚠ Low EPKM — verify cash amount';
        hint.className='fhint warn';
      } else if(epkm>100){
        hint.textContent='⚠ Very high EPKM — recheck';
        hint.className='fhint warn';
      } else {
        hint.textContent = base && base.n >= 3
          ? `✓ Looks normal — building baseline (${base.n} entries)`
          : '✓ EPKM in normal range';
        hint.className='fhint ok';
      }
    }
  } else {el.value='';if(hint){hint.textContent='';hint.className='fhint';}}
}

    cashTotal:cash, passCount:pass,
    studentPass:stu,
    dhaba:parseFloat((document.getElementById('c_dhaba')||{}).value)||0,
    epkm
  };
  showLoad('Saving cash…');
  gsr('saveEntry',[data,'SERVICE'],res=>{
    hideLoad();
    if(typeof res==='string'&&res.startsWith('ERROR')){toast('error',res);return;}
    if(!S.statusCache[S.selSch]) S.statusCache[S.selSch]={};
    S.statusCache[S.selSch].service={done:true};
    if(!S.auditTrail[S.selSch])S.auditTrail[S.selSch]={};
    S.auditTrail[S.selSch].cash=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    toast('success',`Cash saved — ₹${cash.toLocaleString()} | EPKM: ${epkm.toFixed(2)}`);
    updateBadges();
    if(advance) goto('dash');
    else autoNextSch();
  });
}

function renderOnlyCashForm(selected, successMsg){

  const items = _ocItems || [];

  const sel = selected || (items.length ? items[0] : null);

  const optHtml = items.map(it =>
    `<option value="${it.id}" data-name="${it.name.replace(/"/g,'&quot;')}" ${sel && sel.id===it.id?'selected':''}>${it.id} — ${it.name}</option>`
  ).join('');

  main.innerHTML = header + banner + `
  <div class="card fu" style="max-width:480px;margin:0 auto">
    <div class="form-row">
      <label class="flbl">Item</label>
      <select id="oc_item" onchange="ocItemChange()" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--bdr);font-size:14px;background:var(--sfc)">
        ${optHtml}
      </select>
    </div>
    <div class="form-row" style="margin-top:14px">
      <label class="flbl">Cash Amount (₹)</label>
      <input type="number" id="oc_cash" min="0" step="0.01" placeholder="0.00"
        oninput="ocCalc()" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--bdr);font-size:15px;background:var(--sfc)">
      <div id="oc_cash_hint" class="fhint"></div>
    </div>
    <div class="form-row" style="margin-top:14px">
      <label class="flbl">Passengers</label>
      <input type="number" id="oc_pass" min="0" step="1" placeholder="0"
        style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--bdr);font-size:15px;background:var(--sfc)">
    </div>
    <div id="oc_existing_banner" style="display:none;margin-top:10px"></div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <button id="oc_save_btn" class="btn btn-p" style="flex:1" onclick="saveOnlyCash()">💾 Save</button>
      <button class="btn btn-ghost" onclick="goto('cash')">← Back to Cash</button>
    </div>
    <div id="oc_val" style="margin-top:8px"></div>
  </div>`;

  // Load existing entry for first item
  if(sel) ocLoadExisting(sel.id);
}

function ocItemChange(){
  const sel = document.getElementById('oc_item');
  const id = sel.value;
  document.getElementById('oc_cash').value = '';
  document.getElementById('oc_pass').value = '';
  document.getElementById('oc_cash_hint').textContent = '';
  document.getElementById('oc_existing_banner').style.display = 'none';
  if(id) ocLoadExisting(id);
}

function ocLoadExisting(itemId){
  gsr('getOnlyCashEntry', [S.date, itemId], existing => {
    if(existing){
      const b = document.getElementById('oc_existing_banner');
      if(b){
        b.style.display = 'block';
        b.innerHTML = `<div class="wbox info fu" style="margin:0">✏️ Editing existing entry — ₹${existing.cash} / ${existing.passengers} passengers</div>`;
      }
      const ci = document.getElementById('oc_cash');
      const pi = document.getElementById('oc_pass');
      if(ci) ci.value = existing.cash;
      if(pi) pi.value = existing.passengers;
      ocCalc();
    }
  });
}

function ocCalc(){
  const cash = parseFloat((document.getElementById('oc_cash')||{}).value) || 0;
  const hint = document.getElementById('oc_cash_hint');
  if(!hint) return;
  if(cash <= 0){ hint.textContent = ''; hint.className = 'fhint'; return; }
  if(cash < 10){ hint.textContent = '⚠ Very low amount — recheck'; hint.className = 'fhint warn'; }
  else { hint.textContent = '✓ Amount entered'; hint.className = 'fhint ok'; }
}

function saveOnlyCash(){
  const selEl = document.getElementById('oc_item');
  const cash  = parseFloat((document.getElementById('oc_cash')||{}).value) || 0;
  const pass  = parseInt((document.getElementById('oc_pass')||{}).value)   || 0;
  const val   = document.getElementById('oc_val');

  const errs = [];
  if(!selEl || !selEl.value) errs.push('Select an item');
  if(cash <= 0) errs.push('Enter a cash amount');
  if(errs.length){ if(val) val.innerHTML = errs.map(e=>`<div class="verr">⚠ ${e}</div>`).join(''); return; }

  const opt = selEl.options[selEl.selectedIndex];
  const itemName = opt ? opt.dataset.name : selEl.value;

  showLoad('Saving…');
  gsr('saveOnlyCashEntry', [{
    date:       S.date,
    itemId:     selEl.value,
    itemName:   itemName,
    cash:       cash,
    passengers: pass
  }], res => {
    hideLoad();
    if(res && res.error){
      if(val) val.innerHTML = `<div class="verr">⚠ ${res.error}</div>`;
    } else {
      if(!S._ocTodayMap) S._ocTodayMap={};
      S._ocTodayMap[savedId]={itemId:savedId,itemName:savedName,cash:cash,passengers:pass};
      S._ocLastSaved=savedName+' saved — Rs '+cash.toLocaleString('en-IN');
      renderOnlyCash();
    }
  });
}

function loadSvcWiseData(){
  const from = (document.getElementById('sw_from')||{}).value || S.date;
  const to   = (document.getElementById('sw_to')||{}).value   || S.date;
  const el   = document.getElementById('sw_result');
  if(el) el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--txt3)"><div class="spin" style="margin:0 auto 12px"></div><div style="font-size:13px;font-weight:600">Loading service-wise data…</div></div>`;

  showLoad('Loading…');
  gsr('getServiceWiseReport', [from, to], data => {
    hideLoad();
    if(!el) return;
    if(!data || data.error){
      el.innerHTML = `<div class="wbox warn fu">⚠ ${data ? data.error : 'Could not load data'}</div>`;
      return;
    }
    const rows = data.rows || [];
    const tot  = data.totals || {};
    if(!rows.length){
      el.innerHTML = `<div class="wbox info fu">ℹ No data found for ${from} to ${to}.</div>`;
      return;
    }

    // Colour map for service types
    const typeColor = {
      EXP:'#3b82f6', SLP:'#8b5cf6', DELUXE:'#f59e0b',
      MIDI:'#10b981', MINI:'#06b6d4', LOCAL:'#6b7280', GNR:'#64748b'
    };

    const cols = [
      'Service Type',
      'San Sch','San Trips','San KM',
      'Opt Sch','Opt Trips','Opt KM',
      'Can Sch','Can Trips','Can KM',
      'Cash (₹)','EPKM','KMPL',
      'Passengers','Students','Dhaba (₹)'
    ];

    const fmtRow = (r, isTot) => {
      const bg = isTot ? 'background:var(--sfc2);font-weight:700' : '';
      const clr = !isTot ? `color:${typeColor[r.serviceType]||'var(--txt1)'};font-weight:700` : '';
      return `<tr style="${bg}">
        <td style="${clr}">${r.serviceType}</td>
        <td class="mono">${r.sanSch}</td>
        <td class="mono">${r.sanTrips}</td>
        <td class="mono">${(r.sanKm||0).toLocaleString('en-IN')}</td>
        <td class="mono" style="color:var(--green)">${r.optSch}</td>
        <td class="mono" style="color:var(--green)">${r.optTrips}</td>
        <td class="mono" style="color:var(--green)">${(r.optKm||0).toLocaleString('en-IN')}</td>
        <td class="mono" style="color:var(--red)">${r.canSch}</td>
        <td class="mono" style="color:var(--red)">${r.canTrips}</td>
        <td class="mono" style="color:var(--red)">${(r.canKm||0).toLocaleString('en-IN')}</td>
        <td class="mono" style="color:var(--teal)">₹${(r.cash||0).toLocaleString('en-IN')}</td>
        <td class="mono">${r.epkm||'—'}</td>
        <td class="mono">${r.kmpl||'—'}</td>
        <td class="mono">${(r.pass||0).toLocaleString('en-IN')}</td>
        <td class="mono">${(r.students||0).toLocaleString('en-IN')}</td>
        <td class="mono">₹${(r.dhaba||0).toLocaleString('en-IN')}</td>
      </tr>`;
    };

    const thead = cols.map(c => `<th>${c}</th>`).join('');
    const tbody = rows.map(r => fmtRow(r, false)).join('') + fmtRow(tot, true);

    // Store for export
    window._swData = { cols, rows, totals: tot, from, to };

    el.innerHTML = `
      <div class="rviewer fu">
        <div class="rtbar">
          <span class="rtbar-title" style="color:var(--txt2)">${rows.length} service type${rows.length!==1?'s':''} &nbsp;·&nbsp; ${from} → ${to}</span>
          <span class="sp"></span>
          <button class="btn btn-ghost btn-sm" onclick="exportSvcWise()">📥 Excel</button>
          <button class="btn btn-ghost btn-sm" onclick="printSvcWise()">🖨 Print</button>
        </div>
        <div class="rtwrap">
          <table class="rtbl" id="sw_table">
            <thead><tr>${thead}</tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      </div>`;
  });
}

function exportSvcWise(){
  const d = window._swData;
  if(!d) return;
  const aoa = [d.cols, ...d.rows.map(r=>[
    r.serviceType, r.sanSch, r.sanTrips, r.sanKm,
    r.optSch, r.optTrips, r.optKm,
    r.canSch, r.canTrips, r.canKm,
    r.cash, r.epkm, r.kmpl, r.pass, r.students, r.dhaba
  ]), [
    d.totals.serviceType, d.totals.sanSch, d.totals.sanTrips, d.totals.sanKm,
    d.totals.optSch, d.totals.optTrips, d.totals.optKm,
    d.totals.canSch, d.totals.canTrips, d.totals.canKm,
    d.totals.cash, d.totals.epkm, d.totals.kmpl, d.totals.pass, d.totals.students, d.totals.dhaba
  ]];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // Column widths
  ws['!cols'] = [14,8,9,9,8,9,9,8,9,9,12,8,8,11,9,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, 'Service Wise');
  XLSX.writeFile(wb, `ServiceWise_${d.from}_to_${d.to}.xlsx`);
  toast('success', 'Excel exported!');
}

function printSvcWise(){
  const tbl = document.getElementById('sw_table');
  if(!tbl) return;
  const d = window._swData || {};
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Service Wise Report</title>
  <style>

</style></head><body>

}

function runTraffic(){

    badge, ptype:(document.getElementById('tr_type')||{}).value||'driver',

    to:(document.getElementById('tr_to')||{}).value||S.date,
    lineRate:parseFloat((document.getElementById('tr_lrate')||{}).value)||0,
    nightRate:parseFloat((document.getElementById('tr_nrate')||{}).value)||0,
  };
  showLoad('Generating report…');
  gsr('getTrafficReport',[params],res=>{
    hideLoad();
    if(res&&res.error){toast('error',res.error);return;}
    if(!res||!res.found||!res.trips||!res.trips.length){
      document.getElementById('trafficResult').innerHTML=`<div class="wbox info">No trips found for badge <strong>${badge}</strong> in selected date range.</div>`;

  {id:'type-wise',icon:'🗂️',bg:'rgba(99,102,241,.15)',name:'Type Wise Report',desc:'Trips, KM, Revenue & KMPL by vehicle/schedule type'},
  {id:'svc-wise',icon:'📊',bg:'rgba(16,185,129,.15)',name:'Service Wise Report',desc:'EXP/GNR/SLP/MINI/MIDI'},
  {id:'only-cash',icon:'💵',bg:'rgba(234,179,8,.15)',name:'Only Cash Report',desc:'Item-wise Only Cash'},
];

function renderReports(){
  if(S.sub){renderRptViewer(S.sub);return;}
  const cards=RPTS.map(r=>`
    <div class="rpt-card" onclick="S.sub='${r.id}';render()">
      <div class="rpt-icon" style="background:${r.bg}">${r.icon}</div>
      <div><div class="rpt-name">${r.name}</div><div class="rpt-desc">${r.desc}</div></div>
    </div>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="ph fu"><div class="ph-title">📈 Reports</div><div class="ph-sub">Select a report to view data</div></div>
    <div class="rpt-grid fu">${cards}</div>`;
}

function renderRptViewer(type){
  // Individual and Range need special forms
  if(type==='individual'){renderIndividualReport();return;}
  if(type==='range'){renderRangeReport();return;}
  if(type==='type-wise'){renderTypeWiseReport();return;}
  if(type==='svc-wise'){renderServiceWiseReport();return;}
  if(type==='dor'){renderDOR();return;}
  if(type==='only-cash'){renderOnlyCashReport();return;}
  if(type==='trip-report'){renderTripReportPanel();return;}

  const rDef=RPTS.find(r=>r.id===type)||{name:type,icon:'📊'};
  const fromDate=S.date, toDate=S.date;

  showLoad('Loading report…');
  gsr('getReportData',[fromDate,toDate],data=>{
    hideLoad();
    if(!data||data._error){toast('error',data?data._error:'No data');return;}

    let cols=[],rows=[];
    let title=rDef.name;

    // Extract correct data based on report type
    if(false&&type==='dor'){/* handled by renderDOR() */
    } else if(type==='fuel-r'&&data.fuelRows){
      cols=['Date','Sch ID','Sch No','Vehicle','Driver','Opt KM','Dead KM','Div KM','Total KM','Diesel (L)','Uria (L)','KMPL'];
      rows=(data.fuelRows||[]).map(r=>[r.date,r.schId,r.schNo,r.vehicle,r.driver,r.optKm,r.deadKm,r.divKm,r.totalKm,r.diesel,r.uria,r.kmpl]);
    } else if(type==='cash-r'&&data.cashRows){
      cols=['Date','Sch ID','Conductor','Mobile','Bag No','Cash (₹)','Pass','Students','Dhaba','EPKM'];
      rows=(data.cashRows||[]).map(r=>[r.date,r.schId,r.conductor,r.mobile,r.bagNo,r.cash,r.pass,r.students,r.dhaba,r.epkm]);
    } else if(type==='cancel'&&data.cancellationRows){
      cols=['Date','Sch ID','Route','Type','San KM','Can KM','Status','Driver','Vehicle'];
      rows=(data.cancellationRows||[]).map(r=>[r.date,r.schId,r.route,r.type,r.sanKm,r.cancelKm,r.status,r.driver,r.vehicle]);
    } else if(type==='epkm'){
      const top=(data.top15Epkm||[]).map(r=>[r.badge,r.name,r.mobile,r.days,'TOP',r.totalCash,r.totalKm,r.pass,r.epkm]);
      const low=(data.low15Epkm||[]).map(r=>[r.badge,r.name,r.mobile,r.days,'LOW',r.totalCash,r.totalKm,r.pass,r.epkm]);
      cols=['Badge','Name','Mobile','Days','Rank','Cash (₹)','KM','Pass','EPKM'];
      rows=[...top,...low];
    } else if(type==='driver'&&data.driverStats){
      cols=['Badge','Name','Mobile','Sch IDs','Days','Vehicles','Opt KM','Diesel (L)','Dead KM','Avg KMPL'];
      rows=(data.driverStats||[]).map(r=>[r.badge,r.name,r.mobile,r.schIds,r.days,r.vehicles,r.totalOptKm,r.totalDiesel,r.totalDeadKm,r.avgKmpl]);
    } else if(type==='conductor'&&data.conductorStats){
      cols=['Badge','Name','Mobile','Days','Cash (₹)','Pass','Students','Dhaba','Avg EPKM'];
      rows=(data.conductorStats||[]).map(r=>[r.badge,r.name,r.mobile,r.days,r.totalCash,r.totalPass,r.totalStudents,r.totalDhaba,r.avgEpkm]);
    } else if(type==='vehicle'&&data.vehicleStats){
      cols=['Vehicle','Type','Days','Drivers','Opt KM','Diesel (L)','Dead KM','Avg KMPL'];
      rows=(data.vehicleStats||[]).map(r=>[r.vehicle,r.type,r.days,r.drivers,r.totalOptKm,r.totalDiesel,r.totalDeadKm,r.avgKmpl]);
    } else if(type==='weekly'&&data.weeklyStats){
      cols=['Week','Trips','YES','NO','Opt KM','Can KM','Diesel','Avg KMPL','Cash','Avg EPKM','Pass','Rate%'];
      rows=(data.weeklyStats||[]).map(r=>[r.week,r.trips,r.yesTrips,r.noTrips,r.optKm,r.cancelKm,r.diesel,r.avgKmpl,r.cash,r.avgEpkm,r.pass,r.compRate]);
    } else if(type==='monthly-drv'&&data.monthlyDriver){
      cols=['Month','Badge','Name','Trips','YES','Opt KM','Diesel','Dead KM','Avg KMPL'];
      rows=(data.monthlyDriver||[]).map(r=>[r.month,r.badge,r.name,r.trips,r.yesTrips,r.optKm,r.diesel,r.deadKm,r.avgKmpl]);
    } else if(type==='monthly-con'&&data.monthlyConductor){
      cols=['Month','Badge','Name','Days','Cash (₹)','Pass','Students','Dhaba','Avg EPKM'];
      rows=(data.monthlyConductor||[]).map(r=>[r.month,r.badge,r.name,r.days,r.cash,r.pass,r.students,r.dhaba,r.avgEpkm]);
    } else if(type==='util'&&data.utilisationReport){
      cols=['Date','Opt Sch','Opt Trips','Opt KM','Can KM','Drivers','Conductors','Vehicles','Veh Util','Crew Util'];
      rows=(data.utilisationReport||[]).map(r=>[r.date,r.optSch,r.optTrips,r.optKm,r.canKm,r.drivers,r.conductors,r.vehicles,r.vehUtil,r.crewUtil]);
    } else if(type==='sch-daily'&&data.schWiseDay){
      const day=data.schWiseDay[fromDate]||Object.values(data.schWiseDay||{})[0]||[];
      cols=['Rank','Sch No','Route','Trips','YES','Opt KM','Can KM','Cash','Diesel','Driver','Conductor','EPKM','KMPL'];
      rows=day.map(r=>[r.rank,r.schNo,r.route,r.trips,r.yesTrips,r.optKm,r.canKm,r.cash,r.diesel,r.driverName||r.driverBadge,r.condName||r.condBadge,r.epkm,r.kmpl]);
    } else {
      cols=['No Data'];rows=[['No data available for this report type in the selected date range.']];
    }

    S.rData={cols,rows}; S.rSortCol=-1;
    showRptTable(rDef,cols,rows,fromDate,toDate);
  });
}

function showRptTable(rDef,cols,rows,from,to){
  const thead=cols.map((c,i)=>`<th class="sort" onclick="sortRpt(${i})">${c} ↕</th>`).join('');
  const tbody=rows.map(row=>`<tr>${row.map(cell=>`<td class="${typeof cell==='number'?'mono':''}">${cell!=null&&cell!==undefined?typeof cell==='number'?cell.toLocaleString('en-IN'):cell:'—'}</td>`).join('')}</tr>`).join('');

  document.getElementById('main').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px" class="fu">
      <button class="btn btn-ghost btn-sm" onclick="S.sub='';render()">← Back</button>
      <div class="ph-title" style="font-size:16px">${rDef.icon} ${rDef.name}</div>
    </div>
    <div class="rviewer fu">
      <div class="rtbar">
        <span class="rtbar-title" style="color:var(--txt2)">${rows.length} records</span>
        <span class="sp"></span>
        <label style="font-size:11px;color:var(--txt3)">From</label>
        <input type="date" id="rFrom" value="${from}" style="font-size:11px;padding:4px 7px;width:130px">
        <label style="font-size:11px;color:var(--txt3)">To</label>
        <input type="date" id="rTo" value="${to}" style="font-size:11px;padding:4px 7px;width:130px">
        <button class="btn btn-ghost btn-sm" onclick="reloadRpt()">Load</button>
        <button class="btn btn-ghost btn-sm" onclick="exportRpt()">📥 Excel</button>
        <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨 Print</button>
      </div>
      <div class="rtwrap"><table class="rtbl"><thead><tr>${thead}</tr></thead><tbody>${tbody||'<tr><td colspan="99" style="text-align:center;padding:20px;color:var(--txt3)">No data</td></tr>'}</tbody></table></div>
    </div>`;
}

function reloadRpt(){
  const from=(document.getElementById('rFrom')||{}).value||S.date;
  const to=(document.getElementById('rTo')||{}).value||S.date;
  const rDef=RPTS.find(r=>r.id===S.sub)||{name:S.sub,icon:'📊'};
  showLoad('Loading…');
  gsr('getReportData',[from,to],data=>{
    hideLoad();
    // Re-render with same type but new date range
    // (reuse same renderRptViewer logic — simplest to just re-call)
    const savedDate=S.date; S.date=from;
    renderRptViewer(S.sub);
    S.date=savedDate;
  });
}

function sortRpt(col){
  if(!S.rData) return;
  if(S.rSortCol===col) S.rSortAsc=!S.rSortAsc;
  else{S.rSortCol=col;S.rSortAsc=true;}
  S.rData.rows.sort((a,b)=>{
    const x=a[col],y=b[col];
    const nx=parseFloat(String(x).replace(/[^0-9.-]/g,'')),ny=parseFloat(String(y).replace(/[^0-9.-]/g,''));
    if(!isNaN(nx)&&!isNaN(ny)) return S.rSortAsc?nx-ny:ny-nx;
    return S.rSortAsc?String(x||'').localeCompare(String(y||'')):String(y||'').localeCompare(String(x||''));
  });
  const rDef=RPTS.find(r=>r.id===S.sub)||{name:S.sub,icon:'📊'};
  showRptTable(rDef,S.rData.cols,S.rData.rows,S.date,S.date);
}

function exportRpt(){
  if(!S.rData) return;
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([S.rData.cols,...S.rData.rows]);
  XLSX.utils.book_append_sheet(wb,ws,'Report');
  XLSX.writeFile(wb,`DepotReport_${S.sub}_${S.date}.xlsx`);
  toast('success','Excel exported!');
}

function renderTypeWiseReport(){
  const rDef=RPTS.find(r=>r.id==='type-wise')||{name:'Type Wise Report',icon:'🗂️'};
  const main=document.getElementById('main');

  // Build filter UI first
  main.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px" class="fu">
      <button class="btn btn-ghost btn-sm" onclick="S.sub='';render()">← Back</button>
      <div class="ph-title" style="font-size:16px">🗂️ Type Wise Report</div>
    </div>

    <div class="card fu">
      <div class="card-hdr"><div class="card-title">🔍 Filters</div></div>
      <div class="fgrid" style="padding:4px 0 8px">
        <div class="fg">
          <label class="fl">From Date</label>
          <input type="date" id="tw_from" value="${S.date}">
        </div>
        <div class="fg">
          <label class="fl">To Date</label>
          <input type="date" id="tw_to" value="${S.date}">
        </div>
        <div class="fg">
          <label class="fl">Group By</label>
          <select id="tw_grp">
            <option value="vehicleType">Vehicle Type</option>
            <option value="scheduleType">Schedule Type</option>
            <option value="routeType">Route Type</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:4px">
        <button class="btn btn-p" onclick="loadTypeWiseData()">Load Report</button>
      </div>
    </div>

    <div id="tw_result"></div>`;
}

function loadTypeWiseData(){
  const from=(document.getElementById('tw_from')||{}).value||S.date;
  const to=(document.getElementById('tw_to')||{}).value||S.date;
  const grp=(document.getElementById('tw_grp')||{}).value||'vehicleType';
  const el=document.getElementById('tw_result');
  if(el) el.innerHTML=`<div style="text-align:center;padding:36px;color:var(--txt3)"><div class="spin" style="margin:0 auto 10px"></div><div style="font-size:13px;font-weight:600">Loading type-wise data…</div></div>`;

  showLoad('Loading type-wise report…');
  gsr('getReportData',[from,to],data=>{
    hideLoad();
    if(!data||data._error){
      if(el) el.innerHTML=`<div class="wbox warn">⚠️ ${data?data._error:'Could not load data'}</div>`;
      return;
    }

    // Build type-wise aggregation from available data
    const typeMap={};

    const addRow=(typeKey,r)=>{
      if(!typeKey) typeKey='Unknown';
      if(!typeMap[typeKey]) typeMap[typeKey]={
        type:typeKey,scheds:new Set(),trips:0,yes:0,no:0,bd:0,
        optKm:0,canKm:0,deadKm:0,diesel:0,cash:0,pass:0,students:0,days:new Set()
      };
      const t=typeMap[typeKey];
      if(r.schId) t.scheds.add(r.schId);
      if(r.date)  t.days.add(r.date);
      t.trips+=(r.trips||r.yesTrips+r.noTrips+r.bdTrips)||0;
      t.yes+=(r.yesTrips||r.yes||0);
      t.no+=(r.noTrips||r.no||0);
      t.bd+=(r.bdTrips||r.bd||0);
      t.optKm+=(parseFloat(r.optKm)||0);
      t.canKm+=(parseFloat(r.canKm)||r.cancelKm||0);
      t.deadKm+=(parseFloat(r.deadKm)||0);
      t.diesel+=(parseFloat(r.diesel)||0);
      t.cash+=(parseFloat(r.cash)||0);
      t.pass+=(parseInt(r.pass)||0);
      t.students+=(parseInt(r.students)||0);
    };

    // Try fuel rows (has vehicle type)
    if(data.fuelRows&&data.fuelRows.length){
      data.fuelRows.forEach(r=>{
        const key=grp==='vehicleType'?(r.vehicleType||r.type||r.vtype||'Standard')
                 :grp==='scheduleType'?(r.schType||r.serviceType||r.stype||'Regular')
                 :(r.routeType||r.route||'General');
        addRow(key,r);
      });
    }
    // Try DOR rows (has service type)
    if(data.dailyOpRows&&data.dailyOpRows.length){
      data.dailyOpRows.forEach(r=>{
        const key=grp==='vehicleType'?(r.vehicleType||r.type||'Standard')
                 :grp==='scheduleType'?(r.schType||r.serviceType||r.stype||'Regular')
                 :(r.routeType||r.serviceType||'General');
        addRow(key,r);
      });
    }
    // Try sch-wise day
    const schDay=data.schWiseDay||{};
    Object.values(schDay).forEach(arr=>{
      (arr||[]).forEach(r=>{
        const key=grp==='vehicleType'?(r.vehicleType||r.vtype||'Standard')
                 :grp==='scheduleType'?(r.schType||r.serviceType||r.stype||'Regular')
                 :(r.routeType||r.route||'General');
        addRow(key,r);
      });
    });

    // If no real data grouped, show message with empty state
    const entries=Object.values(typeMap);

    if(!entries.length){
      // Build fallback from S.dayStatus schedules using allotment vehicle types
      const fallback={};
      (S.dayStatus.schedules||[]).forEach(sch=>{
        const vt=(window._allotVehMap&&window._allotVehMap[sch.schId])?'Own':'Unknown';
        if(!fallback[vt]) fallback[vt]={type:vt,scheds:new Set(),trips:0,yes:0,no:0,bd:0,optKm:0,canKm:0,deadKm:0,diesel:0,cash:0,pass:0,students:0,days:new Set()};
        const t=fallback[vt];
        t.scheds.add(sch.schId||'?');
        if(sch.tc)  t.yes++;
        if(!sch.tc) t.no++;
        t.trips++;
      });
      Object.assign(typeMap,fallback);
    }

    const rows=Object.values(typeMap).map(t=>{
      const totalKm=t.optKm+t.deadKm;
      const kmpl=t.diesel>0?+(totalKm/t.diesel).toFixed(2):0;
      const epkm=t.optKm>0?+(t.cash/t.optKm).toFixed(2):0;
      const rate=t.trips>0?+(t.yes/t.trips*100).toFixed(1):0;
      return [
        t.type,
        t.scheds.size,
        t.days.size,
        t.trips,
        t.yes,
        t.no,
        t.bd,
        rate+'%',
        Math.round(t.optKm),
        Math.round(t.canKm),
        Math.round(t.deadKm),
        +t.diesel.toFixed(1),
        kmpl||'—',
        Math.round(t.cash),
        t.pass,
        t.students,
        epkm||'—',
      ];
    });

    // Totals row
    const tot=rows.reduce((acc,r)=>{
      [1,2,3,4,5,6,8,9,10,11,13,14,15].forEach(i=>{
        acc[i]=(acc[i]||0)+(parseFloat(String(r[i]).replace(/[^0-9.]/g,''))||0);
      });
      return acc;
    },['TOTAL',...Array(16).fill(0)]);
    const totKmpl=tot[11]>0?+((tot[8]+tot[10])/tot[11]).toFixed(2):0;
    const totEpkm=tot[8]>0?+(tot[13]/tot[8]).toFixed(2):0;
    const totRate=tot[3]>0?+(tot[4]/tot[3]*100).toFixed(1):0;
    tot[7]=totRate+'%'; tot[12]=totKmpl||'—'; tot[16]=totEpkm||'—';
    tot[1]='-'; tot[2]='-';

    const cols=['Type','Scheds','Days','Trips','YES','NO','BD','Rate%','Opt KM','Can KM','Dead KM','Diesel (L)','KMPL','Cash (₹)','Pass','Students','EPKM'];
    S.rData={cols,rows:[...rows,tot]};
    S.rSortCol=-1;

    const grpLabel={'vehicleType':'Vehicle Type','scheduleType':'Schedule Type','routeType':'Route Type'};
    showTypeWiseTable(cols,rows,tot,from,to,grpLabel[grp]||grp);
  });
}

function showTypeWiseTable(cols,rows,tot,from,to,grpLabel){
  const el=document.getElementById('tw_result');
  if(!el) return;

  // Color coding for type cells
  const typeColors=['#1a56e8','#0e9e52','#c47100','#d91a1a','#7c3aed','#0891b2','#4338ca','#059669'];
  const typeIdx={};
  rows.forEach((r,i)=>{ if(!typeIdx[r[0]]) typeIdx[r[0]]=typeColors[Object.keys(typeIdx).length%typeColors.length]; });

  const thead=cols.map((c,i)=>`<th class="sort" onclick="sortRpt(${i})">${c} ↕</th>`).join('');
  const tbody=rows.map(row=>`<tr>
    ${row.map((cell,i)=>{
      if(i===0){
        const col=typeIdx[cell]||'#5c6494';
        return `<td><span style="display:inline-flex;align-items:center;gap:6px;font-weight:800;"><span style="width:9px;height:9px;border-radius:3px;background:${col};flex-shrink:0;display:inline-block"></span>${cell}</span></td>`;
      }
      const isNum=typeof cell==='number'||(typeof cell==='string'&&!isNaN(parseFloat(cell))&&cell!=='—'&&!cell.includes('%'));
      return `<td class="${isNum?'mono':''}" style="${i>=3&&i<=6?'text-align:center':''}">${cell!=null&&cell!==undefined&&cell!==''?isNum?parseFloat(cell).toLocaleString('en-IN'):cell:'—'}</td>`;
    }).join('')}
  </tr>`).join('');

  const totRow=`<tr style="background:var(--surf2);font-weight:800">
    ${tot.map((cell,i)=>`<td class="${i>0?'mono':''}" style="font-weight:800;color:var(--txt);border-top:2px solid var(--bdr)">${cell!=null&&cell!==undefined&&cell!==''?typeof cell==='number'?cell.toLocaleString('en-IN'):cell:'—'}</td>`).join('')}
  </tr>`;

  // Summary cards
  const totalTrips=rows.reduce((s,r)=>s+(parseFloat(r[3])||0),0);
  const totalKm=rows.reduce((s,r)=>s+(parseFloat(r[8])||0),0);
  const totalCash=rows.reduce((s,r)=>s+(parseFloat(r[13])||0),0);
  const totalTypes=rows.length;

  el.innerHTML=`
    <!-- Summary strip -->
    <div class="dash-grid fu" style="margin-bottom:0">
      <div class="dc"><div class="dc-lbl">Types Found</div><div class="dc-val b">${totalTypes}</div><div class="dc-sub">Grouped by ${grpLabel}</div></div>
      <div class="dc"><div class="dc-lbl">Total Trips</div><div class="dc-val b">${totalTrips}</div><div class="dc-sub">Across all types</div></div>
      <div class="dc"><div class="dc-lbl">Total Opt KM</div><div class="dc-val g">${Math.round(totalKm).toLocaleString('en-IN')}</div><div class="dc-sub">Operated KM</div></div>
      <div class="dc"><div class="dc-lbl">Total Cash (₹)</div><div class="dc-val g">${Math.round(totalCash).toLocaleString('en-IN')}</div><div class="dc-sub">Revenue</div></div>
    </div>

    <!-- Progress bars per type -->
    <div class="card fu" style="padding:14px 18px">
      <div class="card-hdr" style="padding:0 0 12px;margin-bottom:12px"><div class="card-title">📊 KM Share by ${grpLabel}</div></div>
      ${rows.map(r=>{
        const pct=totalKm>0?Math.round((parseFloat(r[8])||0)/totalKm*100):0;
        const col=typeIdx[r[0]]||'#5c6494';
        return `<div class="sbar" style="margin-bottom:8px">
          <span class="sbar-l" style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:3px;background:${col};flex-shrink:0;display:inline-block"></span>${r[0]}</span>
          <div class="sbar-t"><div class="sbar-f" style="width:${pct}%;background:${col}"></div></div>
          <span class="sbar-v">${pct}%</span>
        </div>`;
      }).join('')}
    </div>

    <!-- Table -->
    <div class="rviewer fu">
      <div class="rtbar">
        <span class="rtbar-title" style="color:var(--txt2)">${rows.length} type(s) · ${from}${from!==to?' → '+to:''}</span>
        <span class="sp"></span>
        <button class="btn btn-ghost btn-sm" onclick="loadTypeWiseData()">↻ Reload</button>
        <button class="btn btn-ghost btn-sm" onclick="exportTypeWise()">📥 Excel</button>
        <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨 Print</button>
      </div>
      <div class="rtwrap">
        <table class="rtbl">
          <thead><tr>${thead}</tr></thead>
          <tbody>${tbody||'<tr><td colspan="99" style="text-align:center;padding:24px;color:var(--txt3)">No data found — check date range or connect Sheets</td></tr>'}${totRow}</tbody>
        </table>
      </div>
    </div>`;
}

function exportTypeWise(){
  if(!S.rData) return;
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([S.rData.cols,...S.rData.rows]);

function loadDOR(){
