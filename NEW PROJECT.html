  setBadge('nb-cash',cashLabel,cashDone===tcDone&&tcDone>0&&!ceCashPend?'ok':cashDone>0||ceCashPend?'warn':'');
  setBadge('nb-dash',`${S.dayStatus.complete||0}/${total}`,S.dayStatus.complete===total&&total>0?'ok':'');
}
function setBadge(id,txt,cls){
  const el=document.getElementById(id);

// ─── ROUTING ───────────────────────────────────────────────
function goto(page,sub=''){
  // Cleanup trip-report host class when navigating away
  var _m=document.getElementById('main');
  if(_m) _m.classList.remove('rpt-host');
  S.page=page; S.sub=sub;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('act'));
  const nav=document.getElementById('nav-'+page);
  if(nav) nav.classList.add('act');
  render();
}
function render(){
  switch(S.page){
    case 'dash':    renderDash();    break;
    case 'allot':   renderAllot();   break;
    case 'tc':      renderTC();      break;
    case 'ccext':   goto('allot'); return; // CC/EXT now handled via Allotment
    case 'fuel':    renderFuel();    break;
    case 'miscfuel':renderMiscFuel();break;
    case 'cash':    renderCash();    break;
    case 'onlycash':S.page='cash';renderCash();break; // OC accessed via Cash Entry tile
    case 'traffic': renderTraffic(); break;
    case 'reports': renderReports(); break;
    default: document.getElementById('main').innerHTML='<div class="empty"><div class="ei">🚧</div><div class="et">Coming Soon</div></div>';
  }
}

// ─── SCHEDULE HELPERS ──────────────────────────────────────
function schSt(schId){
  // Returns cached status or empty defaults
  const c=S.statusCache[schId];
  if(c) return c;
  const ds=S.dayStatus.schedules||[];
  const found=ds.find(s=>s.schId===schId);
  if(found) return {tc:{done:found.tc},diesel:{done:found.diesel},service:{done:found.service},allComplete:found.complete};
  return {tc:{done:false},diesel:{done:false},service:{done:false},allComplete:false};
}
function schCls(schId){
  const st=schSt(schId);
  if(st.allComplete) return 'st-done';
  if(st.tc.done) return 'st-part';
  return 'st-none';
}

// Schedule selector HTML — grid card layout
function schSelHTML(sel){

  const regCards=S.schIds.map(id=>{

    const flD=st.diesel&&st.diesel.done;
    const csD=st.service&&st.service.done;

    const cls=allD?'st-done':tcD?'st-part':'st-none';
    const selCls=id===sel?' sel':'';
    const prog=allD?100:csD?80:flD?55:tcD?30:0;

    const csD = !!((st.service||{}).done || c.service);

function filterChips(v){

function pipeHTML(active){

const _smart = {
  anomalies: null,          // last getAnomalies() result
  insights:  null,          // last getTrendInsights() result

// Fetch anomalies + trend insights from backend (throttled to 60s)
function smartFetch(force) {
  const now = Date.now();
  if (!force && _smart.loading) return;
  if (!force && (now - _smart.lastFetch) < 60000) return;
  _smart.loading = true;
  gsr('getAnomalies', [{ days:3, lookbackDays:30 }], res => {
    _smart.anomalies = res;
    gsr('getTrendInsights', [], ins => {
      _smart.insights  = ins;
      _smart.loading   = false;
      _smart.lastFetch = Date.now();
      if (S.page === 'dash') {
        dbRenderAlerts(_buildSmartAlerts());
        dbRenderInsights();
      }
    });
  });
}

// Build combined alert list from anomalies + live schedule status
function _buildSmartAlerts() {
  const schs   = S.dayStatus.schedules || [];
  const pending = S.schIds.filter(id => !schSt(id).tc.done);
  const tcD    = schs.filter(s => s.tc).length;
  const flD    = schs.filter(s => s.diesel).length;
  const liveAlerts = [
    ...(pending.length ? [{ cls:'crit', ico:'🚨',
      title:`${pending.length} Schedule(s) — No TC Entry`,
      desc: pending.slice(0,4).join(', ') + (pending.length > 4 ? ' …' : '') }] : []),
    ...(flD < tcD ? [{ cls:'warn', ico:'⛽',
      title:`Fuel Pending: ${tcD - flD} Schedule(s)`,
      desc: 'TC done but fuel not yet entered' }] : []),
  ];
  // Add backend anomaly alerts
  const anom = (_smart.anomalies && _smart.anomalies.alerts) || [];
  const backendAlerts = anom.slice(0, 8).map(a => ({
    cls:  a.severity === 'crit' ? 'crit' : 'warn',
    ico:  a.severity === 'crit' ? '🚨' : '⚠️',
    title: a.title,
    desc:  a.desc,
    _type: a.type,
  }));
  return [...liveAlerts, ...backendAlerts,
    { cls:'info', ico:'ℹ️', title:'Workshop Returns Due', desc:'Check vehicles expected back today' },
  ];
}

    {lbl:'Fully Complete', v:p(comp), c:'var(--blue)'},

function dbAddFeed(){
  const samples=[
    {cls:'tc',  ico:'✅',title:'TC Updated — <b>Schedule</b>',sub:'Manual entry added',time:'just now'},
    {cls:'fuel',ico:'⛽',title:'Fuel entry saved',sub:'KMPL recorded',time:'just now'},
    {cls:'allot',ico:'🚌',title:'Allotment updated',sub:'Vehicle assigned',time:'just now'},

  _dbFeed.unshift(samples[Math.floor(Math.random()*samples.length)]);
  if(_dbFeed.length>10) _dbFeed.pop();

function dbRenderAlerts(alerts){
  const cnt=alerts.filter(a=>a.cls!=='info').length;
  const ac=document.getElementById('db_alert_cnt');
  if(ac) ac.textContent=cnt+' active';
  const al=document.getElementById('db_alert_list');
  if(!al)return;
  if(!alerts.length){al.innerHTML='<div style="padding:10px 0;font-size:12px;color:var(--green);font-weight:700">✅ No anomalies detected</div>';return;}
  al.innerHTML=alerts.map(a=>`<div class="db-alert-item ${a.cls}">
    <div style="font-size:18px">${a.ico}</div>
    <div style="flex:1"><div class="db-alert-ttl">${a.title}</div><div class="db-alert-dsc">${a.desc}</div></div>
    <div style="font-size:15px;color:var(--txt3)">›</div>
  </div>`).join('');
}

function dbRenderCalendar(){
  const cg=document.getElementById('db_cal_grid');
  if(!cg)return;
  const dt=new Date(S.date+'T00:00:00');
  const today=dt.getDate();
  const firstDay=new Date(dt.getFullYear(),dt.getMonth(),1).getDay();
  const daysInMonth=new Date(dt.getFullYear(),dt.getMonth()+1,0).getDate();
  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="db-cal-cell empty">·</div>`;
  for(let d=1;d<=daysInMonth;d++){
    const future=d>today;
    const p = (window._dbCAL_PERF_LIVE || _dbCAL_PERF)[d-1] || 0;
    let cls='future';
    if(d===today) cls='today';
    else if(!future&&p>=90) cls='full';
    else if(!future&&p>=65) cls='part';
    else if(!future&&p>0) cls='low';
    html+=`<div class="db-cal-cell ${cls}" title="${future?'Future':'Completion: '+p+'%'}" onclick="dbCalClick(${d})">${d}</div>`;
  }
  cg.innerHTML=html;
}

function dbCalClick(d){
  const dt=new Date(S.date+'T00:00:00');
  const nd=new Date(dt.getFullYear(),dt.getMonth(),d);
  if(nd>new Date()) return;
  S.date=nd.toISOString().split('T')[0];
  document.getElementById('hdrDate').value=S.date;
  loadMaster();
  toast('info','Switched to '+dispDate(S.date));
}

  Chart.defaults.font.family="'Inter',sans-serif";
  Chart.defaults.color='#5c6494';
  Chart.defaults.borderColor='rgba(0,0,0,.06)';

  // LINE CHART
  const lc=document.getElementById('db_line_chart');
  if(lc){
    if(_dbCharts.line) _dbCharts.line.destroy();
    _dbCharts.line=new Chart(lc,{
      type:'line',
      data:{
        labels:_dbDEMO.days,
        datasets:[
          {label:'Revenue (₹)',data:_dbDEMO.rev,yAxisID:'y',borderColor:'#1a56e8',backgroundColor:'rgba(26,86,232,.07)',fill:true,tension:.42,pointRadius:4,pointBackgroundColor:'#1a56e8',pointBorderColor:'#fff',pointBorderWidth:2},

        ]
      },
      options:{

        interaction:{mode:'index',intersect:false},

          tooltip:{backgroundColor:'#fff',borderColor:'#cdd2e8',borderWidth:1.5,titleColor:'#0f1629',bodyColor:'#5c6494',padding:11}
        },
        scales:{
          x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:11}}},
          y:{position:'left',grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},callback:v=>'₹'+Math.round(v/1000)+'k'}},
          y1:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:10},callback:v=>v+'km'}},
        }
      }
    });
  }

  // DONUT CHART
  const dc=document.getElementById('db_donut_chart');
  if(dc){
    const ds2=S.dayStatus;

    const t2=S.schIds.length||schs2.length||1;
    const all2=schs2.filter(s=>s.tc&&s.diesel&&s.service).length;
    const part2=schs2.filter(s=>s.tc&&!(s.diesel&&s.service)).length;
    const pend2=t2-all2-part2;
    if(_dbCharts.donut) _dbCharts.donut.destroy();
    _dbCharts.donut=new Chart(dc,{
      type:'doughnut',
      data:{
        labels:['Complete','In Progress','Pending'],
        datasets:[{data:[all2||0,part2||0,Math.max(0,pend2||t2)],backgroundColor:['#0e9e52','#c47100','#e8eaf4'],borderColor:['#e6faf0','#fff4e0','#cdd2e8'],borderWidth:3,hoverBorderColor:'#fff'}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'72%',
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:'#cdd2e8',borderWidth:1.5,titleColor:'#0f1629',bodyColor:'#5c6494',padding:10}},
        animation:{animateRotate:true,duration:1100}
      }
    });
    const dl=document.getElementById('db_donut_legend');
    if(dl) dl.innerHTML=[
      {c:'#0e9e52',n:'Complete',  v:all2,  p:Math.round(all2/t2*100)},
      {c:'#c47100',n:'In Progress',v:part2, p:Math.round(part2/t2*100)},
      {c:'#cdd2e8',n:'Pending',   v:pend2, p:Math.round(Math.max(0,pend2)/t2*100)},
    ].map(d=>`<div class="db-dl-item">
      <div class="db-dl-sw" style="background:${d.c}"></div>
      <div class="db-dl-lbl">${d.n}</div>
      <div class="db-dl-n">${d.v}</div>
      <div class="db-dl-p">${d.p}%</div>
    </div>`).join('');
  }

  // BAR CHART
  const bc=document.getElementById('db_bar_chart');
  if(bc){
    if(_dbCharts.bar) _dbCharts.bar.destroy();
    _dbCharts.bar=new Chart(bc,{
      type:'bar',
      data:{
        labels:_dbDEMO.days,
        datasets:[{label:'Utilization %',data:_dbDEMO.util,
          backgroundColor:_dbDEMO.util.map((v,i)=>i===6?'#1a56e8':v>=85?'#0e9e52':v>=70?'#1a56e8':'#d91a1a'),
          borderRadius:5,borderSkipped:false}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:'#cdd2e8',borderWidth:1.5,titleColor:'#0f1629',bodyColor:'#5c6494',padding:10,callbacks:{label:ctx=>`  ${ctx.raw}% utilization`}}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:10}}},
          y:{max:100,grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},callback:v=>v+'%'}}
        }
      }
    });
  }
}

function dbUpdateLine(){
  const n=parseInt((document.getElementById('db_chart_period')||{}).value)||7;
  const labels=Array.from({length:n},(_,i)=>{
    if(i===n-1) return 'Today';
    const d=new Date(); d.setDate(d.getDate()-(n-1-i));
    return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric'});
  });
  const rnd=(n,min,rng)=>Array.from({length:n},()=>Math.round(min+Math.random()*rng));
  if(_dbCharts.line){
    _dbCharts.line.data.labels=labels;
    _dbCharts.line.data.datasets[0].data=rnd(n,14000,13000);
    _dbCharts.line.data.datasets[1].data=rnd(n,1400,1300);
    _dbCharts.line.update('active');
  }
}

// ═══════════════════════════════════════════════════════════
//  VEHICLE ALLOTMENT
// ═══════════════════════════════════════════════════════════
function renderAllot(){
  const main=document.getElementById('main');
  const header=`<div class="ph fu"><div class="ph-title">🚌 Vehicle Allotment</div><div class="ph-sub">Assign vehicles to schedules for ${dispDate(S.date)}</div></div>`;

  if(!S.selSch){
    // ── No schedule selected — show card selector ──────────
    showLoad('Loading allotments…');
    gsr('getDailyAllotments',[S.date],allots=>{
      hideLoad();
      // Build allotment map
      window._aMap={};
      window._vehUsed={};
      window._allotVehMap={};
      (allots||[]).forEach(a=>{
        if(a.schId) window._aMap[a.schId]=a;
        if(a.vehicleNo){ window._vehUsed[a.vehicleNo]=a.schId; window._allotVehMap[a.schId]=a.vehicleNo; }
      });

      const total=S.schIds.length;
      const done=S.schIds.filter(id=>(window._aMap[id]||{}).vehicleNo).length;
      const pct=total?Math.round(done/total*100):0;

      // Today's allotted CC/EXT schIds (CC-001, CC-002, EXT-001…)
      const ceIds = S.ccExtDailyIds || [];
      const ceDone = ceIds.filter(c=>!!c.vehicle).length;

      // Regular schedule cards
      const cards=S.schIds.map(id=>{
        const a=window._aMap[id]||{};
        const hasV=!!a.vehicleNo;
        const selCls=id===S.selSch?' sel':'';
        const stCls=hasV?'st-done':'st-none';
        return `<div class="sch-card ${stCls}${selCls}" onclick="selAllotSch('${id}')" title="${id}">
          <div class="sch-card-id">${id}</div>
          <div class="sch-card-status">
            ${hasV
              ?`<span class="sch-status-pip pip-done">🚌 ${a.vehicleNo}</span>`
              :`<span class="sch-status-pip pip-pend">No Vehicle</span>`}
          </div>
          <div class="sch-card-bar"><div class="sch-card-bar-fill" style="width:${hasV?100:0}%"></div></div>
        </div>`;
      }).join('');

      // CC/EXT section: already-allotted tiles (CC-001, CC-002…) + one "add new" tile per type
      // Already allotted tiles
      const ceAlreadyCards = ceIds.map(c=>{
        const a=window._aMap[c.schId]||{};
        const dispV = c.vehicle || a.vehicleNo || '';
        const hasV  = !!dispV;
        const isSel = c.schId===S.selSch;
        const isCC  = c.schId.toUpperCase().startsWith('CC-');
        const typeColor = isCC ? '#1a56e8' : '#b45309';
        const typeBg    = isCC ? '#e8f0fe' : '#fef3e2';
        return `<div class="sch-card ${hasV?'st-done':'st-none'}${isSel?' sel':''}"
          onclick="selAllotSch('${c.schId}')"
          style="border-top:3px solid ${typeColor}">
          <div class="sch-card-id" style="display:flex;align-items:center;gap:4px">
            ${c.schId}
            <span style="font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;background:${typeBg};color:${typeColor};border:1.5px solid ${typeColor}">${isCC?'CC':'EXT'}</span>
          </div>
          <div class="sch-card-status">
            ${hasV?`<span class="sch-status-pip pip-done">🚌 ${dispV}</span>`:`<span class="sch-status-pip pip-pend">No Vehicle</span>`}
          </div>
          <div class="sch-card-bar"><div class="sch-card-bar-fill" style="width:${hasV?100:0}%;background:${typeColor}"></div></div>
        </div>`;
      }).join('');

      // "Add new" tiles — always ONE +CC and ONE +EXT tile
      // S.ccExtIds may contain full IDs like ['CC-01','EXT-05'] — dedupe by type
      const ceTypeLabels=['CC','EXT'].filter(lbl=>
        !(S.ccExtIds&&S.ccExtIds.length) ||
        S.ccExtIds.some(id=>id.toUpperCase().startsWith(lbl))
      );
      const ceNewCards = ceTypeLabels.map(label=>{
        const isCC   = label==='CC';
        const typeColor = isCC ? '#1a56e8' : '#b45309';
        const typeBg    = isCC ? '#e8f0fe' : '#fef3e2';
        const existing  = ceIds.filter(c=>c.schId.toUpperCase().startsWith(label+'-'));
        const nextNum   = existing.length+1;
        const nextId    = label+'-'+(nextNum<10?'00':nextNum<100?'0':'')+nextNum;
        return `<div class="sch-card st-none"
          onclick="selAllotNewCE('${label}','${nextId}')"
          style="border-top:3px dashed ${typeColor};cursor:pointer;opacity:.85"
          title="Click to allot vehicle for new ${label} schedule (will be assigned ${nextId})">
          <div class="sch-card-id" style="display:flex;align-items:center;gap:5px">
            <span style="font-size:16px">＋</span>
            <span style="color:${typeColor};font-weight:900">${label}</span>
            <span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:${typeBg};color:${typeColor};border:1.5px solid ${typeColor}">NEW</span>
          </div>
          <div class="sch-card-status">
            <span class="sch-status-pip" style="background:${typeBg};color:${typeColor};border:1.5px solid ${typeColor}">→ ${nextId}</span>
          </div>
          <div class="sch-card-bar"><div class="sch-card-bar-fill" style="width:0%;background:${typeColor}"></div></div>
        </div>`;
      }).join('');

      main.innerHTML=`
        ${header}
        <!-- Progress -->
        <div class="card fu" style="padding:14px 20px">
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            <div>
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:4px">Allotment Progress</div>
              <div style="font-size:24px;font-weight:900;font-family:var(--mono);color:var(--blue)">${done}<span style="font-size:13px;color:var(--txt3);font-weight:600"> / ${total} schedules</span>${ceIds.length?`<span style="font-size:13px;color:var(--txt3);font-weight:600;margin-left:12px">· CC/EXT: ${ceDone}/${ceIds.length}</span>`:''}</div>
            </div>
            <div style="flex:1;min-width:180px">
              <div style="height:10px;background:var(--surf3);border-radius:6px;overflow:hidden;border:2px solid var(--bdr)">
                <div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'};border-radius:6px;transition:width .6s"></div>
              </div>
              <div style="font-size:11px;color:var(--txt3);font-weight:600;margin-top:3px">${pct}% complete · ${total-done} remaining</div>
            </div>
          </div>
        </div>
        <!-- Regular schedule grid -->
        <div class="sch-sel fu">
          <div class="sch-sel-top">
            <span class="sch-sel-lbl">Select Schedule to Allot</span>
            <div class="sch-legend">
              <span class="sch-leg-item"><span class="sch-leg-dot" style="background:var(--green)"></span>${done} Allotted</span>
              <span class="sch-leg-item"><span class="sch-leg-dot" style="background:var(--txt3)"></span>${total-done} Pending</span>
            </div>
            <input class="sch-filter" placeholder="🔍 Filter…" oninput="filterAllotCards(this.value)">
          </div>
          <div class="sch-grid" id="allotGrid">${cards}</div>
        </div>
        <!-- CC / EXT section — always shown -->
        <div class="sch-sel fu" style="border-top:2px solid var(--bdr);padding-top:8px">
          <div class="sch-sel-top">
            <span class="sch-sel-lbl" style="display:flex;align-items:center;gap:8px">
              🔀 CC / EXT Schedules
              <span style="font-size:10px;font-weight:700;background:#ede9fe;color:#4f46e5;padding:2px 8px;border-radius:10px;border:1.5px solid #a78bfa">Click + tile to allot new</span>
            </span>
            <div class="sch-legend">
              <span class="sch-leg-item"><span class="sch-leg-dot" style="background:var(--green)"></span>${ceDone} Allotted</span>
              <span class="sch-leg-item"><span class="sch-leg-dot" style="background:var(--txt3)"></span>${ceIds.length-ceDone} Pending</span>
            </div>
          </div>
          <div class="sch-grid">${ceAlreadyCards}${ceNewCards}</div>
        </div>
        <div class="card" style="text-align:center;padding:32px 20px;color:var(--txt3)">
          <div style="font-size:32px;margin-bottom:10px;opacity:.3">☝️</div>
          <div style="font-size:15px;font-weight:800;color:var(--txt2);margin-bottom:4px">Select a Schedule Above</div>
          <div style="font-size:13px;font-weight:500">Click any card to assign a vehicle · Click + CC / + EXT to add a new CC or EXT operation</div>
        </div>`;
    });
    return;
  }

  // ── Schedule selected — load trips & show assignment ──────
  showLoad('Loading schedule…');
  gsr('getDailyAllotments',[S.date],allots=>{
    window._aMap={};
    window._vehUsed={};
    window._allotVehMap={};
    (allots||[]).forEach(a=>{
      if(a.schId) window._aMap[a.schId]=a;
      if(a.vehicleNo){ window._vehUsed[a.vehicleNo]=a.schId; window._allotVehMap[a.schId]=a.vehicleNo; }
    });

    gsr('getFullSchedule',[S.selSch],trips=>{
      hideLoad();
      const tripList=trips||[];
      const hasTrips=tripList.length>0;
      const existing=window._aMap[S.selSch]||{};

      // All vehicles list
      const allVehs=S.vehicles||[];

      // Build available vehicle options (only FREE or already on this sch)
      function buildVehOpts(currentVeh){
        if(!allVehs.length) return `<option value="">No vehicles in master</option>`;
        let opts=`<option value="">— Select Vehicle —</option>`;
        const free=[], used=[];
        allVehs.forEach(v=>{
          const no=v.vehicle||v.vehicleNo||'';
          const usedBy=window._vehUsed[no];
          const isUsedElsewhere=usedBy&&usedBy!==S.selSch;
          if(isUsedElsewhere) used.push({no,usedBy,type:v.type||v.vehicleType||''});
          else free.push({no,type:v.type||v.vehicleType||''});
        });
        if(free.length){
          opts+=`<optgroup label="✅ Available (${free.length})">`;
          free.forEach(v=>{
            opts+=`<option value="${v.no}" ${v.no===currentVeh?'selected':''}>${v.no}${v.type?' — '+v.type:''}</option>`;
          });
          opts+=`</optgroup>`;
        }
        if(used.length){
          opts+=`<optgroup label="🔒 In Use — other schedules">`;
          used.forEach(v=>{
            opts+=`<option value="${v.no}" disabled style="color:#bbb">${v.no} → ${v.usedBy}</option>`;
          });
          opts+=`</optgroup>`;
        }
        return opts;
      }

      // Type selector HTML
      // Build type options from actual vehicle master data
      const allTypes=[...new Set(allVehs.map(v=>v.type||v.vehicleType||'').filter(Boolean))].sort();
      const typeList=allTypes.length?allTypes:['BUS','MINI','AC','EV','SLEEPER'];
      function typeOpts(cur){
        return `<option value="">Type…</option>`+typeList.map(t=>
          `<option value="${t}" ${cur===t?'selected':''}>${t}</option>`).join('');
      }
      // Get type for a specific vehicle number from master
      function getVehType(no){
        const v=allVehs.find(x=>(x.vehicle||x.vehicleNo||'')===no);
        return v?(v.type||v.vehicleType||''):'';
      }

      // ── SINGLE vehicle mode (whole schedule) ──────────────
      const singleVeh=existing.vehicleNo||'';
      const singleType=existing.vehicleType||'';

      // ── MULTI-TRIP rows ───────────────────────────────────
      // existing per-trip allotments (if backend supports it)
      const tripAllots=(existing.trips||[]);
      const tripRows=tripList.map((t,i)=>{
        const ta=tripAllots[i]||{};
        const tv=ta.vehicleNo||singleVeh||'';
        const tt=ta.vehicleType||singleType||'';
        return `<tr class="allot-trip-row" id="atrow_${i}">
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="tc-sch-num" style="width:28px;height:28px;font-size:12px">${t.schNo||i+1}</div>
              <div>
                <div style="font-size:13px;font-weight:800;color:var(--txt)">${t.route||'—'}</div>
                <div style="font-size:11px;color:var(--txt3);font-family:var(--mono);font-weight:600">${t.km||0} km · ${t.time||''}</div>
              </div>
            </div>
          </td>
          <td>
            <select class="allot-veh-sel" id="atv_${i}" onchange="onTripVehChange(${i},this)" style="font-size:13px;font-weight:700;padding:7px 28px 7px 10px">
              ${buildVehOpts(tv)}
            </select>
          </td>
          <td>
            <select class="allot-type-sel" id="att_${i}" style="font-size:13px;font-weight:700;padding:7px 28px 7px 10px">${typeOpts(tt)}</select>
          </td>
          <td>${tv?`<span class="pill pill-g" id="atbadge_${i}" style="font-size:11px">✓ Set</span>`:`<span class="pill pill-x" id="atbadge_${i}" style="font-size:11px">Pending</span>`}</td>
        </tr>`;
      }).join('');

      // ── Free vehicles count ───────────────────────────────
      const freeCount=allVehs.filter(v=>{
        const no=v.vehicle||v.vehicleNo||'';
        const u=window._vehUsed[no];
        return !u||u===S.selSch;
      }).length;

      const schName=(tripList[0]||{}).schName||(tripList[0]||{}).route||S.selSch;
      const schType=(tripList[0]||{}).type||'';

      main.innerHTML=`
        ${header}
        ${schSelHTML_allot(S.selSch)}

        <!-- COMPACT INFO + MODE BAR in ONE ROW -->
        <div class="aib fu">
          <!-- Info pills -->
          <div class="aib-info">
            <div class="aib-pill">
              <span class="aib-lbl">SCHEDULE</span>
              <span class="aib-val mono" style="color:var(--blue)">${S.selSch}</span>
            </div>
            <div class="aib-pill">
              <span class="aib-lbl">TRIPS</span>
              <span class="aib-val">${hasTrips?tripList.length:'—'}</span>
            </div>
            <div class="aib-pill">
              <span class="aib-lbl">FREE VEH</span>
              <span class="aib-val" style="color:var(--green)">${freeCount}</span>
            </div>
            ${existing.vehicleNo?`<div class="aib-pill" style="border-color:var(--green);background:var(--green-lt)">
              <span class="aib-lbl" style="color:var(--green)">CURRENT</span>
              <span class="aib-val mono" style="color:var(--green)">${existing.vehicleNo}</span>
            </div>`:''}
          </div>
          <!-- Mode tabs inline -->
          <div class="aib-tabs">
            <button class="aib-tab act" id="modeBtn-single" onclick="setAllotMode('single')">🚌 Single Vehicle</button>
            ${hasTrips?`<button class="aib-tab" id="modeBtn-multi" onclick="setAllotMode('multi')">🔀 Per Trip</button>`:''}
          </div>
          <button class="btn btn-ghost btn-sm" onclick="autoNextSch()" style="white-space:nowrap">Next →</button>
        </div>

        <!-- SINGLE MODE — compact one-liner -->
        <div id="allot-single-panel" class="card fu" style="padding:14px 16px">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap">Vehicle <span style="color:var(--red)">*</span></span>
            <!-- External toggle -->
            <div style="display:flex;gap:4px;padding:3px;background:var(--surf2);border:2px solid var(--bdr);border-radius:20px">
              <button id="allot_own_btn" class="allot-src-btn act" onclick="setAllotSrc('own')">🏠 Own</button>
              <button id="allot_ext_btn" class="allot-src-btn" onclick="setAllotSrc('ext')">🔀 Relief/External</button>
            </div>
            <!-- Own depot: dropdown -->
            <select class="allot-veh-sel" id="av_single" onchange="onSingleVehChange(this)" style="flex:1;min-width:220px;font-size:14px;font-weight:700;padding:9px 32px 9px 12px">
              ${buildVehOpts(singleVeh)}
            </select>
            <!-- External/Relief: free-text input (hidden by default) -->
            <input type="text" id="av_single_ext" placeholder="Enter any vehicle no. (external)" class="allot-veh-sel mono"
              style="flex:1;min-width:220px;font-size:14px;font-weight:700;padding:9px 12px;display:none;border-color:var(--purple);background:var(--purple-lt);color:var(--purple)"
              oninput="onExtVehInput(this)">
            <!-- External extra fields (hidden by default) -->
            <div id="allot_ext_fields" style="display:none;flex-wrap:wrap;gap:8px;width:100%;margin-top:6px;padding:10px 14px;background:var(--purple-lt);border:2px solid rgba(124,58,237,.25);border-radius:var(--r2)">
              <div style="font-size:11px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.7px;width:100%;margin-bottom:4px">🔀 Relief / External Vehicle Details</div>
              <div style="flex:1;min-width:150px"><label style="font-size:10px;font-weight:800;color:var(--purple);text-transform:uppercase">Source Depot</label><br>
                <input type="text" id="av_ext_depot" placeholder="e.g. Hubli Depot 2" style="padding:6px 10px;font-size:13px;font-weight:700;border-color:rgba(124,58,237,.4)">
